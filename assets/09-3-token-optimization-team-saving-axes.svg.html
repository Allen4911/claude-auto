<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{margin:0;background:#f5f5f7;font-family:'Noto Sans CJK KR',DejaVu Sans,system-ui,sans-serif}</style></head><body>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="240" viewBox="0 0 900 300">
  <rect width="900" height="300" fill="#f5f5f7"/>

  <!-- Axis 1 -->
  <rect x="40" y="65" width="250" height="180" rx="10" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>

  <rect x="40" y="92" width="250" height="18" fill="#ffffff"/>

  <text x="165" y="186" fill="#7a7a7a" font-size="11" text-anchor="middle">현재 작업에 필요한 수만</text>
  <text x="165" y="222" fill="#0066cc" font-size="12" font-weight="bold" text-anchor="middle">최대 6배 절약</text>

  <rect x="325" y="65" width="250" height="180" rx="10" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>

  <rect x="325" y="92" width="250" height="18" fill="#ffffff"/>

  <text x="450" y="222" fill="#0066cc" font-size="12" font-weight="bold" text-anchor="middle">역할별 맞춤 최적화</text>
  <!-- Axis 3 -->
  <rect x="610" y="65" width="250" height="180" rx="10" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>

  <!-- 6 small panes all with RTK badge -->
  <g>
    <rect x="625" y="118" width="55" height="32" rx="4" fill="#ffffff" stroke="#0066cc"/>

    <rect x="688" y="118" width="55" height="32" rx="4" fill="#ffffff" stroke="#0066cc"/>
    <text x="715" y="138" fill="#0066cc" font-size="9" text-anchor="middle">P1 RTK</text>
    <rect x="751" y="118" width="55" height="32" rx="4" fill="#ffffff" stroke="#0066cc"/>
    <text x="778" y="138" fill="#0066cc" font-size="9" text-anchor="middle">P2 RTK</text>
    <rect x="625" y="158" width="55" height="32" rx="4" fill="#ffffff" stroke="#0066cc"/>
    <text x="652" y="178" fill="#0066cc" font-size="9" text-anchor="middle">P3 RTK</text>
    <rect x="688" y="158" width="55" height="32" rx="4" fill="#ffffff" stroke="#0066cc"/>
    <text x="715" y="178" fill="#0066cc" font-size="9" text-anchor="middle">P4 RTK</text>
    <rect x="751" y="158" width="55" height="32" rx="4" fill="#ffffff" stroke="#0066cc"/>
    <text x="778" y="178" fill="#0066cc" font-size="9" text-anchor="middle">P5 RTK</text>
  </g>
  <text x="735" y="212" fill="#7a7a7a" font-size="10" text-anchor="middle">훅으로 자동 필터링</text>

  <rect x="180" y="260" width="540" height="28" rx="8" fill="#ffffff" stroke="#0066cc" stroke-width="1"/>
  <text x="450" y="278" fill="#0066cc" font-size="12" font-weight="bold" text-anchor="middle">3가지 중첩 적용 → 전체 토큰 소비 대폭 감소</text>
