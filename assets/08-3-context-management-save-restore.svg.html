<svg xmlns="http://www.w3.org/2000/svg" width="900" height="260" viewBox="0 0 900 260">
<rect width="900" height="260" fill="#1e1e2e"/>
<text x="450" y="32" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="20" fill="#cdd6f4" text-anchor="middle" font-weight="bold">context-save / clear / restore 3단계 흐름</text>

<!-- Step 1 -->
<rect x="30" y="58" width="240" height="148" rx="10" fill="#313244" stroke="#f38ba8" stroke-width="2.5"/>
<rect x="30" y="58" width="240" height="44" rx="10" fill="#f38ba8" opacity="0.3"/>
<rect x="30" y="84" width="240" height="18" fill="#f38ba8" opacity="0.3"/>
<text x="150" y="80" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="14" fill="#f38ba8" text-anchor="middle" font-weight="bold">① 저장</text>
<text x="150" y="98" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="11" fill="#a6adc8" text-anchor="middle">컨텍스트 70% 도달</text>
<text x="150" y="132" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="14" fill="#a6e3a1" text-anchor="middle">/context-save</text>
<text x="150" y="158" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" fill="#cdd6f4" text-anchor="middle">현재 작업 상태</text>
<text x="150" y="176" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" fill="#cdd6f4" text-anchor="middle">파일에 저장</text>
<text x="150" y="196" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="11" fill="#a6adc8" text-anchor="middle">~/.claude/context/</text>

<!-- Arrow 1→2 -->
<line x1="272" y1="132" x2="308" y2="132" stroke="#585b70" stroke-width="2"/>
<polygon points="308,126 320,132 308,138" fill="#585b70"/>

<!-- Step 2 -->
<rect x="320" y="58" width="240" height="148" rx="10" fill="#313244" stroke="#f9e2af" stroke-width="2.5"/>
<rect x="320" y="58" width="240" height="44" rx="10" fill="#f9e2af" opacity="0.3"/>
<rect x="320" y="84" width="240" height="18" fill="#f9e2af" opacity="0.3"/>
<text x="440" y="80" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="14" fill="#f9e2af" text-anchor="middle" font-weight="bold">② 초기화</text>
<text x="440" y="98" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="11" fill="#a6adc8" text-anchor="middle">저장 완료 확인 후</text>
<text x="440" y="132" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="16" fill="#f9e2af" text-anchor="middle">/clear</text>
<text x="440" y="158" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" fill="#cdd6f4" text-anchor="middle">컨텍스트 0% 리셋</text>
<text x="440" y="176" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" fill="#cdd6f4" text-anchor="middle">메모리 완전 초기화</text>
<text x="440" y="196" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="11" fill="#a6adc8" text-anchor="middle">파일은 그대로 보존</text>

<!-- Arrow 2→3 -->
<line x1="562" y1="132" x2="598" y2="132" stroke="#585b70" stroke-width="2"/>
<polygon points="598,126 610,132 598,138" fill="#585b70"/>

<!-- Step 3 -->
<rect x="610" y="58" width="260" height="148" rx="10" fill="#313244" stroke="#a6e3a1" stroke-width="2.5"/>
<rect x="610" y="58" width="260" height="44" rx="10" fill="#a6e3a1" opacity="0.3"/>
<rect x="610" y="84" width="260" height="18" fill="#a6e3a1" opacity="0.3"/>
<text x="740" y="80" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="14" fill="#a6e3a1" text-anchor="middle" font-weight="bold">③ 복원</text>
<text x="740" y="98" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="11" fill="#a6adc8" text-anchor="middle">새 세션 시작 후</text>
<text x="740" y="132" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="13" fill="#a6e3a1" text-anchor="middle">/context-restore</text>
<text x="740" y="158" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" fill="#cdd6f4" text-anchor="middle">저장 파일 읽어 복원</text>
<text x="740" y="176" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" fill="#cdd6f4" text-anchor="middle">작업 맥락 재개</text>
<text x="740" y="196" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="11" fill="#a6adc8" text-anchor="middle">컨텍스트 0% → 복원</text>

<text x="450" y="238" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" fill="#585b70" text-anchor="middle">책갈피(save) → 새 책(clear) → 책갈피부터 재개(restore) — 연속성 유지하며 메모리 절약</text>
</svg>
