<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{margin:0;background:#0f172a;font-family:'Noto Sans CJK KR',DejaVu Sans,system-ui,sans-serif}</style></head><body>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320">
  <rect width="900" height="320" fill="#0f172a"/>
  <text x="450" y="35" fill="#e2e8f0" font-size="16" font-weight="bold" text-anchor="middle">Claude 개별 종료 복구 — 비활성 파인 식별 및 재시작</text>
  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="none" stroke="#3b82f6" stroke-width="1.5"/></marker></defs>
  <!-- Phase 1: Diagnosis -->
  <rect x="40" y="60" width="240" height="90" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="160" y="82" fill="#fbbf24" font-size="13" font-weight="bold" text-anchor="middle">① 파인 상태 진단</text>
  <rect x="55" y="92" width="210" height="28" rx="5" fill="#0f172a"/>
  <text x="160" y="110" fill="#7dd3fc" font-size="10" font-family="monospace" text-anchor="middle">for i in 0..5: pane 상태 확인</text>
  <text x="160" y="136" fill="#94a3b8" font-size="11" text-anchor="middle">비활성 파인 번호 식별</text>
  <!-- 3 panes visual: active / inactive / active -->
  <rect x="50" y="168" width="80" height="50" rx="6" fill="#064e3b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="90" y="190" fill="#86efac" font-size="10" text-anchor="middle">Pane 1</text>
  <text x="90" y="206" fill="#4ade80" font-size="9" text-anchor="middle">활성 ✓</text>
  <rect x="150" y="168" width="80" height="50" rx="6" fill="#2d0a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="190" y="190" fill="#fca5a5" font-size="10" text-anchor="middle">Pane 3</text>
  <text x="190" y="206" fill="#f87171" font-size="9" text-anchor="middle">비활성 $</text>
  <rect x="250" y="168" width="80" height="50" rx="6" fill="#064e3b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="290" y="190" fill="#86efac" font-size="10" text-anchor="middle">Pane 5</text>
  <text x="290" y="206" fill="#4ade80" font-size="9" text-anchor="middle">활성 ✓</text>
  <!-- Arrow -->
  <line x1="340" y1="145" x2="400" y2="145" stroke="#3b82f6" stroke-width="2" marker-end="url(#a)"/>
  <!-- Phase 2: Restart -->
  <rect x="400" y="60" width="240" height="90" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="520" y="82" fill="#c4b5fd" font-size="13" font-weight="bold" text-anchor="middle">② Claude 재실행</text>
  <rect x="415" y="92" width="210" height="28" rx="5" fill="#0f172a"/>
  <text x="520" y="110" fill="#a78bfa" font-size="10" font-family="monospace" text-anchor="middle">tmux send-keys -t team:0.3 "claude"</text>
  <text x="520" y="136" fill="#94a3b8" font-size="11" text-anchor="middle">해당 파인에만 claude 실행</text>
  <rect x="460" y="168" width="120" height="50" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="520" y="190" fill="#93c5fd" font-size="10" text-anchor="middle">Pane 3</text>
  <text x="520" y="206" fill="#60a5fa" font-size="9" text-anchor="middle">claude 실행 중</text>
  <!-- Arrow -->
  <line x1="640" y1="145" x2="700" y2="145" stroke="#3b82f6" stroke-width="2" marker-end="url(#a)"/>
  <!-- Phase 3: Resume -->
  <rect x="700" y="60" width="160" height="90" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="780" y="82" fill="#34d399" font-size="13" font-weight="bold" text-anchor="middle">③ /resume</text>
  <rect x="715" y="92" width="130" height="28" rx="5" fill="#0f172a"/>
  <text x="780" y="110" fill="#6ee7b7" font-size="10" font-family="monospace" text-anchor="middle">/resume</text>
  <text x="780" y="136" fill="#94a3b8" font-size="11" text-anchor="middle">이전 대화 복원</text>
  <rect x="720" y="168" width="120" height="50" rx="6" fill="#064e3b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="780" y="190" fill="#86efac" font-size="10" text-anchor="middle">Pane 3</text>
  <text x="780" y="206" fill="#4ade80" font-size="9" text-anchor="middle">정상 복구 ✓</text>
  <!-- Bottom summary -->
  <rect x="200" y="245" width="500" height="32" rx="8" fill="#0c2a1a" stroke="#22c55e" stroke-width="1"/>
  <text x="450" y="264" fill="#4ade80" font-size="11" text-anchor="middle">비활성 파인 발견 → claude 재실행 → /resume 복원 → 정상 복귀</text>
  <text x="450" y="300" fill="#475569" font-size="10" text-anchor="middle">나머지 팀원은 계속 정상 작업 — 개별 파인만 영향</text>
</svg>
</body></html>
