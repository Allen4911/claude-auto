<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
<rect width="900" height="300" fill="#1e1e2e"/>
<text x="450" y="32" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="20" fill="#cdd6f4" text-anchor="middle" font-weight="bold">컨텍스트 소비 흐름</text>

<!-- Sources on left -->
<rect x="30" y="60" width="160" height="50" rx="6" fill="#313244" stroke="#89b4fa" stroke-width="1.5"/>
<text x="110" y="90" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="13" fill="#89b4fa" text-anchor="middle">[채팅] 대화 메시지</text>

<rect x="30" y="125" width="160" height="50" rx="6" fill="#313244" stroke="#a6e3a1" stroke-width="1.5"/>
<text x="110" y="155" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="13" fill="#a6e3a1" text-anchor="middle">[문서] 파일 읽기</text>

<rect x="30" y="190" width="160" height="50" rx="6" fill="#313244" stroke="#f9e2af" stroke-width="1.5"/>
<text x="110" y="220" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="13" fill="#f9e2af" text-anchor="middle">● 명령어 출력</text>

<!-- Arrows to bucket -->
<line x1="192" y1="85" x2="280" y2="145" stroke="#89b4fa" stroke-width="1.5" stroke-dasharray="4,3"/>
<polygon points="276,148 285,140 282,152" fill="#89b4fa"/>
<line x1="192" y1="150" x2="280" y2="155" stroke="#a6e3a1" stroke-width="1.5" stroke-dasharray="4,3"/>
<polygon points="276,152 287,150 278,160" fill="#a6e3a1"/>
<line x1="192" y1="215" x2="280" y2="165" stroke="#f9e2af" stroke-width="1.5" stroke-dasharray="4,3"/>
<polygon points="278,162 286,172 282,159" fill="#f9e2af"/>

<!-- Context bucket -->
<rect x="280" y="60" width="180" height="220" rx="8" fill="#181825" stroke="#45475a" stroke-width="2"/>
<text x="370" y="83" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="13" fill="#a6adc8" text-anchor="middle">컨텍스트</text>

<!-- Fill levels -->
<!-- Used area (65%) -->
<rect x="288" y="134" width="164" height="138" rx="4" fill="#313244"/>
<!-- 70% warning line -->
<rect x="288" y="126" width="164" height="4" fill="#f38ba8" opacity="0.8"/>
<text x="460" y="122" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="11" fill="#f38ba8">← 70% 경고</text>

<!-- Fill animation visual -->
<rect x="292" y="138" width="156" height="30" rx="3" fill="#89b4fa" opacity="0.4"/>
<rect x="292" y="172" width="156" height="30" rx="3" fill="#a6e3a1" opacity="0.4"/>
<rect x="292" y="206" width="156" height="30" rx="3" fill="#f9e2af" opacity="0.4"/>
<rect x="292" y="240" width="156" height="28" rx="3" fill="#f38ba8" opacity="0.3"/>

<text x="370" y="157" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="11" fill="#cdd6f4" text-anchor="middle">대화 누적</text>
<text x="370" y="192" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="11" fill="#cdd6f4" text-anchor="middle">파일 내용</text>
<text x="370" y="227" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="11" fill="#cdd6f4" text-anchor="middle">명령 출력</text>
<text x="370" y="258" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="11" fill="#f38ba8" text-anchor="middle">추가 누적중...</text>

<!-- 100% overflow -->
<line x1="460" y1="135" x2="560" y2="135" stroke="#f38ba8" stroke-width="1.5" stroke-dasharray="4,3"/>
<rect x="560" y="60" width="190" height="220" rx="8" fill="#181825" stroke="#f38ba8" stroke-width="2"/>
<text x="655" y="83" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="13" fill="#f38ba8" text-anchor="middle">100% 도달</text>
<rect x="568" y="92" width="174" height="180" rx="4" fill="#313244"/>
<text x="655" y="130" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="20" fill="#f38ba8" text-anchor="middle">△</text>
<text x="655" y="160" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" fill="#cdd6f4" text-anchor="middle">오래된 내용</text>
<text x="655" y="178" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" fill="#cdd6f4" text-anchor="middle">자동으로 밀려남</text>
<text x="655" y="210" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="11" fill="#f38ba8" text-anchor="middle">초반 지시사항 소실</text>
<text x="655" y="228" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="11" fill="#f38ba8" text-anchor="middle">목표 이탈 위험</text>

<!-- overflow arrow -->
<line x1="460" y1="100" x2="555" y2="100" stroke="#f38ba8" stroke-width="1.5"/>
<polygon points="551,95 563,100 551,105" fill="#f38ba8"/>
<text x="508" y="93" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="10" fill="#f38ba8" text-anchor="middle">overflow →</text>

<text x="450" y="285" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" fill="#585b70" text-anchor="middle">70% 초과 시 즉시 /context-save → /clear 실행 필요</text>
</svg>
