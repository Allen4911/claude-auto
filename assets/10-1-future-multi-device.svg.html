<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{margin:0;background:#f5f5f7;font-family:'Noto Sans CJK KR',DejaVu Sans,system-ui,sans-serif}</style></head><body>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="256" viewBox="0 0 900 320">
  <rect width="900" height="320" fill="#f5f5f7"/>
  <text x="450" y="30" fill="#1d1d1f" font-size="16" font-weight="bold" text-anchor="middle">멀티 디바이스 협업 미래 시나리오</text>
  <defs><marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="none" stroke="#e8e8ed" stroke-width="1.5"/></marker></defs>
  <!-- Central server -->
  <rect x="325" y="120" width="250" height="80" rx="12" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
  <text x="450" y="150" fill="#0066cc" font-size="14" font-weight="bold" text-anchor="middle">팀 세션 서버</text>
  <text x="450" y="170" fill="#0066cc" font-size="10" text-anchor="middle">Claude Code 오케스트레이터</text>
  <text x="450" y="185" fill="#7a7a7a" font-size="9" text-anchor="middle">상태 동기화 · 작업 분배</text>
  <!-- PM device -->
  <rect x="30" y="55" width="160" height="70" rx="8" fill="#ffffff" stroke="#0066cc" stroke-width="1.5"/>
  <text x="110" y="78" fill="#0066cc" font-size="12" font-weight="bold" text-anchor="middle">PM (태블릿)</text>
  <text x="110" y="96" fill="#7a7a7a" font-size="9" text-anchor="middle">작업 할당 · 진행 확인</text>
  <text x="110" y="112" fill="#0066cc" font-size="9" text-anchor="middle">Mobile Remote Control</text>
  <line x1="190" y1="90" x2="325" y2="145" stroke="#0066cc" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="5,3"/>
  <!-- Dev device -->
  <rect x="30" y="195" width="160" height="70" rx="8" fill="#ffffff" stroke="#0066cc" stroke-width="1.5"/>
  <text x="110" y="218" fill="#0066cc" font-size="12" font-weight="bold" text-anchor="middle">개발자 (데스크톱)</text>
  <text x="110" y="236" fill="#7a7a7a" font-size="9" text-anchor="middle">코드 작성 · 실행</text>
  <text x="110" y="252" fill="#0066cc" font-size="9" text-anchor="middle">Claude Code CLI</text>
  <line x1="190" y1="230" x2="325" y2="185" stroke="#0066cc" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="5,3"/>
  <!-- Reviewer device -->
  <rect x="710" y="195" width="160" height="70" rx="8" fill="#ffffff" stroke="#0066cc" stroke-width="1.5"/>
  <text x="790" y="218" fill="#0066cc" font-size="12" font-weight="bold" text-anchor="middle">리뷰어 (노트북)</text>
  <text x="790" y="236" fill="#7a7a7a" font-size="9" text-anchor="middle">코드 검토 · 승인</text>
  <text x="790" y="252" fill="#0066cc" font-size="9" text-anchor="middle">웹 브라우저 접속</text>
  <line x1="710" y1="230" x2="575" y2="185" stroke="#0066cc" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="5,3"/>
  <!-- Observer device -->
  <rect x="710" y="55" width="160" height="70" rx="8" fill="#ffffff" stroke="#0066cc" stroke-width="1.5"/>
  <text x="790" y="78" fill="#0066cc" font-size="12" font-weight="bold" text-anchor="middle">경영진 (모바일)</text>
  <text x="790" y="96" fill="#7a7a7a" font-size="9" text-anchor="middle">대시보드 관찰</text>
  <text x="790" y="112" fill="#0066cc" font-size="9" text-anchor="middle">읽기 전용 뷰</text>
  <line x1="710" y1="90" x2="575" y2="145" stroke="#0066cc" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="5,3"/>
  <!-- Bottom note -->
  <text x="450" y="290" fill="#c7c7cc" font-size="10" text-anchor="middle">모든 디바이스가 하나의 팀 세션에 연결 → 역할별 권한 분리 · 실시간 협업</text>
</svg>
</body></html>
