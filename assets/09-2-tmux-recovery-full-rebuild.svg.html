<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{margin:0;background:#0f172a;font-family:system-ui,sans-serif}</style></head><body>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280">
  <rect width="900" height="280" fill="#0f172a"/>
  <text x="450" y="35" fill="#e2e8f0" font-size="16" font-weight="bold" text-anchor="middle">전체 소실 복구 3단계</text>
  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="none" stroke="#3b82f6" stroke-width="1.5"/></marker></defs>
  <!-- Reboot icon -->
  <circle cx="80" cy="120" r="40" fill="#2d0a0a" stroke="#ef4444" stroke-width="2"/>
  <text x="80" y="115" fill="#fca5a5" font-size="20" text-anchor="middle">⟳</text>
  <text x="80" y="134" fill="#f87171" font-size="10" text-anchor="middle">재부팅</text>
  <line x1="120" y1="120" x2="165" y2="120" stroke="#3b82f6" stroke-width="2" marker-end="url(#a)"/>
  <!-- Step 1 -->
  <rect x="165" y="75" width="180" height="90" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="255" y="98" fill="#fbbf24" font-size="13" font-weight="bold" text-anchor="middle">① 세션 확인</text>
  <rect x="180" y="108" width="150" height="26" rx="5" fill="#0f172a"/>
  <text x="255" y="125" fill="#7dd3fc" font-size="10" font-family="monospace" text-anchor="middle">tmux ls 2>/dev/null</text>
  <text x="255" y="152" fill="#fca5a5" font-size="11" text-anchor="middle">"no server" 확인</text>
  <line x1="345" y1="120" x2="395" y2="120" stroke="#3b82f6" stroke-width="2" marker-end="url(#a)"/>
  <!-- Step 2 -->
  <rect x="395" y="55" width="200" height="130" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="495" y="80" fill="#c4b5fd" font-size="13" font-weight="bold" text-anchor="middle">② 셋업 스크립트 실행</text>
  <rect x="410" y="92" width="170" height="26" rx="5" fill="#0f172a"/>
  <text x="495" y="108" fill="#a78bfa" font-size="10" font-family="monospace" text-anchor="middle">bash setup-team.sh</text>
  <text x="495" y="132" fill="#94a3b8" font-size="10" text-anchor="middle">→ TMUX 세션 생성</text>
  <text x="495" y="148" fill="#94a3b8" font-size="10" text-anchor="middle">→ 파인 6개 분할</text>
  <text x="495" y="164" fill="#94a3b8" font-size="10" text-anchor="middle">→ Claude Code 자동 실행</text>
  <line x1="595" y1="120" x2="645" y2="120" stroke="#3b82f6" stroke-width="2" marker-end="url(#a)"/>
  <!-- Step 3 -->
  <rect x="645" y="75" width="200" height="90" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="745" y="98" fill="#34d399" font-size="13" font-weight="bold" text-anchor="middle">③ 세션 접속</text>
  <rect x="660" y="108" width="170" height="26" rx="5" fill="#0f172a"/>
  <text x="745" y="125" fill="#6ee7b7" font-size="10" font-family="monospace" text-anchor="middle">tmux attach -t team</text>
  <text x="745" y="152" fill="#4ade80" font-size="11" font-weight="bold" text-anchor="middle">✓ 6파인 복원</text>
  <!-- Result bar -->
  <rect x="200" y="215" width="500" height="40" rx="8" fill="#0c2a1a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="450" y="232" fill="#86efac" font-size="12" font-weight="bold" text-anchor="middle">완전 재구성 완료</text>
  <text x="450" y="248" fill="#4ade80" font-size="11" text-anchor="middle">tmux ls → setup-team.sh → tmux attach</text>
</svg>
</body></html>
