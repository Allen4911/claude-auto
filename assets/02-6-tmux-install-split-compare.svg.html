<svg xmlns="http://www.w3.org/2000/svg" width="720" height="560" viewBox="0 0 720 560">
  <defs>
    <marker id="arL" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,1 L9,5 L0,9 z" fill="#0066cc"/>
    </marker>
    <marker id="arR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,1 L9,5 L0,9 z" fill="#0066cc"/>
    </marker>
  </defs>
  <rect width="720" height="560" fill="#f5f5f7"/>
  <text x="360" y="38" font-family="Malgun Gothic, Noto Sans CJK KR, Arial, sans-serif" font-size="22" fill="#1d1d1f" text-anchor="middle" font-weight="bold">파인 분할 — before / after</text>
  <text x="360" y="60" font-family="Courier New, Consolas, DejaVu Sans Mono, monospace" font-size="14" fill="#7a7a7a" text-anchor="middle" font-weight="normal">Ctrl+B %  좌우  ·  Ctrl+B "  상하</text>

  <!-- ── BEFORE terminal (top center) ── -->
  <!-- Window bg -->
  <rect x="200" y="80" width="320" height="150" rx="10" ry="10" fill="#f0f0f0" stroke="#e0e0e0" stroke-width="1.5"/>
  <!-- Title bar -->
  <rect x="200" y="80" width="320" height="26" rx="10" ry="10" fill="#e8e8ed"/>
  <rect x="200" y="94" width="320" height="12" rx="0" ry="0" fill="#e8e8ed"/>
  <!-- Traffic lights -->
  <circle cx="218" cy="93" r="5" fill="#ff5f57"/>
  <circle cx="236" cy="93" r="5" fill="#febc2e"/>
  <circle cx="254" cy="93" r="5" fill="#28c840"/>
  <!-- Title -->
  <text x="360" y="98" font-family="Courier New, Consolas, DejaVu Sans Mono, monospace" font-size="13" fill="#7a7a7a" text-anchor="middle">before</text>
  <!-- Divider -->
  <line x1="200" y1="106" x2="520" y2="106" stroke="#e0e0e0" stroke-width="1"/>
  <!-- Single pane inside -->
  <rect x="212" y="112" width="296" height="106" rx="8" ry="8" fill="#e8e8ed" stroke="#0066cc" stroke-width="1.5"/>
  <!-- "파인 1개" label -->
  <text x="360" y="248" font-family="Malgun Gothic, Noto Sans CJK KR, Arial, sans-serif" font-size="14" fill="#7a7a7a" text-anchor="middle" font-weight="normal">파인 1개</text>

  <!-- ── Arrows from before to after states ── -->
  <line x1="280" y1="232" x2="175" y2="290" stroke="#0066cc" stroke-width="2.4" marker-end="url(#arL)"/>
  <line x1="440" y1="232" x2="545" y2="290" stroke="#0066cc" stroke-width="2.4" marker-end="url(#arR)"/>

  <!-- ── AFTER LEFT: 좌우 분할 ── -->
  <!-- Title bar hint -->
  <text x="175" y="270" font-family="Courier New, Consolas, DejaVu Sans Mono, monospace" font-size="12" fill="#0066cc" text-anchor="middle">Ctrl+B  %</text>
  <!-- Window bg -->
  <rect x="30" y="298" width="290" height="150" rx="10" ry="10" fill="#f0f0f0" stroke="#e0e0e0" stroke-width="1.5"/>
  <!-- Title bar -->
  <rect x="30" y="298" width="290" height="26" rx="10" ry="10" fill="#e8e8ed"/>
  <rect x="30" y="312" width="290" height="12" rx="0" ry="0" fill="#e8e8ed"/>
  <!-- Traffic lights -->
  <circle cx="48" cy="311" r="5" fill="#ff5f57"/>
  <circle cx="66" cy="311" r="5" fill="#febc2e"/>
  <circle cx="84" cy="311" r="5" fill="#28c840"/>
  <line x1="30" y1="324" x2="320" y2="324" stroke="#e0e0e0" stroke-width="1"/>
  <!-- Two side-by-side panes -->
  <rect x="42" y="330" width="130" height="106" rx="6" ry="6" fill="#e8e8ed" stroke="#0066cc" stroke-width="1.5"/>
  <rect x="178" y="330" width="130" height="106" rx="6" ry="6" fill="#e8e8ed" stroke="#0066cc" stroke-width="1.5"/>
  <!-- Label -->
  <text x="175" y="468" font-family="Malgun Gothic, Noto Sans CJK KR, Arial, sans-serif" font-size="14" fill="#0066cc" text-anchor="middle" font-weight="bold">좌우 분할</text>

  <!-- ── AFTER RIGHT: 상하 분할 ── -->
  <text x="545" y="270" font-family="Courier New, Consolas, DejaVu Sans Mono, monospace" font-size="12" fill="#0066cc" text-anchor="middle">Ctrl+B  "</text>
  <!-- Window bg -->
  <rect x="400" y="298" width="290" height="150" rx="10" ry="10" fill="#f0f0f0" stroke="#e0e0e0" stroke-width="1.5"/>
  <!-- Title bar -->
  <rect x="400" y="298" width="290" height="26" rx="10" ry="10" fill="#e8e8ed"/>
  <rect x="400" y="312" width="290" height="12" rx="0" ry="0" fill="#e8e8ed"/>
  <!-- Traffic lights -->
  <circle cx="418" cy="311" r="5" fill="#ff5f57"/>
  <circle cx="436" cy="311" r="5" fill="#febc2e"/>
  <circle cx="454" cy="311" r="5" fill="#28c840"/>
  <line x1="400" y1="324" x2="690" y2="324" stroke="#e0e0e0" stroke-width="1"/>
  <!-- Two stacked panes -->
  <rect x="412" y="330" width="266" height="50" rx="6" ry="6" fill="#e8e8ed" stroke="#0066cc" stroke-width="1.5"/>
  <rect x="412" y="386" width="266" height="50" rx="6" ry="6" fill="#e8e8ed" stroke="#0066cc" stroke-width="1.5"/>
  <!-- Label -->
  <text x="545" y="468" font-family="Malgun Gothic, Noto Sans CJK KR, Arial, sans-serif" font-size="14" fill="#0066cc" text-anchor="middle" font-weight="bold">상하 분할</text>

  <!-- ── Info box (프리픽스 키) ── -->
  <rect x="195" y="490" width="330" height="56" rx="11" ry="11" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="360" y="512" font-family="Malgun Gothic, Noto Sans CJK KR, Arial, sans-serif" font-size="14" fill="#0066cc" text-anchor="middle" font-weight="bold">프리픽스 키</text>
  <text x="360" y="534" font-family="Courier New, Consolas, DejaVu Sans Mono, monospace" font-size="13" fill="#1d1d1f" text-anchor="middle">Ctrl+B 먼저 누르고 뗀 후 →  %  또는  "</text>
</svg>
