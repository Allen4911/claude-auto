<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{margin:0;background:#0f172a;font-family:'Noto Sans CJK KR',DejaVu Sans,system-ui,sans-serif}</style></head><body>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320">
  <rect width="900" height="320" fill="#0f172a"/>
  <text x="450" y="35" fill="#e2e8f0" font-size="16" font-weight="bold" text-anchor="middle">토큰 소비 경로 구조 도식</text>
  <!-- Input bucket (larger) -->
  <rect x="60" y="55" width="360" height="220" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="240" y="80" fill="#60a5fa" font-size="14" font-weight="bold" text-anchor="middle">입력 토큰 (Input)</text>
  <text x="240" y="97" fill="#64748b" font-size="10" text-anchor="middle">전체 비용의 ~70%</text>
  <rect x="80" y="108" width="320" height="36" rx="6" fill="#1e3a5f"/>
  <text x="240" y="130" fill="#93c5fd" font-size="12" text-anchor="middle">시스템 프롬프트 (CLAUDE.md)</text>
  <rect x="80" y="150" width="320" height="36" rx="6" fill="#1e3a5f"/>
  <text x="240" y="172" fill="#93c5fd" font-size="12" text-anchor="middle">대화 히스토리 (이전 메시지)</text>
  <rect x="80" y="192" width="320" height="36" rx="6" fill="#1e40af"/>
  <text x="240" y="214" fill="#bfdbfe" font-size="12" font-weight="bold" text-anchor="middle">도구 결과 (Bash 출력, 파일) ★최대</text>
  <rect x="80" y="234" width="320" height="32" rx="6" fill="#1e3a5f"/>
  <text x="240" y="254" fill="#93c5fd" font-size="12" text-anchor="middle">컨텍스트 파일 (자동 로드)</text>
  <!-- Output bucket (smaller) -->
  <rect x="480" y="115" width="360" height="160" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
  <text x="660" y="140" fill="#c4b5fd" font-size="14" font-weight="bold" text-anchor="middle">출력 토큰 (Output)</text>
  <text x="660" y="157" fill="#64748b" font-size="10" text-anchor="middle">전체 비용의 ~30%</text>
  <rect x="500" y="168" width="320" height="30" rx="6" fill="#3b1f5c"/>
  <text x="660" y="188" fill="#a78bfa" font-size="12" text-anchor="middle">Claude 응답 텍스트</text>
  <rect x="500" y="204" width="320" height="30" rx="6" fill="#3b1f5c"/>
  <text x="660" y="224" fill="#a78bfa" font-size="12" text-anchor="middle">도구 호출 요청</text>
  <rect x="500" y="240" width="320" height="28" rx="6" fill="#3b1f5c"/>
  <text x="660" y="258" fill="#a78bfa" font-size="12" text-anchor="middle">사고 과정 (thinking)</text>
  <!-- Size comparison arrow -->
  <line x1="420" y1="165" x2="480" y2="165" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="450" y="155" fill="#64748b" font-size="9" text-anchor="middle">입력이</text>
  <text x="450" y="167" fill="#64748b" font-size="9" text-anchor="middle">훨씬 큼</text>
  <text x="450" y="295" fill="#475569" font-size="11" text-anchor="middle">도구 결과와 대화 히스토리가 가장 큰 비중 → RTK + 세션 관리로 절약</text>
</svg>
</body></html>
