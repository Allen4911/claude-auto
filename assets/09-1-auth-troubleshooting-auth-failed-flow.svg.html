<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{margin:0;background:#0f172a;font-family:system-ui,sans-serif}</style></head><body>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320">
  <rect width="900" height="320" fill="#0f172a"/>
  <text x="450" y="35" fill="#e2e8f0" font-size="16" font-weight="bold" text-anchor="middle">Authentication failed 해결 3단계 흐름</text>
  <!-- Step 1 -->
  <rect x="60" y="65" width="220" height="160" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="60" y="65" width="220" height="36" rx="10" fill="#1e40af"/>
  <rect x="60" y="85" width="220" height="16" fill="#1e40af"/>
  <text x="170" y="90" fill="#bfdbfe" font-size="13" font-weight="bold" text-anchor="middle">① 계정 상태 확인</text>
  <rect x="75" y="112" width="190" height="30" rx="5" fill="#0f172a"/>
  <text x="170" y="131" fill="#7dd3fc" font-size="11" font-family="monospace" text-anchor="middle">claude auth status</text>
  <text x="170" y="160" fill="#94a3b8" font-size="11" text-anchor="middle">현재 로그인 계정 확인</text>
  <text x="170" y="178" fill="#94a3b8" font-size="11" text-anchor="middle">토큰 만료 여부 체크</text>
  <text x="170" y="196" fill="#94a3b8" font-size="11" text-anchor="middle">만료: 다음 단계 진행</text>
  <!-- Arrow 1->2 -->
  <line x1="280" y1="145" x2="320" y2="145" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Step 2 -->
  <rect x="320" y="65" width="260" height="160" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <rect x="320" y="65" width="260" height="36" rx="10" fill="#3b1f5c"/>
  <rect x="320" y="85" width="260" height="16" fill="#3b1f5c"/>
  <text x="450" y="90" fill="#c4b5fd" font-size="13" font-weight="bold" text-anchor="middle">② 재인증 실행</text>
  <rect x="335" y="112" width="230" height="30" rx="5" fill="#0f172a"/>
  <text x="450" y="131" fill="#a78bfa" font-size="11" font-family="monospace" text-anchor="middle">claude auth login</text>
  <text x="450" y="160" fill="#94a3b8" font-size="11" text-anchor="middle">브라우저 자동 실행</text>
  <text x="450" y="178" fill="#94a3b8" font-size="11" text-anchor="middle">Anthropic 로그인 페이지 오픈</text>
  <text x="450" y="196" fill="#94a3b8" font-size="11" text-anchor="middle">계정으로 로그인 진행</text>
  <!-- Arrow 2->3 -->
  <line x1="580" y1="145" x2="620" y2="145" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arr2)"/>
  <!-- Step 3 -->
  <rect x="620" y="65" width="220" height="160" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <rect x="620" y="65" width="220" height="36" rx="10" fill="#064e3b"/>
  <rect x="620" y="85" width="220" height="16" fill="#064e3b"/>
  <text x="730" y="90" fill="#6ee7b7" font-size="13" font-weight="bold" text-anchor="middle">③ 토큰 갱신 완료</text>
  <text x="730" y="130" fill="#94a3b8" font-size="11" text-anchor="middle">인증 코드 터미널 입력</text>
  <text x="730" y="150" fill="#94a3b8" font-size="11" text-anchor="middle">새 토큰 자동 저장</text>
  <text x="730" y="170" fill="#34d399" font-size="12" font-weight="bold" text-anchor="middle">✓ Remote Control 재연결</text>
  <text x="730" y="190" fill="#34d399" font-size="12" font-weight="bold" text-anchor="middle">✓ 인증 오류 해소</text>
  <!-- Summary -->
  <rect x="200" y="250" width="500" height="40" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="450" y="274" fill="#64748b" font-size="11" text-anchor="middle">auth status → auth login → 브라우저 인증 → 코드 입력 → 완료</text>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="none" stroke="#3b82f6" stroke-width="1.5"/></marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="none" stroke="#8b5cf6" stroke-width="1.5"/></marker>
  </defs>
</svg>
</body></html>
