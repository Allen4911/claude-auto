<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{margin:0;background:#0f172a;font-family:'Noto Sans CJK KR',DejaVu Sans,system-ui,sans-serif}</style></head><body>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <rect width="900" height="300" fill="#0f172a"/>
  <text x="450" y="35" fill="#e2e8f0" font-size="16" font-weight="bold" text-anchor="middle">SSH 재연결 흐름 — TMUX 세션 독립성</text>
  <!-- User PC -->
  <rect x="40" y="80" width="160" height="140" rx="10" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
  <text x="120" y="105" fill="#94a3b8" font-size="12" font-weight="bold" text-anchor="middle">사용자 PC</text>
  <rect x="60" y="118" width="120" height="36" rx="6" fill="#2d0a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="120" y="140" fill="#fca5a5" font-size="11" text-anchor="middle">SSH 연결 끊김</text>
  <rect x="60" y="162" width="120" height="36" rx="6" fill="#0c2a1a" stroke="#22c55e" stroke-width="1"/>
  <text x="120" y="184" fill="#86efac" font-size="11" text-anchor="middle">SSH 재연결</text>
  <!-- Server -->
  <rect x="380" y="60" width="480" height="180" rx="10" fill="#162032" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="620" y="85" fill="#60a5fa" font-size="13" font-weight="bold" text-anchor="middle">서버 (독립적으로 계속 실행 중)</text>
  <!-- TMUX session box -->
  <rect x="400" y="95" width="440" height="130" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="620" y="116" fill="#c4b5fd" font-size="12" font-weight="bold" text-anchor="middle">TMUX 세션 "team" (계속 살아있음)</text>
  <!-- Panes inside -->
  <rect x="412" y="124" width="60" height="44" rx="4" fill="#064e3b" stroke="#22c55e" stroke-width="1"/>
  <text x="442" y="150" fill="#86efac" font-size="9" text-anchor="middle">쭌</text>
  <rect x="477" y="124" width="60" height="44" rx="4" fill="#064e3b" stroke="#22c55e" stroke-width="1"/>
  <text x="507" y="150" fill="#86efac" font-size="9" text-anchor="middle">민준</text>
  <rect x="542" y="124" width="60" height="44" rx="4" fill="#064e3b" stroke="#22c55e" stroke-width="1"/>
  <text x="572" y="150" fill="#86efac" font-size="9" text-anchor="middle">지훈</text>
  <rect x="607" y="124" width="60" height="44" rx="4" fill="#064e3b" stroke="#22c55e" stroke-width="1"/>
  <text x="637" y="150" fill="#86efac" font-size="9" text-anchor="middle">수아</text>
  <rect x="672" y="124" width="60" height="44" rx="4" fill="#064e3b" stroke="#22c55e" stroke-width="1"/>
  <text x="702" y="150" fill="#86efac" font-size="9" text-anchor="middle">서연</text>
  <rect x="737" y="124" width="60" height="44" rx="4" fill="#064e3b" stroke="#22c55e" stroke-width="1"/>
  <text x="767" y="150" fill="#86efac" font-size="9" text-anchor="middle">태양</text>
  <text x="620" y="190" fill="#34d399" font-size="11" text-anchor="middle">모든 Claude Code 인스턴스 계속 실행 중</text>
  <!-- Arrows -->
  <line x1="200" y1="140" x2="370" y2="140" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="285" y="132" fill="#f87171" font-size="10" text-anchor="middle">연결 끊김</text>
  <line x1="200" y1="180" x2="370" y2="160" stroke="#22c55e" stroke-width="2" marker-end="url(#g)"/>
  <text x="285" y="183" fill="#4ade80" font-size="10" text-anchor="middle">tmux attach -t team</text>
  <!-- Result -->
  <rect x="200" y="250" width="500" height="32" rx="8" fill="#0c2a1a" stroke="#22c55e" stroke-width="1"/>
  <text x="450" y="271" fill="#4ade80" font-size="12" font-weight="bold" text-anchor="middle">✓ 데이터 손실 없음 — 화면 그대로 복원</text>
  <defs><marker id="g" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="none" stroke="#22c55e" stroke-width="1.5"/></marker></defs>
</svg>
</body></html>
