<svg xmlns="http://www.w3.org/2000/svg" width="720" height="680" viewBox="0 0 720 680">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,1 L9,5 L0,9 z" fill="#0066cc"/></marker>
  </defs>

  <rect width="720" height="680" fill="#f5f5f7"/>

  <!-- Title -->
  <text x="360" y="42" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="21" fill="#1d1d1f" text-anchor="middle" font-weight="bold">직접 지시 vs 단일 진입점</text>
  <text x="360" y="64" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="13" fill="#7a7a7a" text-anchor="middle">입구가 하나면 중복·누락이 준다</text>

  <!-- ===== Pattern A: 직접 지시 (혼선) ===== -->
  <text x="360" y="96" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="14" fill="#0066cc" text-anchor="middle" font-weight="bold">① 직접 지시 — 혼선</text>

  <!-- 사용자 A -->
  <rect x="290" y="112" width="140" height="48" rx="11" ry="11" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
  <text x="360" y="142" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="16" fill="#1d1d1f" text-anchor="middle" font-weight="bold">사용자</text>

  <!-- 5 members A (row, y=250) -->
  <rect x="30" y="250" width="114" height="48" rx="9" ry="9" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="87" y="280" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="14" fill="#1d1d1f" text-anchor="middle" font-weight="bold">민준</text>
  <rect x="167" y="250" width="114" height="48" rx="9" ry="9" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="224" y="280" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="14" fill="#1d1d1f" text-anchor="middle" font-weight="bold">지훈</text>
  <rect x="304" y="250" width="114" height="48" rx="9" ry="9" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="361" y="280" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="14" fill="#1d1d1f" text-anchor="middle" font-weight="bold">수아</text>
  <rect x="441" y="250" width="114" height="48" rx="9" ry="9" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="498" y="280" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="14" fill="#1d1d1f" text-anchor="middle" font-weight="bold">서연</text>
  <rect x="578" y="250" width="114" height="48" rx="9" ry="9" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="635" y="280" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="14" fill="#1d1d1f" text-anchor="middle" font-weight="bold">태양</text>

  <!-- direct arrows (5, crossing = 혼선) -->
  <line x1="360" y1="160" x2="95" y2="248" stroke="#0066cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="360" y1="160" x2="227" y2="248" stroke="#0066cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="360" y1="160" x2="361" y2="248" stroke="#0066cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="360" y1="160" x2="495" y2="248" stroke="#0066cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="360" y1="160" x2="627" y2="248" stroke="#0066cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="360" y="316" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="11.5" fill="#7a7a7a" text-anchor="middle">5명에게 각각 직접 지시 → 중복·누락 발생</text>

  <!-- divider -->
  <line x1="40" y1="344" x2="680" y2="344" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="6 6"/>

  <!-- ===== Pattern B: 단일 진입점 ===== -->
  <text x="360" y="378" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="14" fill="#0066cc" text-anchor="middle" font-weight="bold">② 단일 진입점 — 팀장 경유</text>

  <!-- 사용자 B -->
  <rect x="290" y="394" width="140" height="46" rx="11" ry="11" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
  <text x="360" y="423" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="16" fill="#1d1d1f" text-anchor="middle" font-weight="bold">사용자</text>

  <!-- 사용자→팀장 -->
  <line x1="360" y1="440" x2="360" y2="464" stroke="#0066cc" stroke-width="2" marker-end="url(#ar)"/>

  <!-- 팀장 B -->
  <rect x="282" y="468" width="156" height="54" rx="11" ry="11" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
  <text x="360" y="492" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="16" fill="#1d1d1f" text-anchor="middle" font-weight="bold">팀장</text>
  <text x="360" y="510" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="12" fill="#0066cc" text-anchor="middle">단일 입구</text>

  <!-- 5 members B (row, y=580) -->
  <rect x="30" y="580" width="114" height="48" rx="9" ry="9" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="87" y="610" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="14" fill="#1d1d1f" text-anchor="middle" font-weight="bold">민준</text>
  <rect x="167" y="580" width="114" height="48" rx="9" ry="9" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="224" y="610" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="14" fill="#1d1d1f" text-anchor="middle" font-weight="bold">지훈</text>
  <rect x="304" y="580" width="114" height="48" rx="9" ry="9" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="361" y="610" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="14" fill="#1d1d1f" text-anchor="middle" font-weight="bold">수아</text>
  <rect x="441" y="580" width="114" height="48" rx="9" ry="9" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="498" y="610" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="14" fill="#1d1d1f" text-anchor="middle" font-weight="bold">서연</text>
  <rect x="578" y="580" width="114" height="48" rx="9" ry="9" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="635" y="610" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="14" fill="#1d1d1f" text-anchor="middle" font-weight="bold">태양</text>

  <!-- 팀장→5 members (clean fan-out) -->
  <line x1="360" y1="522" x2="95" y2="578" stroke="#0066cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="360" y1="522" x2="227" y2="578" stroke="#0066cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="360" y1="522" x2="361" y2="578" stroke="#0066cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="360" y1="522" x2="495" y2="578" stroke="#0066cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="360" y1="522" x2="627" y2="578" stroke="#0066cc" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="360" y="652" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="11.5" fill="#7a7a7a" text-anchor="middle">팀장이 단일 입구로 받아 분배 → 중복·누락 차단</text>
</svg>
