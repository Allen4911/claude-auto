<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360">
<rect width="900" height="360" fill="#1e1e2e"/>
<text x="450" y="38" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="22" fill="#cdd6f4" text-anchor="middle" font-weight="bold">세션 접속 3가지 방법</text>
<text x="450" y="62" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="14" fill="#a6adc8" text-anchor="middle">직접 URL · QR 코드 · 세션 목록 — 모두 같은 세션에 연결</text>

<!-- Center: Local Session -->
<rect x="340" y="150" width="220" height="90" rx="12" fill="#181825" stroke="#a6e3a1" stroke-width="2.5"/>
<text x="450" y="184" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="15" fill="#a6e3a1" text-anchor="middle" font-weight="bold">로컬 Claude Code</text>
<text x="450" y="204" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" fill="#a6adc8" text-anchor="middle">세션 ID: abc-123</text>
<text x="450" y="224" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="12" fill="#a6e3a1" text-anchor="middle">&gt; _</text>

<!-- Method 1: Direct URL (top-left) -->
<rect x="30" y="88" width="230" height="90" rx="8" fill="#313244" stroke="#89b4fa" stroke-width="2"/>
<text x="145" y="112" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="13" fill="#89b4fa" text-anchor="middle" font-weight="bold">① 직접 URL</text>
<text x="145" y="130" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="10" fill="#cdd6f4" text-anchor="middle">claude.ai/code</text>
<text x="145" y="146" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="10" fill="#a6adc8" text-anchor="middle">?session=&lt;session-id&gt;</text>
<text x="145" y="164" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="11" fill="#a6adc8" text-anchor="middle">브라우저 주소창에 직접 입력</text>

<!-- Arrow from Method 1 to center -->
<line x1="262" y1="174" x2="337" y2="192" stroke="#89b4fa" stroke-width="2"/>
<polygon points="337,192 327,186 329,196" fill="#89b4fa"/>

<!-- Method 2: QR Code (top-right) -->
<rect x="640" y="88" width="230" height="90" rx="8" fill="#313244" stroke="#f9e2af" stroke-width="2"/>
<text x="755" y="112" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="13" fill="#f9e2af" text-anchor="middle" font-weight="bold">② QR 코드 스캔</text>
<text x="755" y="130" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="11" fill="#cdd6f4" text-anchor="middle">서버 모드 실행 후</text>
<text x="755" y="148" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="11" fill="#a6e3a1" text-anchor="middle">Space 키 → QR 표시</text>
<text x="755" y="166" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="11" fill="#a6adc8" text-anchor="middle">폰 카메라로 스캔</text>

<!-- Arrow from Method 2 to center -->
<line x1="638" y1="174" x2="563" y2="192" stroke="#f9e2af" stroke-width="2"/>
<polygon points="563,192 573,186 571,196" fill="#f9e2af"/>

<!-- Method 3: Session List (bottom) -->
<rect x="320" y="278" width="260" height="58" rx="8" fill="#313244" stroke="#cba6f7" stroke-width="2"/>
<text x="450" y="301" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="13" fill="#cba6f7" text-anchor="middle" font-weight="bold">③ 세션 목록에서 선택</text>
<text x="450" y="320" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="11" fill="#a6adc8" text-anchor="middle">claude.ai/code → PC 초록 점 → 세션 이름 클릭</text>

<!-- Arrow from center to Method 3 (upward for center to bottom) -->
<line x1="450" y1="242" x2="450" y2="276" stroke="#cba6f7" stroke-width="2"/>
<polygon points="450,278 444,268 456,268" fill="#cba6f7"/>

<!-- Device icons hint -->
<text x="145" y="76" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="13" fill="#89b4fa" text-anchor="middle">[ 웹 ]</text>
<text x="755" y="76" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="13" fill="#f9e2af" text-anchor="middle">[ 모바일 ]</text>
<text x="450" y="272" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="13" fill="#cba6f7" text-anchor="middle">[ 목록 ]</text>
</svg>
