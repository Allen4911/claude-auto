<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{margin:0;background:#f5f5f7;font-family:'Noto Sans CJK KR',DejaVu Sans,system-ui,sans-serif}</style></head><body>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="304" viewBox="0 0 900 380">
  <rect width="900" height="380" fill="#f5f5f7"/>
  <text x="450" y="35" fill="#1d1d1f" font-size="16" font-weight="bold" text-anchor="middle">TMUX 복구 상황 분류 트리</text>
  <!-- Root -->
  <rect x="325" y="58" width="250" height="44" rx="8" fill="#0066cc" stroke="#0066cc" stroke-width="2"/>
  <text x="450" y="85" fill="#1d1d1f" font-size="14" font-weight="bold" text-anchor="middle">문제 발생</text>
  <!-- branches -->
  <line x1="450" y1="102" x2="110" y2="160" stroke="#c7c7cc" stroke-width="1.5"/>
  <line x1="450" y1="102" x2="310" y2="160" stroke="#c7c7cc" stroke-width="1.5"/>
  <line x1="450" y1="102" x2="590" y2="160" stroke="#c7c7cc" stroke-width="1.5"/>
  <line x1="450" y1="102" x2="790" y2="160" stroke="#c7c7cc" stroke-width="1.5"/>
  <!-- Branch 1: SSH 끊김 - low risk -->
  <rect x="30" y="160" width="160" height="48" rx="8" fill="#ffffff" stroke="#0066cc" stroke-width="1.5"/>
  <text x="110" y="180" fill="#0066cc" font-size="12" font-weight="bold" text-anchor="middle">SSH 연결 끊김</text>
  <rect x="50" y="186" width="120" height="18" rx="4" fill="#ffffff"/>
  <text x="110" y="199" fill="#0066cc" font-size="10" font-weight="bold" text-anchor="middle">🟢 낮은 위험</text>
  <!-- Branch 2: Claude only -->
  <rect x="230" y="160" width="160" height="48" rx="8" fill="#ffffff" stroke="#0066cc" stroke-width="1.5"/>
  <text x="310" y="180" fill="#0066cc" font-size="12" font-weight="bold" text-anchor="middle">Claude만 종료</text>
  <rect x="250" y="186" width="120" height="18" rx="4" fill="#ffffff"/>
  <text x="310" y="199" fill="#0066cc" font-size="10" font-weight="bold" text-anchor="middle">🟡 중간 위험</text>
  <!-- Branch 3: TMUX crash -->
  <rect x="510" y="160" width="160" height="48" rx="8" fill="#ffffff" stroke="#0066cc" stroke-width="1.5"/>
  <text x="590" y="180" fill="#0066cc" font-size="12" font-weight="bold" text-anchor="middle">TMUX 서버 크래시</text>
  <rect x="530" y="186" width="120" height="18" rx="4" fill="#ffffff"/>
  <text x="590" y="199" fill="#0066cc" font-size="10" font-weight="bold" text-anchor="middle">🔴 높은 위험</text>
  <!-- Branch 4: Reboot -->
  <rect x="710" y="160" width="160" height="48" rx="8" fill="#ffffff" stroke="#0066cc" stroke-width="1.5"/>
  <text x="790" y="180" fill="#0066cc" font-size="12" font-weight="bold" text-anchor="middle">시스템 재부팅</text>
  <rect x="730" y="186" width="120" height="18" rx="4" fill="#ffffff"/>
  <text x="790" y="199" fill="#0066cc" font-size="10" font-weight="bold" text-anchor="middle">🔴 높은 위험</text>
  <!-- Recovery methods -->
  <line x1="110" y1="208" x2="110" y2="255" stroke="#0066cc" stroke-width="1.2"/>
  <line x1="310" y1="208" x2="310" y2="255" stroke="#0066cc" stroke-width="1.2"/>
  <line x1="590" y1="208" x2="590" y2="255" stroke="#0066cc" stroke-width="1.2"/>
  <line x1="790" y1="208" x2="790" y2="255" stroke="#0066cc" stroke-width="1.2"/>
  <rect x="30" y="255" width="160" height="50" rx="6" fill="#ffffff"/>
  <text x="110" y="275" fill="#1d1d1f" font-size="10" text-anchor="middle">tmux ls 확인</text>
  <text x="110" y="290" fill="#0066cc" font-size="10" font-weight="bold" text-anchor="middle">→ tmux attach -t team</text>
  <rect x="230" y="255" width="160" height="50" rx="6" fill="#ffffff"/>
  <text x="310" y="275" fill="#1d1d1f" font-size="10" text-anchor="middle">파인에서</text>
  <text x="310" y="290" fill="#0066cc" font-size="10" font-weight="bold" text-anchor="middle">→ claude 재실행</text>
  <rect x="510" y="255" width="160" height="50" rx="6" fill="#ffffff"/>
  <text x="590" y="275" fill="#1d1d1f" font-size="10" text-anchor="middle">전체 재구성</text>
  <text x="590" y="290" fill="#0066cc" font-size="10" font-weight="bold" text-anchor="middle">→ setup-team.sh</text>
  <rect x="710" y="255" width="160" height="50" rx="6" fill="#ffffff"/>
  <text x="790" y="275" fill="#1d1d1f" font-size="10" text-anchor="middle">전체 재구성</text>
  <text x="790" y="290" fill="#0066cc" font-size="10" font-weight="bold" text-anchor="middle">→ setup-team.sh</text>
  <!-- Impact labels -->
  <text x="110" y="330" fill="#0066cc" font-size="10" text-anchor="middle">데이터 손실 없음</text>
  <text x="310" y="330" fill="#0066cc" font-size="10" text-anchor="middle">해당 파인만 영향</text>
  <text x="590" y="330" fill="#0066cc" font-size="10" text-anchor="middle">전체 재구성 필요</text>
  <text x="790" y="330" fill="#0066cc" font-size="10" text-anchor="middle">전체 재구성 필요</text>
  <text x="450" y="360" fill="#c7c7cc" font-size="11" text-anchor="middle">위험도가 높을수록 복구 시간이 길어짐 — 자동화 스크립트로 단축 가능</text>
</svg>
</body></html>
