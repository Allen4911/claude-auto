<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>body { margin: 0; background: #f5f5f7; display: flex; justify-content: center; padding: 40px 0; }</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="580" viewBox="0 0 720 580" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0066cc"/>
    </marker>
    <marker id="arrow-dash" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7a7a7a"/>
    </marker>
  </defs>
  <rect width="720" height="580" fill="#f5f5f7"/>

  <!-- 제목 -->
  <rect x="30" y="20" width="660" height="50" rx="11" ry="11" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
  <text x="360" y="40" text-anchor="middle" font-size="15" font-weight="bold" fill="#1d1d1f">지휘 체계 (Central Command)</text>
  <text x="360" y="57" text-anchor="middle" font-size="12" fill="#7a7a7a">앨런 → 쭌 → 민준 → 팀원 단방향 지시 / 단계별 보고</text>

  <!-- 앨런 -->
  <rect x="30" y="98" width="140" height="80" rx="11" ry="11" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
  <circle cx="100" cy="122" r="16" fill="#0066cc"/>
  <text x="100" y="128" text-anchor="middle" font-size="14" fill="#ffffff">👤</text>
  <text x="100" y="152" text-anchor="middle" font-size="13" font-weight="bold" fill="#1d1d1f">앨런</text>
  <text x="100" y="168" text-anchor="middle" font-size="11" fill="#7a7a7a">(사용자)</text>

  <!-- → 쭌 -->
  <line x1="170" y1="138" x2="208" y2="138" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 쭌 -->
  <rect x="210" y="98" width="140" height="80" rx="11" ry="11" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
  <circle cx="280" cy="122" r="16" fill="#0066cc"/>
  <text x="280" y="128" text-anchor="middle" font-size="14" fill="#ffffff">👤</text>
  <text x="280" y="152" text-anchor="middle" font-size="13" font-weight="bold" fill="#1d1d1f">쭌</text>
  <text x="280" y="168" text-anchor="middle" font-size="11" fill="#7a7a7a">(팀장)</text>

  <!-- → 민준 -->
  <line x1="350" y1="138" x2="388" y2="138" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 민준 -->
  <rect x="390" y="98" width="140" height="80" rx="11" ry="11" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
  <circle cx="460" cy="122" r="16" fill="#0066cc"/>
  <text x="460" y="128" text-anchor="middle" font-size="14" fill="#ffffff">👤</text>
  <text x="460" y="152" text-anchor="middle" font-size="13" font-weight="bold" fill="#1d1d1f">민준</text>
  <text x="460" y="168" text-anchor="middle" font-size="11" fill="#7a7a7a">(PM)</text>

  <!-- → 팀원들 -->
  <line x1="530" y1="138" x2="560" y2="138" stroke="#0066cc" stroke-width="2"/>
  <line x1="560" y1="138" x2="560" y2="108" stroke="#0066cc" stroke-width="2"/>
  <line x1="560" y1="108" x2="590" y2="108" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="560" y1="138" x2="590" y2="138" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="560" y1="138" x2="560" y2="168" stroke="#0066cc" stroke-width="2"/>
  <line x1="560" y1="168" x2="590" y2="168" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 팀원 3명 -->
  <!-- 서연 -->
  <rect x="592" y="82" width="115" height="55" rx="8" ry="8" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="650" y="104" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d1d1f">서연</text>
  <text x="650" y="120" text-anchor="middle" font-size="10" fill="#7a7a7a">(개발)</text>
  <text x="650" y="132" text-anchor="middle" font-size="9" fill="#0066cc">⚙️ 구현</text>

  <!-- 태양 -->
  <rect x="592" y="120" width="115" height="55" rx="8" ry="8" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="650" y="142" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d1d1f">태양</text>
  <text x="650" y="158" text-anchor="middle" font-size="10" fill="#7a7a7a">(리뷰)</text>
  <text x="650" y="170" text-anchor="middle" font-size="9" fill="#0066cc">🔎 검토</text>

  <!-- 지훈 -->
  <rect x="592" y="158" width="115" height="55" rx="8" ry="8" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="650" y="180" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d1d1f">지훈</text>
  <text x="650" y="196" text-anchor="middle" font-size="10" fill="#7a7a7a">(리서치)</text>
  <text x="650" y="208" text-anchor="middle" font-size="9" fill="#0066cc">🔍 조사</text>

  <!-- 콜아웃 1: 모든 문제·지연은 민준이 해결 -->
  <rect x="200" y="240" width="330" height="90" rx="11" ry="11" fill="#fff8e1" stroke="#0066cc" stroke-width="1.5"/>
  <text x="225" y="263" font-size="12" font-weight="bold" fill="#0066cc">⚠️ 모든 문제·지연은 민준이 해결</text>
  <text x="225" y="283" font-size="11" fill="#1d1d1f">(문제 식별 → 원인 분석 → 해결 → 공유)</text>
  <!-- 연결선 -->
  <line x1="460" y1="178" x2="460" y2="235" stroke="#7a7a7a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-dash)"/>

  <!-- 콜아웃 2: 쭌에게는 Phase 단위로만 보고 -->
  <rect x="200" y="355" width="330" height="75" rx="11" ry="11" fill="#e8f4ff" stroke="#0066cc" stroke-width="1.5"/>
  <text x="365" y="378" text-anchor="middle" font-size="12" font-weight="bold" fill="#0066cc">📋 쭌에게는 Phase 단위로만 보고</text>
  <text x="365" y="397" text-anchor="middle" font-size="11" fill="#1d1d1f">(진행 상황 / 완료 / 다음 계획)</text>
  <!-- 연결선 -->
  <line x1="280" y1="178" x2="280" y2="350" stroke="#7a7a7a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-dash)"/>

  <!-- 지휘 체계 요약 -->
  <rect x="30" y="460" width="660" height="80" rx="11" ry="11" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="360" y="485" text-anchor="middle" font-size="13" font-weight="bold" fill="#1d1d1f">지휘 원칙</text>
  <text x="80" y="508" font-size="11" fill="#1d1d1f">✦ 앨런 지시 → 쭌 수령 → 민준 실행 지시 → 팀원 수행</text>
  <text x="80" y="526" font-size="11" fill="#1d1d1f">✦ 팀원 문제 → 민준 직접 해결  |  쭌 보고 → Phase 완료 단위만</text>
</svg>
</body>
</html>
