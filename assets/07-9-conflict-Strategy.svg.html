<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>body { margin: 0; background: #f5f5f7; display: flex; justify-content: center; padding: 40px 0; }</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="840" viewBox="0 0 720 840" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0066cc"/>
    </marker>
  </defs>
  <rect width="720" height="840" fill="#f5f5f7"/>

  <!-- 제목 -->
  <rect x="30" y="18" width="660" height="50" rx="11" ry="11" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
  <text x="360" y="38" text-anchor="middle" font-size="15" font-weight="bold" fill="#1d1d1f">충돌 방지 전략</text>
  <text x="360" y="56" text-anchor="middle" font-size="12" fill="#7a7a7a">역할별 파일 소관 · 순차 실행 · 브랜치 전략</text>

  <!-- 원칙 1 -->
  <rect x="30" y="86" width="660" height="210" rx="11" ry="11" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
  <circle cx="60" cy="108" r="18" fill="#0066cc"/>
  <text x="60" y="114" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">1</text>
  <text x="90" y="108" font-size="14" font-weight="bold" fill="#1d1d1f">원칙 1: 역할별 파일 소관</text>
  <text x="90" y="126" font-size="11" fill="#7a7a7a">팀 에이전트는 각자 맡은 영역만 수정합니다. 동일 파일에 여러 에이전트가 수정하면 충돌이 발생합니다.</text>

  <!-- 서연 -->
  <rect x="42" y="140" width="190" height="140" rx="8" ry="8" fill="#f5f5f7" stroke="#e0e0e0" stroke-width="1.5"/>
  <circle cx="80" cy="160" r="14" fill="#e8e8ed"/>
  <text x="80" y="165" text-anchor="middle" font-size="12" fill="#1d1d1f">서</text>
  <text x="110" y="163" font-size="12" font-weight="bold" fill="#1d1d1f">서연 (개발)</text>
  <line x1="55" y1="178" x2="220" y2="178" stroke="#e0e0e0" stroke-width="1"/>
  <text x="55" y="196" font-size="10" fill="#0066cc" font-family="Courier New, Consolas, monospace">src/features/ → 기능 구현</text>
  <text x="55" y="212" font-size="10" fill="#0066cc" font-family="Courier New, Consolas, monospace">src/styles/ → 스타일 수정</text>
  <text x="55" y="228" font-size="10" fill="#0066cc" font-family="Courier New, Consolas, monospace">tests/ → 테스트 파일</text>
  <text x="55" y="244" font-size="10" fill="#0066cc" font-family="Courier New, Consolas, monospace">package.json → 의존성</text>
  <text x="55" y="260" font-size="10" fill="#0066cc" font-family="Courier New, Consolas, monospace">docs/ → API 문서</text>

  <!-- 태양 -->
  <rect x="245" y="140" width="190" height="140" rx="8" ry="8" fill="#f5f5f7" stroke="#e0e0e0" stroke-width="1.5"/>
  <circle cx="283" cy="160" r="14" fill="#e8e8ed"/>
  <text x="283" y="165" text-anchor="middle" font-size="12" fill="#1d1d1f">태</text>
  <text x="313" y="163" font-size="12" font-weight="bold" fill="#1d1d1f">태양 (리뷰)</text>
  <line x1="258" y1="178" x2="423" y2="178" stroke="#e0e0e0" stroke-width="1"/>
  <text x="258" y="196" font-size="10" fill="#0066cc" font-family="Courier New, Consolas, monospace">REVIEW.md → 리뷰 기록</text>
  <text x="258" y="212" font-size="10" fill="#0066cc" font-family="Courier New, Consolas, monospace">.github/PR → PR 템플릿</text>
  <text x="258" y="228" font-size="10" fill="#0066cc" font-family="Courier New, Consolas, monospace">docs/review/ → 가이드</text>

  <!-- 수아 -->
  <rect x="448" y="140" width="228" height="140" rx="8" ry="8" fill="#f5f5f7" stroke="#e0e0e0" stroke-width="1.5"/>
  <circle cx="486" cy="160" r="14" fill="#e8e8ed"/>
  <text x="486" y="165" text-anchor="middle" font-size="12" fill="#1d1d1f">수</text>
  <text x="516" y="163" font-size="12" font-weight="bold" fill="#1d1d1f">수아 (디자이너)</text>
  <line x1="461" y1="178" x2="664" y2="178" stroke="#e0e0e0" stroke-width="1"/>
  <text x="461" y="196" font-size="10" fill="#0066cc" font-family="Courier New, Consolas, monospace">src/styles/ → 스타일 수정</text>
  <text x="461" y="212" font-size="10" fill="#0066cc" font-family="Courier New, Consolas, monospace">assets/ → 이미지/SVG</text>
  <text x="461" y="228" font-size="10" fill="#0066cc" font-family="Courier New, Consolas, monospace">PLAN.md → 기획 문서</text>

  <!-- 원칙 2 -->
  <rect x="30" y="312" width="660" height="145" rx="11" ry="11" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
  <circle cx="60" cy="334" r="18" fill="#0066cc"/>
  <text x="60" y="340" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">2</text>
  <text x="90" y="334" font-size="14" font-weight="bold" fill="#1d1d1f">원칙 2: 순차 실행으로 의존성 관리</text>
  <text x="90" y="352" font-size="11" fill="#7a7a7a">설계 → 구현 → 테스트 → 리뷰 흐름을 지켜 의존성 충돌을 방지합니다.</text>

  <!-- 순차 흐름 -->
  <rect x="48" y="368" width="160" height="72" rx="8" ry="8" fill="#f0f4ff" stroke="#0066cc" stroke-width="1.5"/>
  <text x="128" y="393" text-anchor="middle" font-size="11" font-weight="bold" fill="#0066cc">1. 설계 (민준)</text>
  <text x="128" y="411" text-anchor="middle" font-size="10" fill="#7a7a7a">기능 구조 및 텍스트</text>
  <text x="128" y="428" text-anchor="middle" font-size="10" fill="#7a7a7a">doc/PLAN.md 작성</text>

  <line x1="208" y1="404" x2="235" y2="404" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="237" y="368" width="160" height="72" rx="8" ry="8" fill="#f0f4ff" stroke="#0066cc" stroke-width="1.5"/>
  <text x="317" y="393" text-anchor="middle" font-size="11" font-weight="bold" fill="#0066cc">2. 구현 (서연)</text>
  <text x="317" y="411" text-anchor="middle" font-size="10" fill="#7a7a7a">코드 및 테스트</text>
  <text x="317" y="428" text-anchor="middle" font-size="10" fill="#7a7a7a">feature 브랜치 작업</text>

  <line x1="397" y1="404" x2="424" y2="404" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="426" y="368" width="160" height="72" rx="8" ry="8" fill="#f0f4ff" stroke="#0066cc" stroke-width="1.5"/>
  <text x="506" y="393" text-anchor="middle" font-size="11" font-weight="bold" fill="#0066cc">3. 리뷰 (태양)</text>
  <text x="506" y="411" text-anchor="middle" font-size="10" fill="#7a7a7a">코드 품질 검토</text>
  <text x="506" y="428" text-anchor="middle" font-size="10" fill="#7a7a7a">PR 리뷰 및 승인</text>

  <text x="608" y="397" font-size="25" fill="#0066cc">→</text>
  <text x="612" y="412" font-size="10" fill="#7a7a7a">완료</text>
  <text x="612" y="426" font-size="10" fill="#7a7a7a">머지</text>

  <!-- 원칙 3 -->
  <rect x="30" y="472" width="660" height="260" rx="11" ry="11" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
  <circle cx="60" cy="494" r="18" fill="#0066cc"/>
  <text x="60" y="500" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">3</text>
  <text x="90" y="494" font-size="14" font-weight="bold" fill="#1d1d1f">원칙 3: 브랜치 전략</text>
  <text x="90" y="512" font-size="11" fill="#7a7a7a">Phase별 브랜치로 main 브랜치 변경을 방지합니다.</text>

  <!-- 브랜치 명령어 박스 -->
  <rect x="42" y="524" width="380" height="190" rx="7" ry="7" fill="#f0f0f0" stroke="#c7c7cc" stroke-width="1"/>
  <circle cx="56" cy="535" r="5" fill="#ff5f57"/>
  <circle cx="70" cy="535" r="5" fill="#febc2e"/>
  <circle cx="84" cy="535" r="5" fill="#28c840"/>
  <text x="50" y="555" font-size="10" fill="#7a7a7a" font-family="Courier New, Consolas, monospace"># 브랜치 생성</text>
  <text x="50" y="571" font-size="10" fill="#1d1d1f" font-family="Courier New, Consolas, monospace">git checkout -b feature/phase-3-ai-comparison</text>
  <text x="50" y="589" font-size="10" fill="#1d1d1f" font-family="Courier New, Consolas, monospace">git checkout -b feature/phase-3-price-history</text>
  <text x="50" y="607" font-size="10" fill="#1d1d1f" font-family="Courier New, Consolas, monospace">git checkout -b feature/phase-3-b-update</text>
  <text x="50" y="628" font-size="10" fill="#7a7a7a" font-family="Courier New, Consolas, monospace"># 작업 후 main에 머지</text>
  <text x="50" y="644" font-size="10" fill="#1d1d1f" font-family="Courier New, Consolas, monospace">git push origin feature/phase-3-ai-comparison</text>
  <text x="50" y="662" font-size="10" fill="#7a7a7a" font-family="Courier New, Consolas, monospace"># PR 생성 후 태양 리뷰 → 머지</text>
  <text x="50" y="698" font-size="10" fill="#7a7a7a" font-family="Courier New, Consolas, monospace">git checkout main &amp;&amp; git pull origin main</text>

  <!-- 브랜치 다이어그램 -->
  <rect x="440" y="524" width="232" height="190" rx="7" ry="7" fill="#f0f4ff" stroke="#0066cc" stroke-width="1"/>
  <text x="556" y="545" text-anchor="middle" font-size="11" font-weight="bold" fill="#0066cc">브랜치 흐름</text>
  <text x="450" y="568" font-size="10" fill="#1d1d1f" font-family="Courier New, Consolas, monospace">main</text>
  <line x1="490" y1="564" x2="655" y2="564" stroke="#0066cc" stroke-width="2"/>
  <text x="450" y="595" font-size="9" fill="#7a7a7a">Phase 1 브랜치</text>
  <line x1="510" y1="564" x2="510" y2="585" stroke="#7a7a7a" stroke-width="1.5"/>
  <line x1="510" y1="585" x2="655" y2="585" stroke="#7a7a7a" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="450" y="618" font-size="9" fill="#7a7a7a">Phase 2 브랜치</text>
  <line x1="540" y1="564" x2="540" y2="608" stroke="#7a7a7a" stroke-width="1.5"/>
  <line x1="540" y1="608" x2="655" y2="608" stroke="#7a7a7a" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="450" y="641" font-size="9" fill="#7a7a7a">Phase 3 브랜치</text>
  <line x1="570" y1="564" x2="570" y2="631" stroke="#7a7a7a" stroke-width="1.5"/>
  <line x1="570" y1="631" x2="655" y2="631" stroke="#7a7a7a" stroke-width="1.5" stroke-dasharray="4,2"/>
  <circle cx="655" cy="564" r="6" fill="#0066cc"/>
  <text x="450" y="700" font-size="10" fill="#0066cc">PR → 리뷰 → 머지</text>

  <!-- 핵심 정리 -->
  <rect x="30" y="748" width="660" height="60" rx="11" ry="11" fill="#0066cc"/>
  <text x="360" y="772" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Phase 완료 후 main에 merge: 팀원별 파일 소관 + 순차 실행 + 브랜치 전략</text>
  <text x="360" y="795" text-anchor="middle" font-size="12" fill="#e0eeff">이 3원칙이 지켜질 때 충돌 없는 팀 협업이 가능합니다.</text>
</svg>
</body>
</html>
