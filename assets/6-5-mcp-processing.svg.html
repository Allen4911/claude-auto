<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>body { margin: 0; background: #f5f5f7; display: flex; justify-content: center; padding: 40px 0; }</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="620" viewBox="0 0 720 620" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0066cc"/>
    </marker>
    <marker id="arrow-left" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#0066cc"/>
    </marker>
  </defs>
  <rect width="720" height="620" fill="#f5f5f7"/>

  <!-- 제목 -->
  <rect x="30" y="20" width="660" height="50" rx="11" ry="11" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
  <text x="360" y="40" text-anchor="middle" font-size="15" font-weight="bold" fill="#1d1d1f">MCP 처리 구조</text>
  <text x="360" y="58" text-anchor="middle" font-size="12" fill="#7a7a7a">Claude Code ↔ MCP 클라이언트 ↔ MCP 서버 ↔ 외부 도구/서비스</text>

  <!-- 컬럼 헤더 -->
  <rect x="15" y="90" width="163" height="40" rx="8" ry="8" fill="#0066cc"/>
  <text x="96" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Claude Code</text>

  <rect x="188" y="90" width="163" height="40" rx="8" ry="8" fill="#0066cc"/>
  <text x="270" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">MCP 클라이언트</text>

  <rect x="361" y="90" width="163" height="40" rx="8" ry="8" fill="#0066cc"/>
  <text x="443" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">MCP 서버</text>

  <rect x="534" y="90" width="171" height="40" rx="8" ry="8" fill="#0066cc"/>
  <text x="620" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">외부 도구/서비스</text>

  <!-- Claude Code 컬럼 내용 -->
  <rect x="15" y="145" width="163" height="400" rx="8" ry="8" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <circle cx="96" cy="175" r="22" fill="#0066cc"/>
  <text x="96" y="181" text-anchor="middle" font-size="18" fill="#ffffff">✦</text>
  <text x="96" y="215" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d1d1f">Claude Code</text>
  <text x="96" y="233" text-anchor="middle" font-size="10" fill="#7a7a7a">AI 코딩 어시스턴트</text>
  <text x="96" y="249" text-anchor="middle" font-size="10" fill="#7a7a7a">사용자 의도를 파악하고</text>
  <text x="96" y="264" text-anchor="middle" font-size="10" fill="#7a7a7a">도구를 활용해 작업</text>
  <line x1="30" y1="285" x2="163" y2="285" stroke="#e0e0e0" stroke-width="1"/>
  <text x="96" y="305" text-anchor="middle" font-size="11" font-weight="bold" fill="#0066cc">주요 기능</text>
  <text x="96" y="323" text-anchor="middle" font-size="10" fill="#7a7a7a">· 자연어 이해</text>
  <text x="96" y="339" text-anchor="middle" font-size="10" fill="#7a7a7a">· 코드 생성/수정</text>
  <text x="96" y="355" text-anchor="middle" font-size="10" fill="#7a7a7a">· 작업 계획</text>
  <text x="96" y="371" text-anchor="middle" font-size="10" fill="#7a7a7a">· 결과 해석 및 답변</text>

  <!-- MCP 클라이언트 컬럼 -->
  <rect x="188" y="145" width="163" height="400" rx="8" ry="8" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <rect x="213" y="158" width="115" height="50" rx="6" ry="6" fill="#f0f0f0" stroke="#c7c7cc" stroke-width="1"/>
  <text x="270" y="181" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d1d1f">MCP 클라이언트</text>
  <text x="270" y="197" text-anchor="middle" font-size="9" fill="#7a7a7a">Claude Code 내장</text>
  <text x="270" y="222" text-anchor="middle" font-size="10" fill="#7a7a7a">Claude Code와 MCP 서버 간</text>
  <text x="270" y="237" text-anchor="middle" font-size="10" fill="#7a7a7a">통신을 담당하는</text>
  <text x="270" y="252" text-anchor="middle" font-size="10" fill="#7a7a7a">클라이언트입니다.</text>
  <line x1="203" y1="272" x2="336" y2="272" stroke="#e0e0e0" stroke-width="1"/>
  <text x="270" y="292" text-anchor="middle" font-size="11" font-weight="bold" fill="#0066cc">주요 기능</text>
  <text x="270" y="310" text-anchor="middle" font-size="10" fill="#7a7a7a">· 서버 연결 및 관리</text>
  <text x="270" y="326" text-anchor="middle" font-size="10" fill="#7a7a7a">· 도구/명령 호출</text>
  <text x="270" y="342" text-anchor="middle" font-size="10" fill="#7a7a7a">· 프로토콜 변환</text>
  <text x="270" y="358" text-anchor="middle" font-size="10" fill="#7a7a7a">· 결과 파싱 및 반환</text>
  <line x1="203" y1="378" x2="336" y2="378" stroke="#e0e0e0" stroke-width="1"/>
  <text x="270" y="398" text-anchor="middle" font-size="10" font-weight="bold" fill="#7a7a7a">프로토콜</text>
  <text x="270" y="414" text-anchor="middle" font-size="10" fill="#7a7a7a">MCP (Model Context</text>
  <text x="270" y="430" text-anchor="middle" font-size="10" fill="#7a7a7a">Protocol)</text>

  <!-- MCP 서버 컬럼 -->
  <rect x="361" y="145" width="163" height="400" rx="8" ry="8" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <rect x="386" y="158" width="115" height="50" rx="6" ry="6" fill="#f0f0f0" stroke="#c7c7cc" stroke-width="1"/>
  <text x="443" y="181" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d1d1f">MCP 서버</text>
  <text x="443" y="197" text-anchor="middle" font-size="9" fill="#7a7a7a">도구 제공자</text>
  <text x="443" y="222" text-anchor="middle" font-size="10" fill="#7a7a7a">클라이언트의 요청을 처리하고</text>
  <text x="443" y="237" text-anchor="middle" font-size="10" fill="#7a7a7a">외부 도구/서비스에 접근</text>
  <text x="443" y="252" text-anchor="middle" font-size="10" fill="#7a7a7a">가능한 서버입니다.</text>
  <line x1="376" y1="272" x2="509" y2="272" stroke="#e0e0e0" stroke-width="1"/>
  <text x="443" y="292" text-anchor="middle" font-size="11" font-weight="bold" fill="#0066cc">주요 기능</text>
  <text x="443" y="310" text-anchor="middle" font-size="10" fill="#7a7a7a">· 도구 라우팅</text>
  <text x="443" y="326" text-anchor="middle" font-size="10" fill="#7a7a7a">· 도구/서비스 연결</text>
  <text x="443" y="342" text-anchor="middle" font-size="10" fill="#7a7a7a">· 인증 및 권한 관리</text>
  <text x="443" y="358" text-anchor="middle" font-size="10" fill="#7a7a7a">· 결과 취합 및 반환</text>
  <line x1="376" y1="378" x2="509" y2="378" stroke="#e0e0e0" stroke-width="1"/>
  <text x="443" y="398" text-anchor="middle" font-size="10" font-weight="bold" fill="#7a7a7a">지원 기능</text>
  <text x="443" y="414" text-anchor="middle" font-size="10" fill="#7a7a7a">· 여러 도구 관리</text>
  <text x="443" y="430" text-anchor="middle" font-size="10" fill="#7a7a7a">· 캐시 및 상태 관리</text>

  <!-- 외부 도구/서비스 컬럼 -->
  <rect x="534" y="145" width="171" height="400" rx="8" ry="8" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="620" y="175" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d1d1f">외부 도구/서비스</text>
  <text x="620" y="193" text-anchor="middle" font-size="10" fill="#7a7a7a">MCP 서버를 통해 접근 가능한</text>
  <text x="620" y="208" text-anchor="middle" font-size="10" fill="#7a7a7a">12개 이상 서비스</text>
  <line x1="549" y1="225" x2="690" y2="225" stroke="#e0e0e0" stroke-width="1"/>
  <text x="620" y="245" text-anchor="middle" font-size="11" font-weight="bold" fill="#0066cc">예시</text>
  <!-- 도구 목록 -->
  <rect x="549" y="255" width="142" height="26" rx="5" ry="5" fill="#f0f4ff" stroke="#0066cc" stroke-width="1"/>
  <text x="620" y="272" text-anchor="middle" font-size="11" fill="#0066cc">📁 파일 시스템</text>
  <rect x="549" y="287" width="142" height="26" rx="5" ry="5" fill="#f0f4ff" stroke="#0066cc" stroke-width="1"/>
  <text x="620" y="304" text-anchor="middle" font-size="11" fill="#0066cc">📂 Git 저장소</text>
  <rect x="549" y="319" width="142" height="26" rx="5" ry="5" fill="#f0f4ff" stroke="#0066cc" stroke-width="1"/>
  <text x="620" y="336" text-anchor="middle" font-size="11" fill="#0066cc">🗄️ 데이터베이스</text>
  <rect x="549" y="351" width="142" height="26" rx="5" ry="5" fill="#f0f4ff" stroke="#0066cc" stroke-width="1"/>
  <text x="620" y="368" text-anchor="middle" font-size="11" fill="#0066cc">🌐 웹 API</text>
  <rect x="549" y="383" width="142" height="26" rx="5" ry="5" fill="#f0f4ff" stroke="#0066cc" stroke-width="1"/>
  <text x="620" y="400" text-anchor="middle" font-size="11" fill="#0066cc">☁️ 클라우드 서비스</text>
  <rect x="549" y="415" width="142" height="26" rx="5" ry="5" fill="#e8e8ed" stroke="#c7c7cc" stroke-width="1"/>
  <text x="620" y="432" text-anchor="middle" font-size="11" fill="#7a7a7a">+ 기타 도구</text>

  <!-- 화살표 (컬럼 간 연결) -->
  <!-- Claude Code ↔ MCP 클라이언트 -->
  <line x1="178" y1="300" x2="186" y2="300" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="188" y1="315" x2="178" y2="315" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow-left)"/>

  <!-- MCP 클라이언트 ↔ MCP 서버 -->
  <line x1="351" y1="300" x2="359" y2="300" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="361" y1="315" x2="351" y2="315" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow-left)"/>

  <!-- MCP 서버 ↔ 외부 도구 -->
  <line x1="524" y1="300" x2="532" y2="300" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="534" y1="315" x2="524" y2="315" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow-left)"/>

  <text x="360" y="580" text-anchor="middle" font-size="11" fill="#7a7a7a">MCP = Model Context Protocol | JSON-RPC 기반 표준 통신</text>
</svg>
</body>
</html>
