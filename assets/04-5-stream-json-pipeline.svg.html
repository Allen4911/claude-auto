<svg xmlns="http://www.w3.org/2000/svg" width="720" height="248" viewBox="0 0 900 310">
<rect width="900" height="310" fill="#f5f5f7"/>
<text x="450" y="38" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="22" fill="#1d1d1f" text-anchor="middle" font-weight="bold">파이프라인 데이터 흐름</text>
<text x="450" y="62" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="14" fill="#7a7a7a" text-anchor="middle">cat | claude -p | jq — 3단계 파이프 처리</text>

<!-- Step 1: cat -->
<rect x="40" y="90" width="200" height="100" rx="10" fill="#f0f0f0" stroke="#0066cc" stroke-width="2"/>
<text x="140" y="116" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="13" fill="#0066cc" text-anchor="middle" font-weight="bold">① 파일 내용</text>
<text x="140" y="138" font-family="Courier New, Consolas, DejaVu Sans Mono, monospace" font-size="13" fill="#0066cc" text-anchor="middle">cat main.py</text>
<line x1="56" y1="148" x2="224" y2="148" stroke="#e0e0e0" stroke-width="1"/>
<text x="140" y="168" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="11" fill="#7a7a7a" text-anchor="middle">파일 내용을 stdout으로</text>
<text x="140" y="184" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="11" fill="#7a7a7a" text-anchor="middle">출력</text>

<!-- Pipe 1 -->
<rect x="246" y="132" width="56" height="28" rx="6" fill="#e8e8ed"/>
<text x="274" y="150" font-family="Courier New, Consolas, DejaVu Sans Mono, monospace" font-size="16" fill="#0066cc" text-anchor="middle">|</text>
<line x1="242" y1="140" x2="244" y2="140" stroke="#0066cc" stroke-width="2"/>
<line x1="304" y1="140" x2="306" y2="140" stroke="#0066cc" stroke-width="2"/>

<!-- Step 2: claude -->
<rect x="308" y="90" width="284" height="100" rx="10" fill="#f0f0f0" stroke="#0066cc" stroke-width="2"/>
<text x="450" y="116" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="13" fill="#0066cc" text-anchor="middle" font-weight="bold">② Claude 분석</text>
<text x="450" y="138" font-family="Courier New, Consolas, DejaVu Sans Mono, monospace" font-size="12" fill="#0066cc" text-anchor="middle">claude -p "분석해줘" \</text>
<text x="450" y="154" font-family="Courier New, Consolas, DejaVu Sans Mono, monospace" font-size="12" fill="#0066cc" text-anchor="middle">  --output-format</text>
<text x="450" y="170" font-family="Courier New, Consolas, DejaVu Sans Mono, monospace" font-size="12" fill="#0066cc" text-anchor="middle">  stream-json</text>
<text x="450" y="184" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="11" fill="#7a7a7a" text-anchor="middle">NDJSON 스트림 출력</text>

<!-- Pipe 2 -->
<rect x="598" y="132" width="56" height="28" rx="6" fill="#e8e8ed"/>
<text x="626" y="150" font-family="Courier New, Consolas, DejaVu Sans Mono, monospace" font-size="16" fill="#0066cc" text-anchor="middle">|</text>

<!-- Step 3: jq -->
<rect x="660" y="90" width="200" height="100" rx="10" fill="#f0f0f0" stroke="#0066cc" stroke-width="2"/>
<text x="760" y="116" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="13" fill="#0066cc" text-anchor="middle" font-weight="bold">③ 결과 추출</text>
<text x="760" y="138" font-family="Courier New, Consolas, DejaVu Sans Mono, monospace" font-size="13" fill="#0066cc" text-anchor="middle">jq '.result'</text>
<line x1="676" y1="148" x2="844" y2="148" stroke="#e0e0e0" stroke-width="1"/>
<text x="760" y="168" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="11" fill="#7a7a7a" text-anchor="middle">JSON에서 원하는</text>
<text x="760" y="184" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="11" fill="#7a7a7a" text-anchor="middle">필드만 추출</text>

<!-- Data flow annotations -->
<text x="140" y="220" font-family="Courier New, Consolas, DejaVu Sans Mono, monospace" font-size="11" fill="#c7c7cc" text-anchor="middle">def fibonacci():</text>
<text x="140" y="236" font-family="Courier New, Consolas, DejaVu Sans Mono, monospace" font-size="11" fill="#c7c7cc" text-anchor="middle">  ...</text>

<line x1="242" y1="228" x2="306" y2="228" stroke="#e8e8ed" stroke-width="1.5" stroke-dasharray="4,3"/>
<polygon points="306,228 298,223 298,233" fill="#e8e8ed"/>

<text x="450" y="220" font-family="Courier New, Consolas, DejaVu Sans Mono, monospace" font-size="11" fill="#c7c7cc" text-anchor="middle">{"type":"result",</text>
<text x="450" y="236" font-family="Courier New, Consolas, DejaVu Sans Mono, monospace" font-size="11" fill="#c7c7cc" text-anchor="middle"> "result":"..."}</text>

<line x1="596" y1="228" x2="658" y2="228" stroke="#e8e8ed" stroke-width="1.5" stroke-dasharray="4,3"/>
<polygon points="658,228 650,223 650,233" fill="#e8e8ed"/>

<text x="760" y="220" font-family="Courier New, Consolas, DejaVu Sans Mono, monospace" font-size="11" fill="#0066cc" text-anchor="middle">"피보나치 함수는</text>
<text x="760" y="236" font-family="Courier New, Consolas, DejaVu Sans Mono, monospace" font-size="11" fill="#0066cc" text-anchor="middle"> 재귀적으로..."</text>

<!-- Bottom note -->
<text x="450" y="276" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="12" fill="#7a7a7a" text-anchor="middle">★ 파이프(|)로 연결해 파일 분석 → Claude 처리 → 결과 추출을 한 줄로 처리</text>
</svg>
