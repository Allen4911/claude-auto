<svg xmlns="http://www.w3.org/2000/svg" width="720" height="760" viewBox="0 0 720 760">
<defs>
  <marker id="arr" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
    <polygon points="0,0 8,3.5 0,7" fill="#0066cc"/>
  </marker>
</defs>
<rect width="720" height="760" fill="#f5f5f7"/>
<!-- Title -->
<text x="360" y="40" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="22" fill="#1d1d1f" text-anchor="middle" font-weight="bold">팀 워크플로우 자동화 파이프라인</text>
<text x="360" y="62" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="13" fill="#7a7a7a" text-anchor="middle">앨런 지시 → 개발 → CI → 리뷰 → 배포 → 완료 보고</text>
<!-- Step 1: 앨런 지시 -->
<rect x="160" y="78" width="400" height="58" rx="11" ry="11" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
<text x="360" y="103" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="14" fill="#0066cc" text-anchor="middle" font-weight="bold">① 앨런 (스마트폰)</text>
<text x="360" y="124" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="12" fill="#7a7a7a" text-anchor="middle">앨런 → 쭌에게 지시 (원격 채널)</text>
<line x1="360" y1="136" x2="360" y2="154" stroke="#0066cc" stroke-width="2" marker-end="url(#arr)"/>
<!-- Step 2: 쭌 → 민준 -->
<rect x="160" y="157" width="400" height="58" rx="11" ry="11" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
<text x="360" y="182" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="14" fill="#1d1d1f" text-anchor="middle" font-weight="bold">② 쭌 → 민준</text>
<text x="360" y="203" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="12" fill="#7a7a7a" text-anchor="middle">민준 Phase 설계 및 팀원 배분</text>
<line x1="360" y1="215" x2="360" y2="233" stroke="#0066cc" stroke-width="2" marker-end="url(#arr)"/>
<!-- Step 3: 민준 → 서연 -->
<rect x="160" y="236" width="400" height="58" rx="11" ry="11" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
<text x="360" y="261" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="14" fill="#1d1d1f" text-anchor="middle" font-weight="bold">③ 민준 → 서연</text>
<text x="360" y="282" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="12" fill="#7a7a7a" text-anchor="middle">서연 구현 → git push</text>
<line x1="360" y1="294" x2="360" y2="312" stroke="#0066cc" stroke-width="2" marker-end="url(#arr)"/>
<!-- Step 4: GitHub Actions (taller) -->
<rect x="120" y="315" width="480" height="90" rx="11" ry="11" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
<text x="360" y="338" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="14" fill="#1d1d1f" text-anchor="middle" font-weight="bold">④ GitHub Actions 자동 실행</text>
<text x="200" y="359" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="12" fill="#7a7a7a" text-anchor="start">1. 테스트 실행</text>
<text x="200" y="377" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="12" fill="#7a7a7a" text-anchor="start">2. 린트 · 타입 체크</text>
<text x="200" y="395" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="12" fill="#7a7a7a" text-anchor="start">3. 커버리지 측정</text>
<rect x="430" y="338" width="150" height="57" rx="7" ry="7" fill="#e8e8ed" stroke="#c7c7cc" stroke-width="1"/>
<text x="505" y="358" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="11" fill="#0066cc" text-anchor="middle">PASS 테스트</text>
<text x="505" y="376" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="11" fill="#0066cc" text-anchor="middle">PASS 린트</text>
<text x="505" y="394" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="11" fill="#0066cc" text-anchor="middle">PASS 커버리지</text>
<line x1="360" y1="405" x2="360" y2="423" stroke="#0066cc" stroke-width="2" marker-end="url(#arr)"/>
<!-- Step 5: 원격 채널 보고 -->
<rect x="160" y="426" width="400" height="58" rx="11" ry="11" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
<text x="360" y="451" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="14" fill="#1d1d1f" text-anchor="middle" font-weight="bold">⑤ 원격 채널 결과 보고</text>
<text x="360" y="472" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="12" fill="#7a7a7a" text-anchor="middle">CI 결과 → 쭌 → 앨런 보고</text>
<line x1="360" y1="484" x2="360" y2="502" stroke="#0066cc" stroke-width="2" marker-end="url(#arr)"/>
<!-- Step 6: 태양 PR 리뷰 -->
<rect x="160" y="505" width="400" height="58" rx="11" ry="11" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
<text x="360" y="530" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="14" fill="#1d1d1f" text-anchor="middle" font-weight="bold">⑥ 태양 PR 리뷰</text>
<text x="360" y="551" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="12" fill="#7a7a7a" text-anchor="middle">PR 리뷰 (품질 보장된 상태)</text>
<line x1="360" y1="563" x2="360" y2="581" stroke="#0066cc" stroke-width="2" marker-end="url(#arr)"/>
<!-- Step 7: GitHub Pages 배포 -->
<rect x="160" y="584" width="400" height="58" rx="11" ry="11" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
<text x="360" y="609" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="14" fill="#1d1d1f" text-anchor="middle" font-weight="bold">⑦ 머지 → GitHub Pages 자동 배포</text>
<text x="360" y="630" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="12" fill="#7a7a7a" text-anchor="middle">main 브랜치 머지 시 자동 배포</text>
<line x1="360" y1="642" x2="360" y2="660" stroke="#0066cc" stroke-width="2" marker-end="url(#arr)"/>
<!-- Step 8: 완료 알림 -->
<rect x="160" y="663" width="400" height="58" rx="11" ry="11" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
<text x="360" y="688" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="14" fill="#0066cc" text-anchor="middle" font-weight="bold">⑧ 앨런 배포 완료 알림</text>
<text x="360" y="709" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="12" fill="#7a7a7a" text-anchor="middle">원격 알림 수신 확인</text>
<!-- Footer -->
<text x="360" y="748" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="12" fill="#7a7a7a" text-anchor="middle">앨런 지시 → 자동화 파이프라인 → 완전 자동 배포</text>
</svg>
