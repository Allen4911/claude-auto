<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>body { margin: 0; background: #f5f5f7; display: flex; justify-content: center; padding: 40px 0; }</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="640" viewBox="0 0 720 640" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0066cc"/>
    </marker>
  </defs>
  <rect width="720" height="640" fill="#f5f5f7"/>

  <!-- 제목 -->
  <rect x="30" y="25" width="660" height="50" rx="11" ry="11" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
  <text x="360" y="45" text-anchor="middle" font-size="15" font-weight="bold" fill="#1d1d1f">보안 처리 흐름</text>
  <text x="360" y="63" text-anchor="middle" font-size="12" fill="#7a7a7a">모바일/웹 → Anthropic 인증 → Claude Code → 로컬 머신</text>

  <!-- 1단계: 모바일/웹 클라이언트 -->
  <rect x="160" y="105" width="400" height="85" rx="11" ry="11" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
  <!-- 아이콘들 -->
  <rect x="185" y="122" width="30" height="50" rx="4" ry="4" fill="none" stroke="#0066cc" stroke-width="2"/>
  <rect x="192" y="165" width="16" height="4" rx="1" fill="#0066cc"/>
  <rect x="230" y="128" width="50" height="38" rx="4" ry="4" fill="none" stroke="#0066cc" stroke-width="2"/>
  <text x="295" y="142" font-size="13" font-weight="bold" fill="#1d1d1f">모바일/웹 클라이언트</text>
  <text x="295" y="160" font-size="11" fill="#7a7a7a">iPhone · Android · 브라우저</text>
  <text x="295" y="178" font-size="11" fill="#7a7a7a">Claude Code API 요청 전송</text>

  <!-- 화살표 + 레이블 1 -->
  <line x1="360" y1="190" x2="360" y2="240" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="248" y="200" width="224" height="24" rx="6" ry="6" fill="#f0f4ff" stroke="#0066cc" stroke-width="1"/>
  <text x="360" y="216" text-anchor="middle" font-size="11" fill="#0066cc">Anthropic 계정 로그인</text>

  <!-- 2단계: Anthropic 인증 서버 -->
  <rect x="160" y="243" width="400" height="85" rx="11" ry="11" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
  <circle cx="210" cy="285" r="28" fill="#0066cc"/>
  <text x="210" y="282" text-anchor="middle" font-size="18" fill="#ffffff">🔐</text>
  <text x="210" y="300" text-anchor="middle" font-size="9" fill="#ffffff">인증</text>
  <text x="255" y="272" font-size="13" font-weight="bold" fill="#1d1d1f">Anthropic 인증 서버</text>
  <text x="255" y="290" font-size="11" fill="#7a7a7a">OAuth 2.0 기반 인증 처리</text>
  <text x="255" y="308" font-size="11" fill="#7a7a7a">JWT 세션 토큰 발급</text>

  <!-- 화살표 + 레이블 2 -->
  <line x1="360" y1="328" x2="360" y2="378" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="248" y="338" width="224" height="24" rx="6" ry="6" fill="#f0f4ff" stroke="#0066cc" stroke-width="1"/>
  <text x="360" y="354" text-anchor="middle" font-size="11" fill="#0066cc">세션 토큰 발급</text>

  <!-- 3단계: Claude Code 서버 모드 -->
  <rect x="160" y="381" width="400" height="85" rx="11" ry="11" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
  <rect x="183" y="400" width="48" height="50" rx="5" ry="5" fill="#0066cc"/>
  <text x="207" y="430" text-anchor="middle" font-size="20" font-weight="bold" fill="#ffffff">&lt;/&gt;</text>
  <text x="250" y="413" font-size="13" font-weight="bold" fill="#1d1d1f">Claude Code 서버 모드</text>
  <text x="250" y="431" font-size="11" fill="#7a7a7a">인증된 요청 수신 및 파싱</text>
  <text x="250" y="449" font-size="11" fill="#7a7a7a">명령 실행 전 사용자 승인 확인</text>

  <!-- 화살표 + 레이블 3 -->
  <line x1="360" y1="466" x2="360" y2="516" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="248" y="476" width="224" height="24" rx="6" ry="6" fill="#f0f4ff" stroke="#0066cc" stroke-width="1"/>
  <text x="360" y="492" text-anchor="middle" font-size="11" fill="#0066cc">도구 실행</text>

  <!-- 4단계: 로컬 머신 -->
  <rect x="160" y="519" width="400" height="78" rx="11" ry="11" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <rect x="183" y="535" width="55" height="46" rx="5" ry="5" fill="none" stroke="#0066cc" stroke-width="2"/>
  <rect x="190" y="570" width="40" height="6" rx="2" fill="#0066cc"/>
  <line x1="183" y1="569" x2="238" y2="569" stroke="#0066cc" stroke-width="1.5"/>
  <text x="250" y="553" font-size="13" font-weight="bold" fill="#1d1d1f">로컬 머신</text>
  <text x="250" y="571" font-size="11" fill="#7a7a7a">파일 시스템, 셸 명령, MCP 서버</text>
  <text x="250" y="587" font-size="11" fill="#7a7a7a">실제 작업 실행 환경</text>

  <text x="360" y="630" text-anchor="middle" font-size="11" fill="#7a7a7a">전 계층 TLS 암호화 · 세션 토큰 기반 인증 · 명령 단위 승인</text>
</svg>
</body>
</html>
