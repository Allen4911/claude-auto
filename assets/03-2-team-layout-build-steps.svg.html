<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320">
<rect width="900" height="320" fill="#1e1e2e"/>
<text x="450" y="38" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="22" fill="#cdd6f4" text-anchor="middle" font-weight="bold">레이아웃 구성 스크립트 — 5단계 빌드</text>
<text x="450" y="62" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="14" fill="#a6adc8" text-anchor="middle">세션 생성부터 팀 화면 완성까지</text>

<!-- Step 1 -->
<rect x="30" y="90" width="150" height="80" rx="8" fill="#313244" stroke="#89b4fa" stroke-width="2"/>
<text x="105" y="118" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="14" fill="#89b4fa" text-anchor="middle" font-weight="bold">① 세션 생성</text>
<text x="105" y="138" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="11" fill="#cdd6f4" text-anchor="middle">new-session</text>
<text x="105" y="156" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="11" fill="#a6adc8" text-anchor="middle">-s team</text>

<polygon points="186,130 200,130 193,138" fill="#fab387"/>
<line x1="180" y1="130" x2="200" y2="130" stroke="#fab387" stroke-width="2"/>

<!-- Step 2 -->
<rect x="205" y="90" width="150" height="80" rx="8" fill="#313244" stroke="#f9e2af" stroke-width="2"/>
<text x="280" y="118" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="14" fill="#f9e2af" text-anchor="middle" font-weight="bold">② 파인 분할</text>
<text x="280" y="138" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="11" fill="#cdd6f4" text-anchor="middle">split-window</text>
<text x="280" y="156" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="11" fill="#a6adc8" text-anchor="middle">×5 → 6개 파인</text>

<polygon points="361,130 375,130 368,138" fill="#fab387"/>
<line x1="355" y1="130" x2="375" y2="130" stroke="#fab387" stroke-width="2"/>

<!-- Step 3 -->
<rect x="380" y="90" width="150" height="80" rx="8" fill="#313244" stroke="#a6e3a1" stroke-width="2"/>
<text x="455" y="112" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="14" fill="#a6e3a1" text-anchor="middle" font-weight="bold">③ 레이아웃</text>
<text x="455" y="132" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="10" fill="#cdd6f4" text-anchor="middle">even-horizontal</text>
<text x="455" y="149" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="11" fill="#a6adc8" text-anchor="middle">→ main-vertical</text>
<text x="455" y="164" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="10" fill="#585b70" text-anchor="middle">전환</text>

<polygon points="536,130 550,130 543,138" fill="#fab387"/>
<line x1="530" y1="130" x2="550" y2="130" stroke="#fab387" stroke-width="2"/>

<!-- Step 4 -->
<rect x="555" y="90" width="150" height="80" rx="8" fill="#313244" stroke="#cba6f7" stroke-width="2"/>
<text x="630" y="112" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="14" fill="#cba6f7" text-anchor="middle" font-weight="bold">④ 제목 표시</text>
<text x="630" y="132" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="10" fill="#cdd6f4" text-anchor="middle">set-option</text>
<text x="630" y="149" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="10" fill="#cdd6f4" text-anchor="middle">pane-border-status</text>
<text x="630" y="164" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="10" fill="#a6adc8" text-anchor="middle">top</text>

<polygon points="711,130 725,130 718,138" fill="#fab387"/>
<line x1="705" y1="130" x2="725" y2="130" stroke="#fab387" stroke-width="2"/>

<!-- Step 5 -->
<rect x="730" y="90" width="140" height="80" rx="8" fill="#313244" stroke="#f38ba8" stroke-width="2"/>
<text x="800" y="112" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="14" fill="#f38ba8" text-anchor="middle" font-weight="bold">⑤ 이름 지정</text>
<text x="800" y="132" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="10" fill="#cdd6f4" text-anchor="middle">select-pane</text>
<text x="800" y="149" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="10" fill="#cdd6f4" text-anchor="middle">-T "이름"</text>
<text x="800" y="164" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="10" fill="#a6adc8" text-anchor="middle">6개 파인</text>

<!-- Result -->
<rect x="200" y="220" width="500" height="60" rx="8" fill="#181825" stroke="#a6e3a1" stroke-width="2"/>
<text x="450" y="248" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="14" fill="#a6e3a1" text-anchor="middle" font-weight="bold">✅ 팀 화면 완성</text>
<text x="450" y="268" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" fill="#a6adc8" text-anchor="middle">쭌·민준·지훈·수아·서연·태양 — 각 파인 이름표 표시</text>

<!-- Arrow to result -->
<line x1="450" y1="175" x2="450" y2="218" stroke="#fab387" stroke-width="2" stroke-dasharray="4,3"/>
<polygon points="450,220 444,210 456,210" fill="#fab387"/>
</svg>
