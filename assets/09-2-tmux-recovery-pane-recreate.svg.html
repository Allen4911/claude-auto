<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{margin:0;background:#0f172a;font-family:system-ui,sans-serif}</style></head><body>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="340" viewBox="0 0 900 340">
  <rect width="900" height="340" fill="#0f172a"/>
  <text x="450" y="35" fill="#e2e8f0" font-size="16" font-weight="bold" text-anchor="middle">파인 재생성 4단계 절차</text>
  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="none" stroke="#3b82f6" stroke-width="1.5"/></marker></defs>
  <!-- Before layout -->
  <rect x="40" y="60" width="170" height="200" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="125" y="80" fill="#fca5a5" font-size="11" font-weight="bold" text-anchor="middle">파인 소실 상태</text>
  <rect x="55" y="90" width="140" height="36" rx="5" fill="#064e3b" stroke="#22c55e"/>
  <text x="125" y="113" fill="#86efac" font-size="10" text-anchor="middle">P0 쭌</text>
  <rect x="55" y="132" width="140" height="36" rx="5" fill="#064e3b" stroke="#22c55e"/>
  <text x="125" y="155" fill="#86efac" font-size="10" text-anchor="middle">P1 민준</text>
  <rect x="55" y="174" width="140" height="36" rx="5" fill="#064e3b" stroke="#22c55e"/>
  <text x="125" y="197" fill="#86efac" font-size="10" text-anchor="middle">P2 지훈</text>
  <rect x="55" y="216" width="140" height="36" rx="5" fill="#2d0a0a" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="125" y="235" fill="#fca5a5" font-size="10" text-anchor="middle">P3 없음 !</text>
  <!-- Steps -->
  <rect x="245" y="60" width="380" height="200" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="435" y="82" fill="#60a5fa" font-size="13" font-weight="bold" text-anchor="middle">복구 4단계</text>
  <rect x="260" y="92" width="350" height="36" rx="5" fill="#0f172a"/>
  <text x="260" y="108" fill="#f59e0b" font-size="10" font-weight="bold">  ①</text>
  <text x="290" y="108" fill="#7dd3fc" font-size="10" font-family="monospace">tmux split-window -v -t team:0.2</text>
  <text x="290" y="120" fill="#64748b" font-size="9">  빈 파인 분할 생성</text>
  <rect x="260" y="136" width="350" height="36" rx="5" fill="#0f172a"/>
  <text x="260" y="152" fill="#f59e0b" font-size="10" font-weight="bold">  ②</text>
  <text x="290" y="152" fill="#7dd3fc" font-size="10" font-family="monospace">tmux select-pane -T "디자이너 수아"</text>
  <text x="290" y="164" fill="#64748b" font-size="9">  타이틀 설정</text>
  <rect x="260" y="180" width="350" height="36" rx="5" fill="#0f172a"/>
  <text x="260" y="196" fill="#f59e0b" font-size="10" font-weight="bold">  ③</text>
  <text x="290" y="196" fill="#7dd3fc" font-size="10" font-family="monospace">tmux send-keys -t team:0.3 "claude" Enter</text>
  <text x="290" y="208" fill="#64748b" font-size="9">  Claude Code 실행</text>
  <rect x="260" y="224" width="350" height="30" rx="5" fill="#0f172a"/>
  <text x="260" y="240" fill="#f59e0b" font-size="10" font-weight="bold">  ④</text>
  <text x="290" y="240" fill="#7dd3fc" font-size="10" font-family="monospace">tmux select-layout main-vertical</text>
  <!-- Arrow -->
  <line x1="625" y1="160" x2="670" y2="160" stroke="#3b82f6" stroke-width="2" marker-end="url(#a)"/>
  <!-- After layout -->
  <rect x="670" y="60" width="190" height="200" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="765" y="80" fill="#86efac" font-size="11" font-weight="bold" text-anchor="middle">복구 완료</text>
  <rect x="685" y="90" width="160" height="30" rx="5" fill="#064e3b" stroke="#22c55e"/>
  <text x="765" y="110" fill="#86efac" font-size="10" text-anchor="middle">P0 쭌</text>
  <rect x="685" y="126" width="160" height="30" rx="5" fill="#064e3b" stroke="#22c55e"/>
  <text x="765" y="146" fill="#86efac" font-size="10" text-anchor="middle">P1 민준</text>
  <rect x="685" y="162" width="160" height="30" rx="5" fill="#064e3b" stroke="#22c55e"/>
  <text x="765" y="182" fill="#86efac" font-size="10" text-anchor="middle">P2 지훈</text>
  <rect x="685" y="198" width="160" height="30" rx="5" fill="#064e3b" stroke="#22c55e" stroke-width="2"/>
  <text x="765" y="218" fill="#4ade80" font-size="10" font-weight="bold" text-anchor="middle">P3 수아 ✓ 복구</text>
  <!-- Bottom -->
  <text x="450" y="290" fill="#64748b" font-size="11" text-anchor="middle">파인이 사라진 경우 — 재생성 후 claude 실행, 레이아웃 재정렬</text>
  <rect x="200" y="305" width="500" height="24" rx="6" fill="#0c2a1a"/>
  <text x="450" y="321" fill="#4ade80" font-size="11" text-anchor="middle">split-window → 타이틀 → claude → 레이아웃 재적용</text>
</svg>
</body></html>
