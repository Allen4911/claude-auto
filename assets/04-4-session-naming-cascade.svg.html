<svg xmlns="http://www.w3.org/2000/svg" width="900" height="400" viewBox="0 0 900 400">
<rect width="900" height="400" fill="#1e1e2e"/>
<text x="450" y="38" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="22" fill="#cdd6f4" text-anchor="middle" font-weight="bold">세션 이름 결정 우선순위 (Cascade)</text>
<text x="450" y="62" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="14" fill="#a6adc8" text-anchor="middle">위부터 순서대로 확인 → 먼저 해당되는 규칙 사용</text>

<!-- Level 1: 명시한 이름 -->
<rect x="80" y="82" width="740" height="58" rx="8" fill="#313244" stroke="#89b4fa" stroke-width="2.5"/>
<rect x="80" y="82" width="90" height="58" rx="8" fill="#89b4fa" opacity="0.25"/>
<text x="125" y="117" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="16" fill="#89b4fa" text-anchor="middle" font-weight="bold">①</text>
<text x="320" y="108" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="14" fill="#cdd6f4" text-anchor="middle" font-weight="bold">실행 시 명시한 이름</text>
<text x="320" y="128" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="12" fill="#a6adc8" text-anchor="middle">claude --rc "my-session"</text>
<text x="680" y="117" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" fill="#a6e3a1" text-anchor="middle">가장 높은 우선순위</text>

<!-- Arrow down -->
<text x="136" y="156" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" fill="#585b70" text-anchor="middle">없으면 ↓</text>
<line x1="450" y1="142" x2="450" y2="162" stroke="#45475a" stroke-width="1.5" stroke-dasharray="4,3"/>

<!-- Level 2: /rename -->
<rect x="110" y="164" width="680" height="58" rx="8" fill="#313244" stroke="#f9e2af" stroke-width="2"/>
<rect x="110" y="164" width="90" height="58" rx="8" fill="#f9e2af" opacity="0.2"/>
<text x="155" y="199" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="16" fill="#f9e2af" text-anchor="middle" font-weight="bold">②</text>
<text x="360" y="190" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="14" fill="#cdd6f4" text-anchor="middle" font-weight="bold">/rename 변경 이름</text>
<text x="360" y="210" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="12" fill="#a6adc8" text-anchor="middle">세션 중에 /rename my-work 실행</text>
<text x="680" y="199" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" fill="#f9e2af" text-anchor="middle">런타임 변경</text>

<!-- Arrow down -->
<text x="166" y="238" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" fill="#585b70" text-anchor="middle">없으면 ↓</text>
<line x1="450" y1="224" x2="450" y2="244" stroke="#45475a" stroke-width="1.5" stroke-dasharray="4,3"/>

<!-- Level 3: 마지막 메시지 -->
<rect x="140" y="246" width="620" height="58" rx="8" fill="#313244" stroke="#a6e3a1" stroke-width="2"/>
<rect x="140" y="246" width="90" height="58" rx="8" fill="#a6e3a1" opacity="0.2"/>
<text x="185" y="281" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="16" fill="#a6e3a1" text-anchor="middle" font-weight="bold">③</text>
<text x="400" y="272" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="14" fill="#cdd6f4" text-anchor="middle" font-weight="bold">마지막 의미 있는 메시지</text>
<text x="400" y="292" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" fill="#a6adc8" text-anchor="middle">대화 내용에서 자동 요약 생성</text>
<text x="670" y="281" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" fill="#a6e3a1" text-anchor="middle">자동 요약</text>

<!-- Arrow down -->
<text x="196" y="320" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" fill="#585b70" text-anchor="middle">없으면 ↓</text>
<line x1="450" y1="306" x2="450" y2="326" stroke="#45475a" stroke-width="1.5" stroke-dasharray="4,3"/>

<!-- Level 4: 자동 생성 -->
<rect x="170" y="328" width="560" height="58" rx="8" fill="#313244" stroke="#cba6f7" stroke-width="2"/>
<rect x="170" y="328" width="90" height="58" rx="8" fill="#cba6f7" opacity="0.2"/>
<text x="215" y="363" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="16" fill="#cba6f7" text-anchor="middle" font-weight="bold">④</text>
<text x="430" y="354" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="14" fill="#cdd6f4" text-anchor="middle" font-weight="bold">자동 생성</text>
<text x="430" y="374" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="12" fill="#a6adc8" text-anchor="middle">hostname-형용사-명사 (예: dev-swift-eagle)</text>
</svg>
