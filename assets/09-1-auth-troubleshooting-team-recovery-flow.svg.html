<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{margin:0;background:#0f172a;font-family:system-ui,sans-serif}</style></head><body>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360">
  <rect width="900" height="360" fill="#0f172a"/>
  <text x="450" y="35" fill="#e2e8f0" font-size="16" font-weight="bold" text-anchor="middle">팀 전체 인증 실패 복구 흐름</text>
  <!-- Token expiry event -->
  <rect x="325" y="55" width="250" height="40" rx="8" fill="#451a1a" stroke="#ef4444" stroke-width="2"/>
  <text x="450" y="80" fill="#fca5a5" font-size="14" font-weight="bold" text-anchor="middle">토큰 만료 이벤트 발생</text>
  <!-- Fan out to 6 panes -->
  <line x1="450" y1="95" x2="80" y2="140" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="450" y1="95" x2="220" y2="140" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="450" y1="95" x2="360" y2="140" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="450" y1="95" x2="500" y2="140" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="450" y1="95" x2="650" y2="140" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="450" y1="95" x2="820" y2="140" stroke="#ef4444" stroke-width="1.5"/>
  <!-- 6 panes fail -->
  <g>
    <rect x="30" y="140" width="100" height="50" rx="6" fill="#2d0a0a" stroke="#ef4444" stroke-width="1.2"/>
    <text x="80" y="162" fill="#fca5a5" font-size="11" font-weight="bold" text-anchor="middle">P0 쭌</text>
    <text x="80" y="178" fill="#f87171" font-size="10" text-anchor="middle">인증 실패</text>
  </g>
  <g>
    <rect x="170" y="140" width="100" height="50" rx="6" fill="#2d0a0a" stroke="#ef4444" stroke-width="1.2"/>
    <text x="220" y="162" fill="#fca5a5" font-size="11" font-weight="bold" text-anchor="middle">P1 민준</text>
    <text x="220" y="178" fill="#f87171" font-size="10" text-anchor="middle">인증 실패</text>
  </g>
  <g>
    <rect x="310" y="140" width="100" height="50" rx="6" fill="#2d0a0a" stroke="#ef4444" stroke-width="1.2"/>
    <text x="360" y="162" fill="#fca5a5" font-size="11" font-weight="bold" text-anchor="middle">P2 지훈</text>
    <text x="360" y="178" fill="#f87171" font-size="10" text-anchor="middle">인증 실패</text>
  </g>
  <g>
    <rect x="450" y="140" width="100" height="50" rx="6" fill="#2d0a0a" stroke="#ef4444" stroke-width="1.2"/>
    <text x="500" y="162" fill="#fca5a5" font-size="11" font-weight="bold" text-anchor="middle">P3 수아</text>
    <text x="500" y="178" fill="#f87171" font-size="10" text-anchor="middle">인증 실패</text>
  </g>
  <g>
    <rect x="600" y="140" width="100" height="50" rx="6" fill="#2d0a0a" stroke="#ef4444" stroke-width="1.2"/>
    <text x="650" y="162" fill="#fca5a5" font-size="11" font-weight="bold" text-anchor="middle">P4 서연</text>
    <text x="650" y="178" fill="#f87171" font-size="10" text-anchor="middle">인증 실패</text>
  </g>
  <g>
    <rect x="770" y="140" width="100" height="50" rx="6" fill="#2d0a0a" stroke="#ef4444" stroke-width="1.2"/>
    <text x="820" y="162" fill="#fca5a5" font-size="11" font-weight="bold" text-anchor="middle">P5 태양</text>
    <text x="820" y="178" fill="#f87171" font-size="10" text-anchor="middle">인증 실패</text>
  </g>
  <!-- for loop label -->
  <rect x="280" y="215" width="340" height="36" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="450" y="233" fill="#fde68a" font-size="12" font-weight="bold" text-anchor="middle">for i in 0 1 2 3 4 5; do</text>
  <text x="450" y="247" fill="#fbbf24" font-size="11" text-anchor="middle">  /exit → sleep 1 → claude 재실행</text>
  <!-- Sequential recovery arrows -->
  <line x1="80" y1="190" x2="80" y2="270" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="220" y1="190" x2="220" y2="280" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="360" y1="190" x2="360" y2="290" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="500" y1="190" x2="500" y2="290" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="650" y1="190" x2="650" y2="280" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="820" y1="190" x2="820" y2="270" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- recovered panes -->
  <g>
    <rect x="30" y="270" width="100" height="50" rx="6" fill="#0c2a1a" stroke="#22c55e" stroke-width="1.2"/>
    <text x="80" y="292" fill="#86efac" font-size="11" font-weight="bold" text-anchor="middle">P0 복구</text>
    <text x="80" y="308" fill="#4ade80" font-size="10" text-anchor="middle">✓ 정상</text>
  </g>
  <g>
    <rect x="170" y="270" width="100" height="50" rx="6" fill="#0c2a1a" stroke="#22c55e" stroke-width="1.2"/>
    <text x="220" y="292" fill="#86efac" font-size="11" font-weight="bold" text-anchor="middle">P1 복구</text>
    <text x="220" y="308" fill="#4ade80" font-size="10" text-anchor="middle">✓ 정상</text>
  </g>
  <g>
    <rect x="310" y="270" width="100" height="50" rx="6" fill="#0c2a1a" stroke="#22c55e" stroke-width="1.2"/>
    <text x="360" y="292" fill="#86efac" font-size="11" font-weight="bold" text-anchor="middle">P2 복구</text>
    <text x="360" y="308" fill="#4ade80" font-size="10" text-anchor="middle">✓ 정상</text>
  </g>
  <g>
    <rect x="450" y="270" width="100" height="50" rx="6" fill="#0c2a1a" stroke="#22c55e" stroke-width="1.2"/>
    <text x="500" y="292" fill="#86efac" font-size="11" font-weight="bold" text-anchor="middle">P3 복구</text>
    <text x="500" y="308" fill="#4ade80" font-size="10" text-anchor="middle">✓ 정상</text>
  </g>
  <g>
    <rect x="600" y="270" width="100" height="50" rx="6" fill="#0c2a1a" stroke="#22c55e" stroke-width="1.2"/>
    <text x="650" y="292" fill="#86efac" font-size="11" font-weight="bold" text-anchor="middle">P4 복구</text>
    <text x="650" y="308" fill="#4ade80" font-size="10" text-anchor="middle">✓ 정상</text>
  </g>
  <g>
    <rect x="770" y="270" width="100" height="50" rx="6" fill="#0c2a1a" stroke="#22c55e" stroke-width="1.2"/>
    <text x="820" y="292" fill="#86efac" font-size="11" font-weight="bold" text-anchor="middle">P5 복구</text>
    <text x="820" y="308" fill="#4ade80" font-size="10" text-anchor="middle">✓ 정상</text>
  </g>
  <text x="450" y="345" fill="#64748b" font-size="11" text-anchor="middle">P0 → P1 → ... → P5 순서로 순차 재시작 완료</text>
</svg>
</body></html>
