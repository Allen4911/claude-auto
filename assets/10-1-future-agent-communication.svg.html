<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{margin:0;background:#f5f5f7;font-family:'Noto Sans CJK KR','Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif}</style></head><body>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="240" viewBox="0 0 900 300">

  <defs><marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="none" stroke="#0066cc" stroke-width="1.5"/></marker>

  <!-- Current section -->
  <rect x="30" y="48" width="380" height="230" rx="10" fill="#ffffff" stroke="#0066cc" stroke-width="1.5"/>
  <text x="220" y="70" fill="#0066cc" font-size="13" font-weight="bold" text-anchor="middle">현재 (단방향 텍스트)</text>

  <rect x="220" y="85" width="100" height="40" rx="6" fill="#ffffff" stroke="#0066cc" stroke-width="1"/>

  <text x="220" y="178" fill="#7a7a7a" font-size="10" text-anchor="middle">⚠️ 오류 감지 불가</text>
  <text x="220" y="196" fill="#7a7a7a" font-size="10" text-anchor="middle">⚠️ 결과 수집 수동</text>

  <rect x="510" y="85" width="100" height="40" rx="6" fill="#ffffff" stroke="#0066cc" stroke-width="1"/>
  <text x="560" y="110" fill="#0066cc" font-size="11" text-anchor="middle">오케스트레이터</text>
  <line x1="610" y1="105" x2="698" y2="105" stroke="#0066cc" stroke-width="2" marker-end="url(#arr2)"/>
  <line x1="700" y1="108" x2="612" y2="108" stroke="#0066cc" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="655" y="98" fill="#0066cc" font-size="9" text-anchor="middle">구조화 메시지</text>
  <text x="655" y="120" fill="#7a7a7a" font-size="9" text-anchor="middle">+ 결과 반환</text>
  <rect x="700" y="85" width="100" height="40" rx="6" fill="#ffffff" stroke="#0066cc" stroke-width="1"/>
  <text x="750" y="110" fill="#0066cc" font-size="11" text-anchor="middle">서브에이전트</text>
  <text x="680" y="160" fill="#0066cc" font-size="10" text-anchor="middle">✓ 양방향 통신</text>
  <text x="680" y="178" fill="#0066cc" font-size="10" text-anchor="middle">✓ 오류 자동 감지</text>
  <text x="680" y="196" fill="#0066cc" font-size="10" text-anchor="middle">✓ 결과 자동 집계</text>
  <text x="680" y="214" fill="#0066cc" font-size="10" text-anchor="middle">✓ 공유 상태 동기화</text>

  <text x="450" y="190" fill="#0066cc" font-size="10" text-anchor="middle">진화</text>
