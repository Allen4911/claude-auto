<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{margin:0;background:#0f172a;font-family:system-ui,sans-serif}</style></head><body>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <rect width="900" height="300" fill="#0f172a"/>
  <text x="450" y="35" fill="#e2e8f0" font-size="16" font-weight="bold" text-anchor="middle">레이아웃 복구 Before / After</text>
  <!-- Before label -->
  <text x="190" y="65" fill="#ef4444" font-size="13" font-weight="bold" text-anchor="middle">깨진 레이아웃</text>
  <!-- Broken layout -->
  <rect x="40" y="75" width="300" height="180" rx="6" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="55" y="90" width="60" height="80" rx="4" fill="#2d0a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="85" y="135" fill="#fca5a5" font-size="9" text-anchor="middle">불규칙</text>
  <rect x="125" y="110" width="100" height="40" rx="4" fill="#2d0a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="175" y="135" fill="#fca5a5" font-size="9" text-anchor="middle">파인 크기 제각각</text>
  <rect x="235" y="90" width="90" height="90" rx="4" fill="#2d0a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="280" y="140" fill="#fca5a5" font-size="9" text-anchor="middle">겹침·비정렬</text>
  <rect x="55" y="185" width="270" height="55" rx="4" fill="#2d0a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="190" y="217" fill="#fca5a5" font-size="9" text-anchor="middle">너비·높이 불균형</text>
  <!-- Arrow -->
  <rect x="353" y="130" width="194" height="50" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="450" y="151" fill="#60a5fa" font-size="11" font-family="monospace" text-anchor="middle">select-layout main-vertical</text>
  <text x="450" y="167" fill="#60a5fa" font-size="11" font-family="monospace" text-anchor="middle">resize-pane -x 158</text>
  <line x1="340" y1="165" x2="353" y2="165" stroke="#3b82f6" stroke-width="2"/>
  <line x1="547" y1="165" x2="560" y2="165" stroke="#3b82f6" stroke-width="2" marker-end="url(#a)"/>
  <!-- After label -->
  <text x="710" y="65" fill="#22c55e" font-size="13" font-weight="bold" text-anchor="middle">정렬된 레이아웃</text>
  <!-- Good layout: main-vertical (left wide + right stacked) -->
  <rect x="560" y="75" width="300" height="180" rx="6" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <!-- Left wide pane (team leader) -->
  <rect x="572" y="87" width="120" height="156" rx="4" fill="#064e3b" stroke="#22c55e" stroke-width="1.2"/>
  <text x="632" y="162" fill="#86efac" font-size="10" font-weight="bold" text-anchor="middle">P0 쭌</text>
  <text x="632" y="176" fill="#4ade80" font-size="9" text-anchor="middle">(넓은 파인)</text>
  <!-- Right 5 panes stacked -->
  <rect x="700" y="87" width="147" height="28" rx="4" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1"/>
  <text x="773" y="106" fill="#93c5fd" font-size="9" text-anchor="middle">P1 민준</text>
  <rect x="700" y="119" width="147" height="28" rx="4" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1"/>
  <text x="773" y="138" fill="#93c5fd" font-size="9" text-anchor="middle">P2 지훈</text>
  <rect x="700" y="151" width="147" height="28" rx="4" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1"/>
  <text x="773" y="170" fill="#93c5fd" font-size="9" text-anchor="middle">P3 수아</text>
  <rect x="700" y="183" width="147" height="28" rx="4" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1"/>
  <text x="773" y="202" fill="#93c5fd" font-size="9" text-anchor="middle">P4 서연</text>
  <rect x="700" y="215" width="147" height="28" rx="4" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1"/>
  <text x="773" y="234" fill="#93c5fd" font-size="9" text-anchor="middle">P5 태양</text>
  <!-- Summary -->
  <text x="450" y="280" fill="#64748b" font-size="11" text-anchor="middle">main-vertical 적용 → 팀장 좌측 넓게, 팀원 5명 우측 균등 배치</text>
  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="none" stroke="#3b82f6" stroke-width="1.5"/></marker></defs>
</svg>
</body></html>
