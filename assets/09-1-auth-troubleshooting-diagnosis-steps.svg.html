<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{margin:0;background:#0f172a;font-family:'Noto Sans CJK KR',DejaVu Sans,system-ui,sans-serif}</style></head><body>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="460" viewBox="0 0 900 460">
  <rect width="900" height="460" fill="#0f172a"/>
  <text x="450" y="35" fill="#e2e8f0" font-size="16" font-weight="bold" text-anchor="middle">5단계 진단 체크리스트 흐름</text>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="none" stroke="#475569" stroke-width="1.5"/></marker>
    <marker id="b" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="none" stroke="#ef4444" stroke-width="1.5"/></marker>
  </defs>
  <!-- Step 1 -->
  <rect x="60" y="55" width="240" height="50" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="85" y="77" fill="#60a5fa" font-size="12" font-weight="bold">① 프로세스 확인</text>
  <text x="85" y="95" fill="#7dd3fc" font-size="11" font-family="monospace">pgrep -af claude</text>
  <line x1="180" y1="105" x2="180" y2="135" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="300" y1="80" x2="380" y2="80" stroke="#ef4444" stroke-width="1.5" marker-end="url(#b)"/>
  <rect x="380" y="62" width="180" height="36" rx="6" fill="#2d0a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="470" y="84" fill="#fca5a5" font-size="11" text-anchor="middle">없으면 → claude 재실행</text>
  <!-- Step 2 -->
  <rect x="60" y="135" width="240" height="50" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="85" y="157" fill="#a78bfa" font-size="12" font-weight="bold">② 인증 상태 확인</text>
  <text x="85" y="175" fill="#c4b5fd" font-size="11" font-family="monospace">claude auth status</text>
  <line x1="180" y1="185" x2="180" y2="215" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="300" y1="160" x2="380" y2="160" stroke="#ef4444" stroke-width="1.5" marker-end="url(#b)"/>
  <rect x="380" y="142" width="180" height="36" rx="6" fill="#2d0a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="470" y="164" fill="#fca5a5" font-size="11" text-anchor="middle">만료면 → auth login</text>
  <!-- Step 3 -->
  <rect x="60" y="215" width="240" height="50" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="85" y="237" fill="#34d399" font-size="12" font-weight="bold">③ 네트워크 확인</text>
  <text x="85" y="255" fill="#6ee7b7" font-size="11" font-family="monospace">curl api.anthropic.com</text>
  <line x1="180" y1="265" x2="180" y2="295" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="300" y1="240" x2="380" y2="240" stroke="#ef4444" stroke-width="1.5" marker-end="url(#b)"/>
  <rect x="380" y="222" width="180" height="36" rx="6" fill="#2d0a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="470" y="244" fill="#fca5a5" font-size="11" text-anchor="middle">차단 → ufw allow 443</text>
  <!-- Step 4 -->
  <rect x="60" y="295" width="240" height="50" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="85" y="317" fill="#fbbf24" font-size="12" font-weight="bold">④ 로그 확인</text>
  <text x="85" y="335" fill="#fde68a" font-size="11" font-family="monospace">tail -50 latest.log</text>
  <line x1="180" y1="345" x2="180" y2="375" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="300" y1="320" x2="380" y2="320" stroke="#ef4444" stroke-width="1.5" marker-end="url(#b)"/>
  <rect x="380" y="302" width="200" height="36" rx="6" fill="#2d0a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="480" y="324" fill="#fca5a5" font-size="11" text-anchor="middle">에러 패턴 분석 후 대처</text>
  <!-- Step 5 (주흐름 연결) -->
  <rect x="60" y="375" width="240" height="50" rx="8" fill="#1e293b" stroke="#ec4899" stroke-width="1.5"/>
  <text x="85" y="397" fill="#f472b6" font-size="12" font-weight="bold">⑤ JSON 유효성</text>
  <text x="85" y="415" fill="#fbcfe8" font-size="10" font-family="monospace">python3 json.load(settings)</text>
  <line x1="300" y1="400" x2="380" y2="400" stroke="#ef4444" stroke-width="1.5" marker-end="url(#b)"/>
  <rect x="380" y="382" width="200" height="36" rx="6" fill="#2d0a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="480" y="404" fill="#fca5a5" font-size="11" text-anchor="middle">구문 오류 → 수동 수정</text>
  <!-- Complete -->
  <rect x="280" y="435" width="340" height="20" rx="5" fill="#0c2a1a"/>
  <text x="450" y="449" fill="#4ade80" font-size="11" font-weight="bold" text-anchor="middle">5단계 점검으로 90% 이상 문제 해결 가능</text>
</svg>
</body></html>
