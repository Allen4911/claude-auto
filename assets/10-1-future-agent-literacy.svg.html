<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{margin:0;background:#0f172a;font-family:'Noto Sans CJK KR',DejaVu Sans,system-ui,sans-serif}</style></head><body>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360">
  <rect width="900" height="360" fill="#0f172a"/>
  <text x="450" y="30" fill="#e2e8f0" font-size="16" font-weight="bold" text-anchor="middle">에이전트 운용 리터러시 5가지 핵심 능력</text>
  <!-- Pentagon points (cx=450, cy=195, r=130) -->
  <!-- Top: 역할 설계 (270deg) -->
  <!-- Top-right: 지시 작성 (342deg) -->
  <!-- Bottom-right: 충돌 관리 (54deg) -->
  <!-- Bottom-left: 결과 검증 (126deg) -->
  <!-- Top-left: 비용 인식 (198deg) -->
  <!-- Pentagon shape -->
  <polygon points="450,65 573,151 526,296 374,296 327,151" fill="none" stroke="#334155" stroke-width="2"/>
  <!-- Node 1: Top - 역할 설계 -->
  <circle cx="450" cy="65" r="42" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="450" y="60" fill="#93c5fd" font-size="11" font-weight="bold" text-anchor="middle">역할 설계</text>
  <text x="450" y="76" fill="#60a5fa" font-size="9" text-anchor="middle">CLAUDE.md 구성</text>
  <!-- Node 2: Top-right - 지시 작성 -->
  <circle cx="573" cy="151" r="42" fill="#1e2d1b" stroke="#10b981" stroke-width="2"/>
  <text x="573" y="146" fill="#6ee7b7" font-size="11" font-weight="bold" text-anchor="middle">지시 작성</text>
  <text x="573" y="162" fill="#34d399" font-size="9" text-anchor="middle">명확한 프롬프트</text>
  <!-- Node 3: Bottom-right - 충돌 관리 -->
  <circle cx="526" cy="296" r="42" fill="#2d1b0e" stroke="#f59e0b" stroke-width="2"/>
  <text x="526" y="291" fill="#fde68a" font-size="11" font-weight="bold" text-anchor="middle">충돌 관리</text>
  <text x="526" y="307" fill="#fbbf24" font-size="9" text-anchor="middle">파일 충돌 예방</text>
  <!-- Node 4: Bottom-left - 결과 검증 -->
  <circle cx="374" cy="296" r="42" fill="#1e1b2d" stroke="#8b5cf6" stroke-width="2"/>
  <text x="374" y="291" fill="#c4b5fd" font-size="11" font-weight="bold" text-anchor="middle">결과 검증</text>
  <text x="374" y="307" fill="#a78bfa" font-size="9" text-anchor="middle">출력 품질 확인</text>
  <!-- Node 5: Top-left - 비용 인식 -->
  <circle cx="327" cy="151" r="42" fill="#2d1020" stroke="#ec4899" stroke-width="2"/>
  <text x="327" y="146" fill="#fbcfe8" font-size="11" font-weight="bold" text-anchor="middle">비용 인식</text>
  <text x="327" y="162" fill="#f9a8d4" font-size="9" text-anchor="middle">토큰 최적화</text>
  <!-- Center label -->
  <text x="450" y="188" fill="#e2e8f0" font-size="12" font-weight="bold" text-anchor="middle">에이전트</text>
  <text x="450" y="206" fill="#94a3b8" font-size="11" text-anchor="middle">리터러시</text>
  <!-- Caption -->
  <text x="450" y="345" fill="#475569" font-size="10" text-anchor="middle">5가지 능력을 균형 있게 키울수록 팀 생산성이 안정적으로 향상됨</text>
</svg>
</body></html>
