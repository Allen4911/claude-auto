<svg xmlns="http://www.w3.org/2000/svg" width="720" height="240" viewBox="0 0 900 300">
<rect width="900" height="300" fill="#f5f5f7"/>

<!-- Gradient bar (Apple semantic: green=safe, yellow=caution, red=danger) -->
<defs>

    <stop offset="0%" stop-color="#28c840"/>
    <stop offset="50%" stop-color="#febc2e"/>
    <stop offset="100%" stop-color="#ff5f57"/>
  </linearGradient>
</defs>
<rect x="80" y="82" width="740" height="28" rx="11" fill="url(#specGrad)" opacity="0.85"/>

<!-- Mode: plan (left) -->
<rect x="56" y="124" width="220" height="110" rx="8" fill="#f0f0f0" stroke="#28c840" stroke-width="2.5"/>
<line x1="166" y1="82" x2="166" y2="122" stroke="#28c840" stroke-width="2" stroke-dasharray="4,3"/>
<circle cx="166" cy="96" r="5" fill="#28c840"/>
<text x="166" y="150" font-family="Courier New, Consolas, DejaVu Sans Mono, monospace" font-size="14" fill="#28c840" text-anchor="middle" font-weight="bold">plan</text>
<text x="166" y="170" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="12" fill="#1d1d1f" text-anchor="middle">읽기만 허용</text>
<text x="166" y="188" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="11" fill="#7a7a7a" text-anchor="middle">모든 수정 → 승인 필요</text>
<text x="166" y="206" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="11" fill="#28c840" text-anchor="middle">가장 안전</text>

<!-- Mode: default (center) -->
<rect x="326" y="124" width="248" height="110" rx="8" fill="#f0f0f0" stroke="#febc2e" stroke-width="2.5"/>
<line x1="450" y1="82" x2="450" y2="122" stroke="#febc2e" stroke-width="2" stroke-dasharray="4,3"/>
<circle cx="450" cy="96" r="5" fill="#febc2e"/>
<text x="450" y="150" font-family="Courier New, Consolas, DejaVu Sans Mono, monospace" font-size="14" fill="#febc2e" text-anchor="middle" font-weight="bold">default</text>
<text x="450" y="170" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="12" fill="#1d1d1f" text-anchor="middle">읽기 자동 · 쓰기/실행 승인</text>
<text x="450" y="188" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="11" fill="#7a7a7a" text-anchor="middle">균형 잡힌 설정</text>
<rect x="386" y="202" width="128" height="22" rx="8" fill="#febc2e" opacity="0.2"/>
<text x="450" y="217" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="11" fill="#febc2e" text-anchor="middle" font-weight="bold">★ Remote Control 권장</text>

<!-- Mode: bypassPermissions (right) -->
<rect x="624" y="124" width="240" height="110" rx="8" fill="#f0f0f0" stroke="#ff5f57" stroke-width="2.5"/>
<line x1="734" y1="82" x2="734" y2="122" stroke="#ff5f57" stroke-width="2" stroke-dasharray="4,3"/>
<circle cx="734" cy="96" r="5" fill="#ff5f57"/>
<text x="734" y="146" font-family="Courier New, Consolas, DejaVu Sans Mono, monospace" font-size="11" fill="#ff5f57" text-anchor="middle" font-weight="bold">bypassPermissions</text>

<text x="734" y="184" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="11" fill="#7a7a7a" text-anchor="middle">승인 단계 없음</text>

<!-- Labels -->
<text x="80" y="258" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="12" fill="#28c840" text-anchor="start">← 높은 보안</text>
<text x="820" y="258" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="12" fill="#ff5f57" text-anchor="end">낮은 보안 →</text>
