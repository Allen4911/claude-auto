<svg xmlns="http://www.w3.org/2000/svg" width="720" height="304" viewBox="0 0 900 380">
<rect width="900" height="380" fill="#f5f5f7"/>
<text x="450" y="38" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="22" fill="#1d1d1f" text-anchor="middle" font-weight="bold">활성화 방법 선택 가이드</text>
<text x="450" y="62" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="14" fill="#7a7a7a" text-anchor="middle">상황에 맞는 활성화 방법 선택</text>

<!-- Start -->
<rect x="340" y="82" width="220" height="44" rx="22" fill="#ffffff" stroke="#1d1d1f" stroke-width="2"/>
<text x="450" y="109" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="14" fill="#1d1d1f" text-anchor="middle" font-weight="bold">Remote Control 켜고 싶다</text>

<line x1="450" y1="126" x2="450" y2="152" stroke="#0066cc" stroke-width="2"/>
<polygon points="450,154 444,144 456,144" fill="#0066cc"/>

<!-- Q1: 항상 켜둘까? -->
<rect x="310" y="154" width="280" height="42" rx="8" fill="#e8e8ed" stroke="#0066cc" stroke-width="1.5"/>
<text x="450" y="180" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="14" fill="#0066cc" text-anchor="middle">항상 켜두고 싶다?</text>

<!-- Yes branch (left) -->
<line x1="312" y1="175" x2="232" y2="230" stroke="#0066cc" stroke-width="2"/>
<polygon points="232,230 228,220 238,222" fill="#0066cc"/>
<text x="266" y="190" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="12" fill="#0066cc" text-anchor="middle">YES</text>

<rect x="50" y="232" width="250" height="76" rx="8" fill="#f0f0f0" stroke="#0066cc" stroke-width="2"/>
<text x="175" y="258" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="13" fill="#0066cc" text-anchor="middle" font-weight="bold">settings.json</text>
<text x="175" y="278" font-family="Courier New, Consolas, DejaVu Sans Mono, monospace" font-size="11" fill="#1d1d1f" text-anchor="middle">"remoteControl":</text>
<text x="175" y="295" font-family="Courier New, Consolas, DejaVu Sans Mono, monospace" font-size="11" fill="#0066cc" text-anchor="middle">{ "enabled": true }</text>

<!-- No branch (right): Q2 -->
<line x1="588" y1="175" x2="668" y2="230" stroke="#0066cc" stroke-width="2"/>
<polygon points="668,230 660,222 670,220" fill="#0066cc"/>
<text x="634" y="190" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="12" fill="#0066cc" text-anchor="middle">NO</text>

<rect x="558" y="232" width="292" height="42" rx="8" fill="#e8e8ed" stroke="#0066cc" stroke-width="1.5"/>
<text x="704" y="258" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="14" fill="#0066cc" text-anchor="middle">이번 세션만?</text>

<!-- Q2 Yes (bottom-right) -->
<line x1="640" y1="274" x2="580" y2="314" stroke="#0066cc" stroke-width="2"/>
<polygon points="580,314 580,304 590,308" fill="#0066cc"/>
<text x="630" y="300" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="12" fill="#0066cc" text-anchor="middle">YES</text>

<rect x="460" y="316" width="240" height="54" rx="8" fill="#f0f0f0" stroke="#0066cc" stroke-width="2"/>
<text x="580" y="340" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="13" fill="#0066cc" text-anchor="middle" font-weight="bold">CLI 플래그</text>
<text x="580" y="358" font-family="Courier New, Consolas, DejaVu Sans Mono, monospace" font-size="11" fill="#1d1d1f" text-anchor="middle">claude --rc</text>

<!-- Q2 No (far right) -->
<line x1="768" y1="274" x2="820" y2="314" stroke="#0066cc" stroke-width="2"/>
<polygon points="820,314 812,306 820,304" fill="#0066cc"/>
<text x="832" y="300" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="12" fill="#0066cc" text-anchor="middle">NO</text>

<rect x="730" y="316" width="150" height="54" rx="8" fill="#f0f0f0" stroke="#0066cc" stroke-width="2"/>
<text x="805" y="340" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif" font-size="12" fill="#0066cc" text-anchor="middle" font-weight="bold">실행 중 켜기</text>
<text x="805" y="358" font-family="Courier New, Consolas, DejaVu Sans Mono, monospace" font-size="10" fill="#1d1d1f" text-anchor="middle">/remote-control</text>
</svg>
