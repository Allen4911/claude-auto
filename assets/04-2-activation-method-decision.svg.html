<svg xmlns="http://www.w3.org/2000/svg" width="900" height="380" viewBox="0 0 900 380">
<rect width="900" height="380" fill="#1e1e2e"/>
<text x="450" y="38" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="22" fill="#cdd6f4" text-anchor="middle" font-weight="bold">활성화 방법 선택 가이드</text>
<text x="450" y="62" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="14" fill="#a6adc8" text-anchor="middle">상황에 맞는 활성화 방법 선택</text>

<!-- Start -->
<rect x="340" y="82" width="220" height="44" rx="22" fill="#313244" stroke="#cdd6f4" stroke-width="2"/>
<text x="450" y="109" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="14" fill="#cdd6f4" text-anchor="middle" font-weight="bold">Remote Control 켜고 싶다</text>

<line x1="450" y1="126" x2="450" y2="152" stroke="#fab387" stroke-width="2"/>
<polygon points="450,154 444,144 456,144" fill="#fab387"/>

<!-- Q1: 항상 켜둘까? -->
<rect x="310" y="154" width="280" height="42" rx="8" fill="#45475a" stroke="#fab387" stroke-width="1.5"/>
<text x="450" y="180" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="14" fill="#f9e2af" text-anchor="middle">항상 켜두고 싶다?</text>

<!-- Yes branch (left) -->
<line x1="312" y1="175" x2="232" y2="230" stroke="#a6e3a1" stroke-width="2"/>
<polygon points="232,230 228,220 238,222" fill="#a6e3a1"/>
<text x="266" y="210" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" fill="#a6e3a1" text-anchor="middle">YES</text>

<rect x="50" y="232" width="250" height="76" rx="8" fill="#181825" stroke="#a6e3a1" stroke-width="2"/>
<text x="175" y="258" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="13" fill="#a6e3a1" text-anchor="middle" font-weight="bold">settings.json</text>
<text x="175" y="278" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="11" fill="#cdd6f4" text-anchor="middle">"remoteControl":</text>
<text x="175" y="295" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="11" fill="#a6e3a1" text-anchor="middle">{ "enabled": true }</text>

<!-- No branch (right): Q2 -->
<line x1="588" y1="175" x2="668" y2="230" stroke="#fab387" stroke-width="2"/>
<polygon points="668,230 660,222 670,220" fill="#fab387"/>
<text x="634" y="210" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" fill="#fab387" text-anchor="middle">NO</text>

<rect x="558" y="232" width="292" height="42" rx="8" fill="#45475a" stroke="#fab387" stroke-width="1.5"/>
<text x="704" y="258" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="14" fill="#f9e2af" text-anchor="middle">이번 세션만?</text>

<!-- Q2 Yes (bottom-right) -->
<line x1="640" y1="274" x2="580" y2="314" stroke="#a6e3a1" stroke-width="2"/>
<polygon points="580,314 580,304 590,308" fill="#a6e3a1"/>
<text x="600" y="300" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" fill="#a6e3a1" text-anchor="middle">YES</text>

<rect x="460" y="316" width="240" height="54" rx="8" fill="#181825" stroke="#89b4fa" stroke-width="2"/>
<text x="580" y="340" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="13" fill="#89b4fa" text-anchor="middle" font-weight="bold">CLI 플래그</text>
<text x="580" y="358" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="11" fill="#cdd6f4" text-anchor="middle">claude --rc</text>

<!-- Q2 No (far right) -->
<line x1="768" y1="274" x2="820" y2="314" stroke="#fab387" stroke-width="2"/>
<polygon points="820,314 812,306 820,304" fill="#fab387"/>
<text x="802" y="300" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" fill="#fab387" text-anchor="middle">NO</text>

<rect x="730" y="316" width="150" height="54" rx="8" fill="#181825" stroke="#cba6f7" stroke-width="2"/>
<text x="805" y="340" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" fill="#cba6f7" text-anchor="middle" font-weight="bold">실행 중 켜기</text>
<text x="805" y="358" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="10" fill="#cdd6f4" text-anchor="middle">/remote-control</text>
</svg>
