<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{margin:0;background:#0f172a;font-family:'Noto Sans CJK KR',DejaVu Sans,system-ui,sans-serif}</style></head><body>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="400" viewBox="0 0 900 400">
  <rect width="900" height="400" fill="#0f172a"/>
  <text x="450" y="35" fill="#e2e8f0" font-size="16" font-weight="bold" text-anchor="middle">check-team.sh 자동 복구 로직 흐름도</text>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="none" stroke="#3b82f6" stroke-width="1.5"/></marker>
    <marker id="b" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="none" stroke="#ef4444" stroke-width="1.5"/></marker>
    <marker id="c" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="none" stroke="#22c55e" stroke-width="1.5"/></marker>
  </defs>
  <!-- Start -->
  <rect x="350" y="52" width="200" height="36" rx="8" fill="#1e40af" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="450" y="75" fill="#bfdbfe" font-size="13" font-weight="bold" text-anchor="middle">check-team.sh 실행</text>
  <line x1="450" y1="88" x2="450" y2="115" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#a)"/>
  <!-- Diamond 1: session exists? -->
  <polygon points="450,115 560,148 450,181 340,148" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="450" y="144" fill="#fbbf24" font-size="12" font-weight="bold" text-anchor="middle">세션 존재?</text>
  <!-- NO branch left -->
  <line x1="340" y1="148" x2="200" y2="148" stroke="#ef4444" stroke-width="1.5" marker-end="url(#b)"/>
  <text x="270" y="140" fill="#f87171" font-size="10" text-anchor="middle">NO</text>
  <rect x="80" y="125" width="120" height="46" rx="6" fill="#2d0a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="140" y="145" fill="#fca5a5" font-size="10" text-anchor="middle">setup-team.sh</text>
  <text x="140" y="161" fill="#fca5a5" font-size="10" text-anchor="middle">실행 후 종료</text>
  <!-- YES branch down -->
  <line x1="450" y1="181" x2="450" y2="210" stroke="#22c55e" stroke-width="1.5" marker-end="url(#c)"/>
  <text x="460" y="200" fill="#4ade80" font-size="10">YES</text>
  <!-- Diamond 2: pane count? -->
  <polygon points="450,210 570,243 450,276 330,243" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="450" y="239" fill="#fbbf24" font-size="12" font-weight="bold" text-anchor="middle">파인 수 = 6?</text>
  <!-- NO branch right -->
  <line x1="570" y1="243" x2="680" y2="243" stroke="#ef4444" stroke-width="1.5" marker-end="url(#b)"/>
  <text x="625" y="235" fill="#f87171" font-size="10" text-anchor="middle">NO</text>
  <rect x="680" y="220" width="160" height="46" rx="6" fill="#2d0a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="760" y="240" fill="#fca5a5" font-size="10" text-anchor="middle">경고 메시지</text>
  <text x="760" y="256" fill="#fca5a5" font-size="10" text-anchor="middle">종료 (exit 1)</text>
  <!-- YES branch down -->
  <line x1="450" y1="276" x2="450" y2="305" stroke="#22c55e" stroke-width="1.5" marker-end="url(#c)"/>
  <text x="460" y="295" fill="#4ade80" font-size="10">YES</text>
  <!-- Diamond 3: claude running? -->
  <polygon points="450,305 580,333 450,361 320,333" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="450" y="325" fill="#c4b5fd" font-size="11" font-weight="bold" text-anchor="middle">각 파인 claude 실행 중?</text>
  <text x="450" y="341" fill="#a78bfa" font-size="9" text-anchor="middle">(P0~P5 반복)</text>
  <!-- NO branch left -->
  <line x1="320" y1="333" x2="200" y2="333" stroke="#ef4444" stroke-width="1.5" marker-end="url(#b)"/>
  <text x="260" y="325" fill="#f87171" font-size="10" text-anchor="middle">NO</text>
  <rect x="60" y="310" width="140" height="46" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="130" y="330" fill="#93c5fd" font-size="10" text-anchor="middle">해당 파인</text>
  <text x="130" y="346" fill="#93c5fd" font-size="10" text-anchor="middle">claude 재시작</text>
  <!-- YES branch right -->
  <line x1="580" y1="333" x2="680" y2="333" stroke="#22c55e" stroke-width="1.5" marker-end="url(#c)"/>
  <text x="630" y="325" fill="#4ade80" font-size="10">YES</text>
  <rect x="680" y="310" width="140" height="46" rx="6" fill="#0c2a1a" stroke="#22c55e" stroke-width="1"/>
  <text x="750" y="337" fill="#4ade80" font-size="11" font-weight="bold" text-anchor="middle">"정상" 출력</text>
  <!-- Bottom -->
  <text x="450" y="388" fill="#475569" font-size="11" text-anchor="middle">cron으로 10분마다 자동 실행 가능</text>
</svg>
</body></html>
