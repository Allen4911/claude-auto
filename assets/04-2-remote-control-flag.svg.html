<svg xmlns="http://www.w3.org/2000/svg" width="900" height="380" viewBox="0 0 900 380">

<!-- Prompt line -->

<text x="104" y="130" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="13" fill="#a6e3a1" text-anchor="start">claude</text>
<text x="172" y="130" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="13" fill="#89b4fa" text-anchor="start">--remote-control</text>

<!-- Separator line -->
<line x1="76" y1="144" x2="824" y2="144" stroke="#313244" stroke-width="1"/>

<!-- Output block -->
<text x="90" y="168" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="15" fill="#a6e3a1" text-anchor="start" font-weight="bold">✓  Remote Control 활성화됨</text>

<text x="90" y="198" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="13" fill="#a6adc8" text-anchor="start">   세션 :</text>

<text x="210" y="222" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="13" fill="#89b4fa" text-anchor="start">https://claude.ai/code/session_xxxxx</text>

<text x="90" y="246" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="13" fill="#a6adc8" text-anchor="start">   QR   :</text>

<line x1="76" y1="260" x2="824" y2="260" stroke="#313244" stroke-width="1"/>
