<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; background: #f5f5f7; display: flex; justify-content: center; align-items: flex-start; padding: 40px 0; }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="780" viewBox="0 0 720 780" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0066cc"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="720" height="780" fill="#f5f5f7"/>

  <!-- 제목 영역 -->
  <rect x="30" y="30" width="660" height="60" rx="11" ry="11" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
  <text x="360" y="56" text-anchor="middle" font-size="16" font-weight="bold" fill="#1d1d1f">setup-team.sh</text>
  <text x="360" y="76" text-anchor="middle" font-size="13" fill="#7a7a7a">TMUX 팀 환경 자동 구성 스크립트 (6단계)</text>

  <!-- 커넥터 라인 (단계 사이) -->
  <line x1="88" y1="148" x2="88" y2="185" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="88" y1="263" x2="88" y2="300" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="88" y1="375" x2="88" y2="412" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="88" y1="490" x2="88" y2="527" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="88" y1="605" x2="88" y2="642" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 0단계 -->
  <circle cx="88" cy="120" r="22" fill="#0066cc"/>
  <text x="88" y="125" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">0단계</text>
  <rect x="125" y="97" width="565" height="50" rx="11" ry="11" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="145" y="117" font-size="13" font-weight="bold" fill="#1d1d1f">사전 의존성 확인</text>
  <text x="145" y="136" font-size="11" fill="#7a7a7a" font-family="Courier New, Consolas, monospace">command -v tmux &amp;&amp; command -v claude || exit 1</text>

  <!-- 1단계 -->
  <circle cx="88" cy="225" r="22" fill="#0066cc"/>
  <text x="88" y="230" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">1단계</text>
  <rect x="125" y="202" width="565" height="50" rx="11" ry="11" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="145" y="222" font-size="13" font-weight="bold" fill="#1d1d1f">기존 세션 정리</text>
  <text x="145" y="241" font-size="11" fill="#7a7a7a" font-family="Courier New, Consolas, monospace">tmux kill-session -t $SESSION 2&gt;/dev/null</text>

  <!-- 2단계 -->
  <circle cx="88" cy="340" r="22" fill="#0066cc"/>
  <text x="88" y="345" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">2단계</text>
  <rect x="125" y="305" width="565" height="78" rx="11" ry="11" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="145" y="325" font-size="13" font-weight="bold" fill="#1d1d1f">TMUX 세션 &amp; 레이아웃 설정</text>
  <text x="145" y="344" font-size="11" fill="#7a7a7a" font-family="Courier New, Consolas, monospace">tmux new-session -d -s $SESSION -x 220 -y 50</text>
  <text x="145" y="360" font-size="11" fill="#7a7a7a" font-family="Courier New, Consolas, monospace">tmux split-window -h -t $SESSION</text>
  <text x="145" y="376" font-size="11" fill="#7a7a7a" font-family="Courier New, Consolas, monospace">tmux select-layout -t $SESSION main-vertical</text>
  <!-- 미니 레이아웃 다이어그램 -->
  <rect x="590" y="312" width="90" height="64" rx="5" ry="5" fill="#f0f0f0" stroke="#c7c7cc" stroke-width="1"/>
  <rect x="594" y="316" width="50" height="56" rx="3" ry="3" fill="#ffffff" stroke="#0066cc" stroke-width="1"/>
  <rect x="648" y="316" width="28" height="26" rx="3" ry="3" fill="#ffffff" stroke="#c7c7cc" stroke-width="1"/>
  <rect x="648" y="346" width="28" height="26" rx="3" ry="3" fill="#ffffff" stroke="#c7c7cc" stroke-width="1"/>
  <text x="619" y="348" text-anchor="middle" font-size="8" fill="#1d1d1f">Pane0</text>
  <text x="662" y="333" text-anchor="middle" font-size="7" fill="#1d1d1f">P1</text>
  <text x="662" y="363" text-anchor="middle" font-size="7" fill="#1d1d1f">P2</text>

  <!-- 3단계 -->
  <circle cx="88" cy="455" r="22" fill="#0066cc"/>
  <text x="88" y="460" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">3단계</text>
  <rect x="125" y="420" width="565" height="62" rx="11" ry="11" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="145" y="440" font-size="13" font-weight="bold" fill="#1d1d1f">파인 이름 설정</text>
  <text x="145" y="459" font-size="11" fill="#7a7a7a" font-family="Courier New, Consolas, monospace">tmux rename-window -t $SESSION:0 '쭌'</text>
  <text x="145" y="475" font-size="11" fill="#7a7a7a" font-family="Courier New, Consolas, monospace">tmux rename-window -t $SESSION:1 '민준 PM'</text>

  <!-- 4단계 -->
  <circle cx="88" cy="568" r="22" fill="#0066cc"/>
  <text x="88" y="573" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">4단계</text>
  <rect x="125" y="535" width="565" height="62" rx="11" ry="11" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="145" y="555" font-size="13" font-weight="bold" fill="#1d1d1f">각 파인에 Claude 자동 실행</text>
  <text x="145" y="574" font-size="11" fill="#7a7a7a" font-family="Courier New, Consolas, monospace">tmux send-keys -t $SESSION:0.0 'claude' C-m</text>
  <text x="145" y="590" font-size="11" fill="#7a7a7a" font-family="Courier New, Consolas, monospace">tmux send-keys -t $SESSION:1.0 'claude' C-m</text>

  <!-- 5단계 -->
  <circle cx="88" cy="683" r="22" fill="#0066cc"/>
  <text x="88" y="688" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">5단계</text>
  <rect x="125" y="660" width="565" height="50" rx="11" ry="11" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
  <text x="145" y="680" font-size="13" font-weight="bold" fill="#1d1d1f">세션 접속</text>
  <text x="145" y="699" font-size="11" fill="#0066cc" font-family="Courier New, Consolas, monospace">tmux attach-session -t $SESSION</text>

  <!-- 하단 설명 -->
  <text x="360" y="750" text-anchor="middle" font-size="11" fill="#7a7a7a">실행: bash setup-team.sh  |  1회 실행으로 전체 팀 환경 자동 구성</text>
</svg>
</body>
</html>
