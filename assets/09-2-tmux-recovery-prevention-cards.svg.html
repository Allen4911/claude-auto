<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{margin:0;background:#0f172a;font-family:system-ui,sans-serif}</style></head><body>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280">
  <rect width="900" height="280" fill="#0f172a"/>
  <text x="450" y="35" fill="#e2e8f0" font-size="16" font-weight="bold" text-anchor="middle">TMUX 세션 소실 예방 조치 2가지</text>
  <!-- Card 1: tmux-resurrect -->
  <rect x="60" y="60" width="360" height="190" rx="12" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
  <rect x="60" y="60" width="360" height="50" rx="12" fill="#3b1f5c"/>
  <rect x="60" y="88" width="360" height="22" fill="#3b1f5c"/>
  <text x="240" y="92" fill="#c4b5fd" font-size="14" font-weight="bold" text-anchor="middle">tmux-resurrect 플러그인</text>
  <text x="240" y="135" fill="#94a3b8" font-size="12" text-anchor="middle">세션 상태를 파일로 저장/복원</text>
  <rect x="85" y="150" width="310" height="30" rx="5" fill="#0f172a"/>
  <text x="240" y="169" fill="#a78bfa" font-size="11" font-family="monospace" text-anchor="middle">Ctrl-b + Ctrl-s  →  세션 저장</text>
  <rect x="85" y="186" width="310" height="30" rx="5" fill="#0f172a"/>
  <text x="240" y="205" fill="#a78bfa" font-size="11" font-family="monospace" text-anchor="middle">Ctrl-b + Ctrl-r  →  세션 복원</text>
  <text x="240" y="236" fill="#7c3aed" font-size="11" font-weight="bold" text-anchor="middle">재부팅 후에도 세션 완전 복원</text>
  <!-- Card 2: Memory monitoring -->
  <rect x="480" y="60" width="360" height="190" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <rect x="480" y="60" width="360" height="50" rx="12" fill="#064e3b"/>
  <rect x="480" y="88" width="360" height="22" fill="#064e3b"/>
  <text x="660" y="92" fill="#6ee7b7" font-size="14" font-weight="bold" text-anchor="middle">메모리 모니터링</text>
  <text x="660" y="135" fill="#94a3b8" font-size="12" text-anchor="middle">OOM 방지 — 충분한 RAM 확보</text>
  <rect x="505" y="150" width="310" height="30" rx="5" fill="#0f172a"/>
  <text x="660" y="169" fill="#34d399" font-size="11" font-family="monospace" text-anchor="middle">ps aux | grep claude | sort</text>
  <text x="660" y="200" fill="#94a3b8" font-size="12" text-anchor="middle">권장: 16GB RAM 이상</text>
  <text x="660" y="218" fill="#94a3b8" font-size="12" text-anchor="middle">동시 실행 수 조절 고려</text>
  <text x="660" y="236" fill="#059669" font-size="11" font-weight="bold" text-anchor="middle">OOM으로 인한 강제 종료 방지</text>
  <!-- Relationship -->
  <text x="450" y="265" fill="#475569" font-size="11" text-anchor="middle">예방(resurrect + 메모리 관리) &gt; 복구 — 사전 조치가 복구 시간 최소화</text>
</svg>
</body></html>
