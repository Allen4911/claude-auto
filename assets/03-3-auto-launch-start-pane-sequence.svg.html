<svg xmlns="http://www.w3.org/2000/svg" width="900" height="380" viewBox="0 0 900 380">
<rect width="900" height="380" fill="#1e1e2e"/>
<text x="450" y="38" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="22" fill="#cdd6f4" text-anchor="middle" font-weight="bold">start_claude_in_pane — 단일 파인 실행 흐름</text>
<text x="450" y="62" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="14" fill="#a6adc8" text-anchor="middle">입력 초기화 → 실행 → 다이얼로그 처리 → 완료</text>

<!-- Step blocks with vertical flow -->
<!-- Step 1 -->
<rect x="330" y="82" width="240" height="50" rx="8" fill="#313244" stroke="#89b4fa" stroke-width="2"/>
<text x="450" y="104" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="13" fill="#89b4fa" text-anchor="middle" font-weight="bold">① 입력 초기화</text>
<text x="450" y="122" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="11" fill="#a6adc8" text-anchor="middle">send-keys C-c Enter · C-u Enter</text>

<line x1="450" y1="132" x2="450" y2="152" stroke="#fab387" stroke-width="2"/>
<polygon points="450,154 444,144 456,144" fill="#fab387"/>

<!-- Step 2 -->
<rect x="330" y="154" width="240" height="50" rx="8" fill="#313244" stroke="#f9e2af" stroke-width="2"/>
<text x="450" y="176" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="13" fill="#f9e2af" text-anchor="middle" font-weight="bold">② claude 실행</text>
<text x="450" y="194" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="11" fill="#a6adc8" text-anchor="middle">send-keys "claude" Enter</text>

<line x1="450" y1="204" x2="450" y2="224" stroke="#fab387" stroke-width="2"/>
<polygon points="450,226 444,216 456,216" fill="#fab387"/>

<!-- Step 3: Dialog 1 detection -->
<rect x="280" y="226" width="340" height="60" rx="8" fill="#181825" stroke="#cba6f7" stroke-width="2"/>
<text x="450" y="248" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="13" fill="#cba6f7" text-anchor="middle" font-weight="bold">③ 다이얼로그 1 감지</text>
<text x="450" y="265" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="11" fill="#cdd6f4" text-anchor="middle">capture-pane | grep "trust"</text>
<text x="450" y="280" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="11" fill="#a6e3a1" text-anchor="middle">→ send-keys Enter</text>

<line x1="450" y1="286" x2="450" y2="306" stroke="#fab387" stroke-width="2"/>
<polygon points="450,308 444,298 456,298" fill="#fab387"/>

<!-- Step 4: Dialog 2 detection -->
<rect x="280" y="308" width="340" height="60" rx="8" fill="#181825" stroke="#94e2d5" stroke-width="2"/>
<text x="450" y="330" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="13" fill="#94e2d5" text-anchor="middle" font-weight="bold">④ 다이얼로그 2 감지</text>
<text x="450" y="347" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="11" fill="#cdd6f4" text-anchor="middle">capture-pane | grep "accept"</text>
<text x="450" y="362" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="11" fill="#a6e3a1" text-anchor="middle">→ send-keys ↓ Enter</text>

<!-- Timeout branch (right side) -->
<rect x="670" y="226" width="200" height="142" rx="8" fill="#181825" stroke="#f38ba8" stroke-width="1.5" stroke-dasharray="6,3"/>
<text x="770" y="254" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" fill="#f38ba8" text-anchor="middle" font-weight="bold">타임아웃 경로</text>
<text x="770" y="274" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="11" fill="#a6adc8" text-anchor="middle">30초 경과</text>
<text x="770" y="292" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="11" fill="#a6adc8" text-anchor="middle">다이얼로그 미감지</text>
<text x="770" y="316" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="16" fill="#f38ba8" text-anchor="middle">!</text>
<text x="770" y="340" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="11" fill="#f38ba8" text-anchor="middle">return 1</text>
<text x="770" y="358" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="10" fill="#585b70" text-anchor="middle">(호출자가 처리)</text>
<line x1="620" y1="257" x2="668" y2="257" stroke="#f38ba8" stroke-width="1.5" stroke-dasharray="3,2"/>

<!-- Success terminal at bottom -->
<rect x="220" y="80" width="100" height="290" rx="0" fill="none" stroke="#313244" stroke-width="1" stroke-dasharray="3,3"/>
<text x="168" y="110" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="11" fill="#585b70" text-anchor="middle">정상</text>
<text x="168" y="130" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="11" fill="#585b70" text-anchor="middle">경로</text>
</svg>
