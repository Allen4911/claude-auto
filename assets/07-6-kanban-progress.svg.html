<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>body { margin: 0; background: #f5f5f7; display: flex; justify-content: center; padding: 40px 0; }</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="520" viewBox="0 0 720 520" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0066cc"/>
    </marker>
  </defs>
  <rect width="720" height="520" fill="#f5f5f7"/>

  <!-- 제목 -->
  <rect x="30" y="20" width="660" height="50" rx="11" ry="11" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
  <text x="360" y="40" text-anchor="middle" font-size="15" font-weight="bold" fill="#1d1d1f">칸반 보드 진행 흐름</text>
  <text x="360" y="57" text-anchor="middle" font-size="12" fill="#7a7a7a">Inbox → In Progress → Review → Done</text>

  <!-- 화살표 (컬럼 간) -->
  <line x1="193" y1="225" x2="208" y2="225" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="370" y1="225" x2="385" y2="225" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="547" y1="225" x2="562" y2="225" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Inbox -->
  <rect x="18" y="90" width="175" height="270" rx="11" ry="11" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
  <rect x="18" y="90" width="175" height="42" rx="11" ry="11" fill="#0066cc"/>
  <rect x="18" y="112" width="175" height="20" fill="#0066cc"/>
  <text x="105" y="117" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">📥 Inbox</text>
  <text x="105" y="148" text-anchor="middle" font-size="11" fill="#7a7a7a">신규 메일 수집</text>
  <!-- 카드 예시 -->
  <rect x="32" y="163" width="147" height="32" rx="6" ry="6" fill="#f0f4ff" stroke="#0066cc" stroke-width="1"/>
  <text x="105" y="183" text-anchor="middle" font-size="10" fill="#0066cc">📧 신규 메일 #001</text>
  <rect x="32" y="200" width="147" height="32" rx="6" ry="6" fill="#f0f4ff" stroke="#0066cc" stroke-width="1"/>
  <text x="105" y="220" text-anchor="middle" font-size="10" fill="#0066cc">📧 신규 메일 #002</text>
  <rect x="32" y="237" width="147" height="32" rx="6" ry="6" fill="#e8e8ed" stroke="#c7c7cc" stroke-width="1"/>
  <text x="105" y="257" text-anchor="middle" font-size="10" fill="#7a7a7a">📧 대기 중...</text>

  <!-- 담당자 (아래) -->
  <rect x="18" y="370" width="175" height="75" rx="8" ry="8" fill="#f5f5f7" stroke="#e0e0e0" stroke-width="1"/>
  <circle cx="105" cy="390" r="12" fill="#0066cc"/>
  <text x="105" y="395" text-anchor="middle" font-size="10" fill="#ffffff">민</text>
  <text x="105" y="415" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d1d1f">민준 (PM)</text>
  <text x="105" y="433" text-anchor="middle" font-size="10" fill="#7a7a7a">메일 수집 및 우선순위 지정</text>

  <!-- In Progress -->
  <rect x="195" y="90" width="175" height="270" rx="11" ry="11" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
  <rect x="195" y="90" width="175" height="42" rx="11" ry="11" fill="#0066cc"/>
  <rect x="195" y="112" width="175" height="20" fill="#0066cc"/>
  <text x="283" y="117" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">⚙️ In Progress</text>
  <text x="283" y="148" text-anchor="middle" font-size="11" fill="#7a7a7a">분류 및 응답 초안 생성</text>
  <rect x="210" y="163" width="147" height="32" rx="6" ry="6" fill="#f0f4ff" stroke="#0066cc" stroke-width="1"/>
  <text x="283" y="183" text-anchor="middle" font-size="10" fill="#0066cc">✍️ 응답 작성 중 #003</text>
  <rect x="210" y="200" width="147" height="32" rx="6" ry="6" fill="#f0f4ff" stroke="#0066cc" stroke-width="1"/>
  <text x="283" y="220" text-anchor="middle" font-size="10" fill="#0066cc">🔖 분류 작업 #004</text>

  <rect x="195" y="370" width="175" height="75" rx="8" ry="8" fill="#f5f5f7" stroke="#e0e0e0" stroke-width="1"/>
  <circle cx="258" cy="390" r="12" fill="#e8e8ed"/>
  <text x="258" y="395" text-anchor="middle" font-size="10" fill="#1d1d1f">서</text>
  <circle cx="308" cy="390" r="12" fill="#e8e8ed"/>
  <text x="308" y="395" text-anchor="middle" font-size="10" fill="#1d1d1f">지</text>
  <text x="283" y="415" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d1d1f">서연 · 지훈</text>
  <text x="283" y="433" text-anchor="middle" font-size="10" fill="#7a7a7a">분류 및 응답 초안 생성</text>

  <!-- Review -->
  <rect x="372" y="90" width="175" height="270" rx="11" ry="11" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
  <rect x="372" y="90" width="175" height="42" rx="11" ry="11" fill="#0066cc"/>
  <rect x="372" y="112" width="175" height="20" fill="#0066cc"/>
  <text x="460" y="117" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">🔎 Review</text>
  <text x="460" y="148" text-anchor="middle" font-size="11" fill="#7a7a7a">검토 및 피드백</text>
  <rect x="387" y="163" width="147" height="32" rx="6" ry="6" fill="#f0f4ff" stroke="#0066cc" stroke-width="1"/>
  <text x="460" y="183" text-anchor="middle" font-size="10" fill="#0066cc">🔍 검토 중 #001</text>
  <rect x="387" y="200" width="147" height="32" rx="6" ry="6" fill="#e8e8ed" stroke="#c7c7cc" stroke-width="1"/>
  <text x="460" y="220" text-anchor="middle" font-size="10" fill="#7a7a7a">⏳ 대기 #002</text>

  <rect x="372" y="370" width="175" height="75" rx="8" ry="8" fill="#f5f5f7" stroke="#e0e0e0" stroke-width="1"/>
  <circle cx="460" cy="390" r="12" fill="#e8e8ed"/>
  <text x="460" y="395" text-anchor="middle" font-size="10" fill="#1d1d1f">태</text>
  <text x="460" y="415" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d1d1f">태양 (리뷰어)</text>
  <text x="460" y="433" text-anchor="middle" font-size="10" fill="#7a7a7a">검토 및 피드백</text>

  <!-- Done -->
  <rect x="549" y="90" width="153" height="270" rx="11" ry="11" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
  <rect x="549" y="90" width="153" height="42" rx="11" ry="11" fill="#0066cc"/>
  <rect x="549" y="112" width="153" height="20" fill="#0066cc"/>
  <text x="625" y="117" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">✅ Done</text>
  <text x="625" y="148" text-anchor="middle" font-size="11" fill="#7a7a7a">최종 승인 및 발송</text>
  <rect x="563" y="163" width="127" height="32" rx="6" ry="6" fill="#e8f5e9" stroke="#28c840" stroke-width="1"/>
  <text x="625" y="183" text-anchor="middle" font-size="10" fill="#1d1d1f">✅ 완료 #001</text>
  <rect x="563" y="200" width="127" height="32" rx="6" ry="6" fill="#e8f5e9" stroke="#28c840" stroke-width="1"/>
  <text x="625" y="220" text-anchor="middle" font-size="10" fill="#1d1d1f">✅ 완료 #002</text>

  <rect x="549" y="370" width="153" height="75" rx="8" ry="8" fill="#f5f5f7" stroke="#e0e0e0" stroke-width="1"/>
  <circle cx="625" cy="390" r="12" fill="#0066cc"/>
  <text x="625" y="395" text-anchor="middle" font-size="10" fill="#ffffff">민</text>
  <text x="625" y="415" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d1d1f">민준 (PM)</text>
  <text x="625" y="433" text-anchor="middle" font-size="10" fill="#7a7a7a">최종 판단 및 발송</text>

  <text x="360" y="490" text-anchor="middle" font-size="11" fill="#7a7a7a">칸반 보드 · 팀 역할 분담 · 단계별 진행 관리</text>
</svg>
</body>
</html>
