<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
<rect width="900" height="300" fill="#1e1e2e"/>
<text x="450" y="32" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="20" fill="#cdd6f4" text-anchor="middle" font-weight="bold">GitHub Actions 비용 최적화 3기법</text>
<text x="450" y="52" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="13" fill="#a6adc8" text-anchor="middle">안 돌려도 되는 실행을 안 돌리는 방법</text>

<!-- Technique 1: paths filter -->
<rect x="30" y="68" width="260" height="200" rx="10" fill="#313244" stroke="#a6e3a1" stroke-width="2"/>
<rect x="30" y="68" width="260" height="46" rx="10" fill="#a6e3a1" opacity="0.25"/>
<rect x="30" y="96" width="260" height="18" fill="#a6e3a1" opacity="0.25"/>
<text x="160" y="90" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="15" fill="#a6e3a1" text-anchor="middle" font-weight="bold">① paths 필터</text>
<text x="160" y="110" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="11" fill="#a6adc8" text-anchor="middle">변경 파일에만 실행</text>
<rect x="50" y="128" width="220" height="60" rx="6" fill="#181825" stroke="#45475a" stroke-width="1"/>
<text x="160" y="149" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="10" fill="#a6e3a1" text-anchor="middle">on:</text>
<text x="160" y="163" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="10" fill="#a6e3a1" text-anchor="middle">  push:</text>
<text x="160" y="177" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="10" fill="#a6e3a1" text-anchor="middle">    paths: ['src/**']</text>
<text x="160" y="216" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" fill="#cdd6f4" text-anchor="middle">docs/ 수정만으로</text>
<text x="160" y="234" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" fill="#cdd6f4" text-anchor="middle">테스트 안 돌아감</text>
<text x="160" y="254" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="11" fill="#a6e3a1" text-anchor="middle">불필요 실행 제거</text>

<!-- Technique 2: timeout -->
<rect x="320" y="68" width="260" height="200" rx="10" fill="#313244" stroke="#f9e2af" stroke-width="2"/>
<rect x="320" y="68" width="260" height="46" rx="10" fill="#f9e2af" opacity="0.25"/>
<rect x="320" y="96" width="260" height="18" fill="#f9e2af" opacity="0.25"/>
<text x="450" y="90" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="15" fill="#f9e2af" text-anchor="middle" font-weight="bold">② timeout-minutes</text>
<text x="450" y="110" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="11" fill="#a6adc8" text-anchor="middle">초과 시 자동 취소</text>
<rect x="340" y="128" width="220" height="60" rx="6" fill="#181825" stroke="#45475a" stroke-width="1"/>
<text x="450" y="149" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="10" fill="#f9e2af" text-anchor="middle">jobs:</text>
<text x="450" y="163" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="10" fill="#f9e2af" text-anchor="middle">  test:</text>
<text x="450" y="177" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="10" fill="#f9e2af" text-anchor="middle">    timeout-minutes: 10</text>
<text x="450" y="216" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" fill="#cdd6f4" text-anchor="middle">무한루프·hang 시</text>
<text x="450" y="234" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" fill="#cdd6f4" text-anchor="middle">10분 후 자동 종료</text>
<text x="450" y="254" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="11" fill="#f9e2af" text-anchor="middle">낭비 실행 차단</text>

<!-- Technique 3: concurrency -->
<rect x="610" y="68" width="260" height="200" rx="10" fill="#313244" stroke="#89b4fa" stroke-width="2"/>
<rect x="610" y="68" width="260" height="46" rx="10" fill="#89b4fa" opacity="0.25"/>
<rect x="610" y="96" width="260" height="18" fill="#89b4fa" opacity="0.25"/>
<text x="740" y="90" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="14" fill="#89b4fa" text-anchor="middle" font-weight="bold">③ concurrency</text>
<text x="740" y="110" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="11" fill="#a6adc8" text-anchor="middle">새 push 시 이전 취소</text>
<rect x="630" y="128" width="220" height="60" rx="6" fill="#181825" stroke="#45475a" stroke-width="1"/>
<text x="740" y="147" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="9" fill="#89b4fa" text-anchor="middle">concurrency:</text>
<text x="740" y="161" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="9" fill="#89b4fa" text-anchor="middle">  group: $&#123;&#123; github.ref &#125;&#125;</text>
<text x="740" y="175" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="9" fill="#89b4fa" text-anchor="middle">  cancel-in-progress: true</text>
<text x="740" y="216" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" fill="#cdd6f4" text-anchor="middle">연속 push 시 이전</text>
<text x="740" y="234" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" fill="#cdd6f4" text-anchor="middle">실행 자동 취소</text>
<text x="740" y="254" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="11" fill="#89b4fa" text-anchor="middle">사용량 40% 이상 절감</text>
</svg>
