<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>body { margin: 0; background: #f5f5f7; display: flex; justify-content: center; padding: 40px 0; }</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="520" viewBox="0 0 720 520" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0066cc"/>
    </marker>
  </defs>
  <rect width="720" height="520" fill="#f5f5f7"/>

  <!-- 제목 -->
  <rect x="30" y="20" width="660" height="50" rx="11" ry="11" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
  <text x="360" y="40" text-anchor="middle" font-size="15" font-weight="bold" fill="#1d1d1f">Cupangs 팀 구성도</text>
  <text x="360" y="57" text-anchor="middle" font-size="12" fill="#7a7a7a">앨런 → 쭌(팀장) → 민준(PM) → 팀원</text>

  <!-- 앨런 -->
  <rect x="130" y="100" width="160" height="80" rx="11" ry="11" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
  <circle cx="210" cy="120" r="18" fill="#0066cc"/>
  <text x="210" y="126" text-anchor="middle" font-size="16" fill="#ffffff">👤</text>
  <text x="210" y="154" text-anchor="middle" font-size="14" font-weight="bold" fill="#1d1d1f">앨런</text>
  <text x="210" y="172" text-anchor="middle" font-size="12" fill="#7a7a7a">(사용자)</text>

  <!-- 화살표 → 쭌 -->
  <line x1="290" y1="140" x2="340" y2="140" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 쭌 -->
  <rect x="342" y="100" width="160" height="80" rx="11" ry="11" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
  <circle cx="422" cy="120" r="18" fill="#0066cc"/>
  <text x="422" y="126" text-anchor="middle" font-size="16" fill="#ffffff">👤</text>
  <text x="422" y="154" text-anchor="middle" font-size="14" font-weight="bold" fill="#1d1d1f">쭌</text>
  <text x="422" y="172" text-anchor="middle" font-size="12" fill="#7a7a7a">(팀장)</text>

  <!-- 화살표 → 민준 (아래) -->
  <line x1="422" y1="180" x2="422" y2="225" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 민준 -->
  <rect x="302" y="228" width="240" height="80" rx="11" ry="11" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
  <circle cx="422" cy="252" r="18" fill="#0066cc"/>
  <text x="422" y="258" text-anchor="middle" font-size="16" fill="#ffffff">👤</text>
  <text x="422" y="286" text-anchor="middle" font-size="14" font-weight="bold" fill="#1d1d1f">민준</text>
  <text x="422" y="304" text-anchor="middle" font-size="12" fill="#7a7a7a">(PM)</text>

  <!-- 민준 → 팀원 3명 분기 -->
  <line x1="422" y1="308" x2="422" y2="340" stroke="#0066cc" stroke-width="2"/>
  <line x1="185" y1="340" x2="655" y2="340" stroke="#0066cc" stroke-width="2"/>

  <!-- 서연 -->
  <line x1="185" y1="340" x2="185" y2="370" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="95" y="372" width="180" height="85" rx="11" ry="11" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <circle cx="185" cy="398" r="16" fill="#e8e8ed"/>
  <text x="185" y="404" text-anchor="middle" font-size="14" fill="#1d1d1f">👤</text>
  <text x="185" y="430" text-anchor="middle" font-size="14" font-weight="bold" fill="#1d1d1f">서연</text>
  <text x="185" y="448" text-anchor="middle" font-size="12" fill="#7a7a7a">(개발)</text>

  <!-- 태양 -->
  <line x1="422" y1="340" x2="422" y2="370" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="332" y="372" width="180" height="85" rx="11" ry="11" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <circle cx="422" cy="398" r="16" fill="#e8e8ed"/>
  <text x="422" y="404" text-anchor="middle" font-size="14" fill="#1d1d1f">👤</text>
  <text x="422" y="430" text-anchor="middle" font-size="14" font-weight="bold" fill="#1d1d1f">태양</text>
  <text x="422" y="448" text-anchor="middle" font-size="12" fill="#7a7a7a">(리뷰)</text>

  <!-- 지훈 -->
  <line x1="655" y1="340" x2="655" y2="370" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="565" y="372" width="250" height="85" rx="11" ry="11" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <circle cx="655" cy="398" r="16" fill="#e8e8ed"/>
  <text x="655" y="404" text-anchor="middle" font-size="14" fill="#1d1d1f">👤</text>
  <text x="655" y="430" text-anchor="middle" font-size="14" font-weight="bold" fill="#1d1d1f">지훈</text>
  <text x="655" y="448" text-anchor="middle" font-size="12" fill="#7a7a7a">(리서치)</text>

  <text x="360" y="500" text-anchor="middle" font-size="11" fill="#7a7a7a">5인 팀  |  앨런 지시 → 쭌 수령 → 민준 배분 → 팀원 실행</text>
</svg>
</body>
</html>
