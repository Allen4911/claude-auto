<svg xmlns="http://www.w3.org/2000/svg" width="720" height="440" viewBox="0 0 720 440">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,1 L9,5 L0,9 z" fill="#0066cc"/>
    </marker>
  </defs>
  <rect width="720" height="440" fill="#f5f5f7"/>
  <text x="360" y="42" font-family="Malgun Gothic, Noto Sans CJK KR, Arial, sans-serif" font-size="24" fill="#1d1d1f" text-anchor="middle" font-weight="bold">환경 점검 결정 트리</text>
  <text x="360" y="66" font-family="Malgun Gothic, Noto Sans CJK KR, Arial, sans-serif" font-size="15" fill="#7a7a7a" text-anchor="middle" font-weight="normal">내 OS에 맞는 확인만</text>
  <!-- Root box: 내 운영체제는? -->
  <rect x="260" y="88" width="200" height="60" rx="11" ry="11" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
  <text x="360" y="123" font-family="Malgun Gothic, Noto Sans CJK KR, Arial, sans-serif" font-size="17" fill="#0066cc" text-anchor="middle" font-weight="bold">내 운영체제는?</text>
  <!-- Branch lines from root to Windows/Linux -->
  <line x1="320" y1="148" x2="200" y2="214" stroke="#c7c7cc" stroke-width="2.4" marker-end="url(#ar)"/>
  <line x1="400" y1="148" x2="520" y2="214" stroke="#c7c7cc" stroke-width="2.4" marker-end="url(#ar)"/>
  <!-- Windows box -->
  <rect x="76" y="216" width="254" height="68" rx="11" ry="11" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
  <text x="203" y="246" font-family="Malgun Gothic, Noto Sans CJK KR, Arial, sans-serif" font-size="18" fill="#1d1d1f" text-anchor="middle" font-weight="bold">Windows</text>
  <text x="203" y="268" font-family="Malgun Gothic, Noto Sans CJK KR, Arial, sans-serif" font-size="13" fill="#7a7a7a" text-anchor="middle" font-weight="normal">WSL2 환경</text>
  <!-- Linux/macOS box -->
  <rect x="392" y="216" width="254" height="68" rx="11" ry="11" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
  <text x="519" y="246" font-family="Malgun Gothic, Noto Sans CJK KR, Arial, sans-serif" font-size="18" fill="#1d1d1f" text-anchor="middle" font-weight="bold">Linux / macOS</text>
  <text x="519" y="268" font-family="Malgun Gothic, Noto Sans CJK KR, Arial, sans-serif" font-size="13" fill="#7a7a7a" text-anchor="middle" font-weight="normal">네이티브 환경</text>
  <!-- Windows → command box -->
  <line x1="203" y1="284" x2="203" y2="326" stroke="#0066cc" stroke-width="2.2" marker-end="url(#ar)"/>
  <!-- Linux → command box -->
  <line x1="519" y1="284" x2="519" y2="326" stroke="#0066cc" stroke-width="2.2" marker-end="url(#ar)"/>
  <!-- Windows command box (terminal style) -->
  <rect x="76" y="328" width="254" height="68" rx="11" ry="11" fill="#f0f0f0" stroke="#0066cc" stroke-width="1.5"/>
  <text x="203" y="354" font-family="Courier New, Consolas, DejaVu Sans Mono, monospace" font-size="14" fill="#0066cc" text-anchor="middle" font-weight="normal">wsl --list --verbose</text>
  <text x="203" y="378" font-family="Malgun Gothic, Noto Sans CJK KR, Arial, sans-serif" font-size="12.5" fill="#7a7a7a" text-anchor="middle" font-weight="normal">VERSION 2 확인</text>
  <!-- Linux/macOS command box -->
  <rect x="392" y="328" width="254" height="68" rx="11" ry="11" fill="#f0f0f0" stroke="#0066cc" stroke-width="1.5"/>
  <text x="519" y="352" font-family="Courier New, Consolas, DejaVu Sans Mono, monospace" font-size="13.5" fill="#0066cc" text-anchor="middle" font-weight="normal">uname -a · free -h</text>
  <text x="519" y="374" font-family="Courier New, Consolas, DejaVu Sans Mono, monospace" font-size="13.5" fill="#0066cc" text-anchor="middle" font-weight="normal">df -h ~</text>
</svg>
