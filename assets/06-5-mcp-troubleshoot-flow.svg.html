<text x="165" y="198" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="10" fill="#a6adc8" text-anchor="middle">~/.claude.json</text>
<text x="165" y="214" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="11" fill="#a6adc8" text-anchor="middle">설정 파일 확인</text>
<text x="165" y="232" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="11" fill="#f38ba8" text-anchor="middle">→ 서버 목록·연결 여부</text>

<line x1="292" y1="148" x2="318" y2="148" stroke="#585b70" stroke-width="2"/>

<!-- Step 2 -->
<rect x="330" y="55" width="250" height="185" rx="10" fill="#313244" stroke="#f9e2af" stroke-width="2.5"/>

<text x="455" y="130" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="24" fill="#f9e2af" text-anchor="middle">●</text>
<text x="455" y="162" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="11" fill="#a6e3a1" text-anchor="middle">ps aux | grep mcp</text>
<text x="455" y="178" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" fill="#a6adc8" text-anchor="middle">프로세스 동작 확인</text>
<text x="455" y="198" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="10" fill="#a6adc8" text-anchor="middle">lsof -i :PORT</text>
<text x="455" y="214" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="11" fill="#a6adc8" text-anchor="middle">포트 상태 확인</text>
<text x="455" y="232" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="11" fill="#f9e2af" text-anchor="middle">→ 프로세스 재시작</text>

<line x1="582" y1="148" x2="608" y2="148" stroke="#585b70" stroke-width="2"/>

<text x="595" y="138" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="10" fill="#585b70" text-anchor="middle">이상 시</text>

<rect x="620" y="55" width="250" height="185" rx="10" fill="#313244" stroke="#94e2d5" stroke-width="2.5"/>

<text x="745" y="130" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="18" fill="#94e2d5" text-anchor="middle">[목록]</text>
<text x="745" y="162" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="10" fill="#a6e3a1" text-anchor="middle">tail -f ~/.claude/logs/</text>
<text x="745" y="178" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="10" fill="#a6e3a1" text-anchor="middle">mcp-*.log</text>
<text x="745" y="198" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" fill="#a6adc8" text-anchor="middle">실시간 로그 모니터링</text>
<text x="745" y="214" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="11" fill="#a6adc8" text-anchor="middle">에러 메시지 확인</text>
<text x="745" y="232" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="11" fill="#94e2d5" text-anchor="middle">→ 원인 특정·수정</text>

<text x="450" y="268" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" fill="#585b70" text-anchor="middle">단계별로 좁혀 나가며 진단 — 대부분 1~2단계에서 해결</text>
