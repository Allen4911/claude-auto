<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>body { margin: 0; background: #f5f5f7; display: flex; justify-content: center; padding: 40px 0; }</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="480" viewBox="0 0 720 480" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#0066cc"/>
    </marker>
  </defs>
  <rect width="720" height="480" fill="#f5f5f7"/>

  <!-- 제목 -->
  <rect x="15" y="14" width="690" height="44" rx="10" ry="10" fill="#0066cc"/>
  <text x="360" y="32" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">MCP 생태계 아키텍처</text>
  <text x="360" y="50" text-anchor="middle" font-size="11" fill="#cce0ff">Claude Code → MCP 클라이언트 → 역할별 MCP 서버 → 외부 도구</text>

  <!-- Layer 1: Claude Code (y=64, gap 6 from title, was y=70) -->
  <rect x="155" y="64" width="410" height="52" rx="10" ry="10" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
  <text x="360" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#0066cc">Claude Code</text>
  <text x="360" y="105" text-anchor="middle" font-size="11" fill="#7a7a7a">AI 코딩 어시스턴트 — 사용자 의도를 파악하고 MCP로 도구 활용</text>

  <!-- Arrow 1: Claude Code → MCP Client -->
  <line x1="360" y1="116" x2="360" y2="127" stroke="#0066cc" stroke-width="2" marker-end="url(#arr)"/>
  <text x="378" y="123" font-size="10" fill="#0066cc">MCP 프로토콜</text>

  <!-- Layer 2: MCP Client (y=129, was y=145) -->
  <rect x="205" y="129" width="310" height="45" rx="10" ry="10" fill="#ffffff" stroke="#0066cc" stroke-width="1.5"/>
  <text x="360" y="147" text-anchor="middle" font-size="13" font-weight="bold" fill="#0066cc">MCP 클라이언트</text>
  <text x="360" y="165" text-anchor="middle" font-size="10" fill="#7a7a7a">Claude Code 내장 — 서버 연결·프로토콜 변환·결과 파싱</text>

  <!-- Bus line (y=186, was y=210) -->
  <line x1="80" y1="186" x2="640" y2="186" stroke="#0066cc" stroke-width="1.5"/>
  <!-- MCP Client center drop to bus -->
  <line x1="360" y1="174" x2="360" y2="186" stroke="#0066cc" stroke-width="1.5"/>
  <!-- Bus label -->
  <text x="360" y="183" text-anchor="middle" font-size="9" fill="#0066cc">JSON-RPC 요청</text>

  <!-- 5 vertical drops from bus to server cards -->
  <line x1="80"  y1="186" x2="80"  y2="200" stroke="#0066cc" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="219" y1="186" x2="219" y2="200" stroke="#0066cc" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="358" y1="186" x2="358" y2="200" stroke="#0066cc" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="497" y1="186" x2="497" y2="200" stroke="#0066cc" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="636" y1="186" x2="636" y2="200" stroke="#0066cc" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Layer 3: 역할별 MCP 서버 카드 (y=200, was y=230) -->

  <!-- Col 0: PM -->
  <rect x="15"  y="200" width="131" height="78" rx="8" ry="8" fill="#ffffff" stroke="#0066cc" stroke-width="1.5"/>
  <rect x="15"  y="200" width="131" height="28" rx="8" ry="8" fill="#0066cc"/>
  <rect x="15"  y="218" width="131" height="10" fill="#0066cc"/>
  <text x="80"  y="219" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">PM MCP 서버</text>
  <text x="80"  y="241" text-anchor="middle" font-size="10" fill="#7a7a7a">프로젝트 관리</text>
  <text x="80"  y="256" text-anchor="middle" font-size="10" fill="#7a7a7a">이슈 추적</text>
  <text x="80"  y="271" text-anchor="middle" font-size="10" fill="#0066cc">Jira · Linear</text>

  <!-- Col 1: 개발자 -->
  <rect x="154" y="200" width="131" height="78" rx="8" ry="8" fill="#ffffff" stroke="#0066cc" stroke-width="1.5"/>
  <rect x="154" y="200" width="131" height="28" rx="8" ry="8" fill="#0066cc"/>
  <rect x="154" y="218" width="131" height="10" fill="#0066cc"/>
  <text x="219" y="219" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">개발 MCP 서버</text>
  <text x="219" y="241" text-anchor="middle" font-size="10" fill="#7a7a7a">코드 · 저장소</text>
  <text x="219" y="256" text-anchor="middle" font-size="10" fill="#7a7a7a">파일 시스템</text>
  <text x="219" y="271" text-anchor="middle" font-size="10" fill="#0066cc">GitHub · VS Code</text>

  <!-- Col 2: QA -->
  <rect x="293" y="200" width="131" height="78" rx="8" ry="8" fill="#ffffff" stroke="#0066cc" stroke-width="1.5"/>
  <rect x="293" y="200" width="131" height="28" rx="8" ry="8" fill="#0066cc"/>
  <rect x="293" y="218" width="131" height="10" fill="#0066cc"/>
  <text x="358" y="219" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">QA MCP 서버</text>
  <text x="358" y="241" text-anchor="middle" font-size="10" fill="#7a7a7a">테스트 · 오류</text>
  <text x="358" y="256" text-anchor="middle" font-size="10" fill="#7a7a7a">모니터링</text>
  <text x="358" y="271" text-anchor="middle" font-size="10" fill="#0066cc">Playwright · Sentry</text>

  <!-- Col 3: 배포 -->
  <rect x="432" y="200" width="131" height="78" rx="8" ry="8" fill="#ffffff" stroke="#0066cc" stroke-width="1.5"/>
  <rect x="432" y="200" width="131" height="28" rx="8" ry="8" fill="#0066cc"/>
  <rect x="432" y="218" width="131" height="10" fill="#0066cc"/>
  <text x="497" y="219" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">배포 MCP 서버</text>
  <text x="497" y="241" text-anchor="middle" font-size="10" fill="#7a7a7a">인프라 · 컨테이너</text>
  <text x="497" y="256" text-anchor="middle" font-size="10" fill="#7a7a7a">IaC 자동화</text>
  <text x="497" y="271" text-anchor="middle" font-size="10" fill="#0066cc">Docker · Terraform</text>

  <!-- Col 4: 리뷰어 -->
  <rect x="571" y="200" width="134" height="78" rx="8" ry="8" fill="#ffffff" stroke="#0066cc" stroke-width="1.5"/>
  <rect x="571" y="200" width="134" height="28" rx="8" ry="8" fill="#0066cc"/>
  <rect x="571" y="218" width="134" height="10" fill="#0066cc"/>
  <text x="638" y="219" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">리뷰 MCP 서버</text>
  <text x="638" y="241" text-anchor="middle" font-size="10" fill="#7a7a7a">문서 · 협업</text>
  <text x="638" y="256" text-anchor="middle" font-size="10" fill="#7a7a7a">지식 관리</text>
  <text x="638" y="271" text-anchor="middle" font-size="10" fill="#0066cc">Notion · Confluence</text>

  <!-- Arrows Layer 3 → Layer 4 -->
  <line x1="80"  y1="278" x2="80"  y2="291" stroke="#0066cc" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="219" y1="278" x2="219" y2="291" stroke="#0066cc" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="358" y1="278" x2="358" y2="291" stroke="#0066cc" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="497" y1="278" x2="497" y2="291" stroke="#0066cc" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="636" y1="278" x2="636" y2="291" stroke="#0066cc" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Layer 4: 외부 도구 (y=291, was y=328) -->
  <rect x="15"  y="291" width="131" height="38" rx="7" ry="7" fill="#e8f4ff" stroke="#0066cc" stroke-width="1"/>
  <text x="80"  y="308" text-anchor="middle" font-size="10" font-weight="bold" fill="#0066cc">Jira</text>
  <text x="80"  y="323" text-anchor="middle" font-size="10" fill="#0066cc">Linear</text>

  <rect x="154" y="291" width="131" height="38" rx="7" ry="7" fill="#e8f4ff" stroke="#0066cc" stroke-width="1"/>
  <text x="219" y="308" text-anchor="middle" font-size="10" font-weight="bold" fill="#0066cc">GitHub</text>
  <text x="219" y="323" text-anchor="middle" font-size="10" fill="#0066cc">VS Code MCP</text>

  <rect x="293" y="291" width="131" height="38" rx="7" ry="7" fill="#e8f4ff" stroke="#0066cc" stroke-width="1"/>
  <text x="358" y="308" text-anchor="middle" font-size="10" font-weight="bold" fill="#0066cc">Playwright</text>
  <text x="358" y="323" text-anchor="middle" font-size="10" fill="#0066cc">Sentry</text>

  <rect x="432" y="291" width="131" height="38" rx="7" ry="7" fill="#e8f4ff" stroke="#0066cc" stroke-width="1"/>
  <text x="497" y="308" text-anchor="middle" font-size="10" font-weight="bold" fill="#0066cc">Docker</text>
  <text x="497" y="323" text-anchor="middle" font-size="10" fill="#0066cc">Terraform</text>

  <rect x="571" y="291" width="134" height="38" rx="7" ry="7" fill="#e8f4ff" stroke="#0066cc" stroke-width="1"/>
  <text x="638" y="308" text-anchor="middle" font-size="10" font-weight="bold" fill="#0066cc">Notion</text>
  <text x="638" y="323" text-anchor="middle" font-size="10" fill="#0066cc">Confluence</text>

  <!-- 공통 채널 (y=343, was y=383) -->
  <rect x="255" y="343" width="210" height="32" rx="8" ry="8" fill="#ffffff" stroke="#0066cc" stroke-width="1.5"/>
  <text x="360" y="357" text-anchor="middle" font-size="11" font-weight="bold" fill="#0066cc">공통 채널</text>
  <text x="360" y="370" text-anchor="middle" font-size="10" fill="#7a7a7a">Slack · Discord (전 역할 공유)</text>

  <!-- 미래 확장 섹션 구분선 (y=381, was y=424) -->
  <line x1="15" y1="381" x2="705" y2="381" stroke="#c7c7cc" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="360" y="392" text-anchor="middle" font-size="10" font-weight="bold" fill="#7a7a7a">미래 확장 방향 (점선 = 예정 연결)</text>

  <!-- 미래확장 점선 라우팅 경로 (updated) -->
  <!-- Path 1: MCP 레지스트리 ← MCP 클라이언트 좌측 외곽 경유 -->
  <path d="M 205,151 L 8,151 L 8,397 L 18,397" stroke="#c7c7cc" stroke-width="1.5" stroke-dasharray="5,3" fill="none"/>
  <!-- Path 2: 클라우드 원격 ← 서버층 하단 직하 -->
  <path d="M 360,278 L 360,397" stroke="#c7c7cc" stroke-width="1.5" stroke-dasharray="5,3" fill="none"/>
  <!-- Path 3: 에이전트 간 공유 ← Claude Code 우측 외곽 경유 -->
  <path d="M 565,89 L 712,89 L 712,422 L 702,422" stroke="#c7c7cc" stroke-width="1.5" stroke-dasharray="5,3" fill="none"/>

  <!-- 미래확장 Box 1: MCP 레지스트리 (y=397, h=50, was y=444 h=62) -->
  <rect x="18" y="397" width="208" height="50" rx="8" ry="8" fill="#f8f8f8" stroke="#c7c7cc" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="122" y="415" text-anchor="middle" font-size="11" font-weight="bold" fill="#7a7a7a">MCP 레지스트리</text>
  <text x="122" y="431" text-anchor="middle" font-size="10" fill="#7a7a7a">MCP 서버 자동 검색·등록</text>
  <text x="122" y="444" text-anchor="middle" font-size="9" fill="#c7c7cc">예정: 공개 레지스트리 표준화</text>

  <!-- 미래확장 Box 2: 클라우드 원격 MCP -->
  <rect x="256" y="397" width="208" height="50" rx="8" ry="8" fill="#f8f8f8" stroke="#c7c7cc" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="360" y="415" text-anchor="middle" font-size="11" font-weight="bold" fill="#7a7a7a">클라우드 원격 MCP</text>
  <text x="360" y="431" text-anchor="middle" font-size="10" fill="#7a7a7a">원격 클라우드 서버 직접 연결</text>
  <text x="360" y="444" text-anchor="middle" font-size="9" fill="#c7c7cc">예정: SaaS MCP 엔드포인트</text>

  <!-- 미래확장 Box 3: 에이전트 간 공유 -->
  <rect x="494" y="397" width="208" height="50" rx="8" ry="8" fill="#f8f8f8" stroke="#c7c7cc" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="598" y="415" text-anchor="middle" font-size="11" font-weight="bold" fill="#7a7a7a">에이전트 간 공유</text>
  <text x="598" y="431" text-anchor="middle" font-size="10" fill="#7a7a7a">멀티에이전트 컨텍스트 공유</text>
  <text x="598" y="444" text-anchor="middle" font-size="9" fill="#c7c7cc">예정: 팀 에이전트 공유 메모리</text>

  <!-- Footer -->
  <text x="360" y="466" text-anchor="middle" font-size="10" fill="#7a7a7a">MCP = Model Context Protocol | 각 역할 MCP 서버를 통해 컨텍스트 전환 없이 외부 도구 활용</text>
</svg>
</body>
</html>
