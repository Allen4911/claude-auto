<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{margin:0;background:#0f172a;font-family:'Noto Sans CJK KR',DejaVu Sans,system-ui,sans-serif}</style></head><body>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280">
  <rect width="900" height="280" fill="#0f172a"/>
  <text x="450" y="35" fill="#e2e8f0" font-size="16" font-weight="bold" text-anchor="middle">토큰 만료 주기 타임라인</text>
  <!-- Timeline axis -->
  <line x1="60" y1="160" x2="840" y2="160" stroke="#334155" stroke-width="2"/>
  <polygon points="840,155 855,160 840,165" fill="#334155"/>
  <text x="862" y="164" fill="#64748b" font-size="11">시간</text>
  <!-- Cycle 1: normal -->
  <rect x="60" y="120" width="200" height="40" rx="4" fill="#0c2a1a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="160" y="143" fill="#86efac" font-size="12" font-weight="bold" text-anchor="middle">정상 구간</text>
  <!-- login event -->
  <line x1="60" y1="100" x2="60" y2="200" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4,3"/>
  <rect x="25" y="78" width="70" height="22" rx="4" fill="#1e40af"/>
  <text x="60" y="93" fill="#bfdbfe" font-size="10" font-weight="bold" text-anchor="middle">로그인</text>
  <text x="60" y="214" fill="#60a5fa" font-size="10" text-anchor="middle">토큰 발급</text>
  <!-- expiry event -->
  <line x1="260" y1="100" x2="260" y2="200" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,3"/>
  <rect x="222" y="78" width="76" height="22" rx="4" fill="#78350f"/>
  <text x="260" y="93" fill="#fde68a" font-size="10" font-weight="bold" text-anchor="middle">만료 지점</text>
  <text x="260" y="214" fill="#f59e0b" font-size="10" text-anchor="middle">인증 오류 발생</text>
  <!-- Error zone -->
  <rect x="260" y="120" width="120" height="40" rx="4" fill="#2d0a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="320" y="143" fill="#fca5a5" font-size="12" font-weight="bold" text-anchor="middle">오류 구간</text>
  <!-- relogin event -->
  <line x1="380" y1="100" x2="380" y2="200" stroke="#10b981" stroke-width="2" stroke-dasharray="4,3"/>
  <rect x="338" y="78" width="84" height="22" rx="4" fill="#064e3b"/>
  <text x="380" y="93" fill="#6ee7b7" font-size="10" font-weight="bold" text-anchor="middle">auth login</text>
  <text x="380" y="214" fill="#34d399" font-size="10" text-anchor="middle">토큰 재발급</text>
  <!-- Cycle 2: normal again -->
  <rect x="380" y="120" width="200" height="40" rx="4" fill="#0c2a1a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="480" y="143" fill="#86efac" font-size="12" font-weight="bold" text-anchor="middle">정상 구간 재개</text>
  <!-- expiry 2 -->
  <line x1="580" y1="100" x2="580" y2="200" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,3"/>
  <rect x="542" y="78" width="76" height="22" rx="4" fill="#78350f"/>
  <text x="580" y="93" fill="#fde68a" font-size="10" font-weight="bold" text-anchor="middle">만료 지점</text>
  <!-- Error 2 -->
  <rect x="580" y="120" width="80" height="40" rx="4" fill="#2d0a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="620" y="143" fill="#fca5a5" font-size="11" text-anchor="middle">오류</text>
  <!-- relogin 2 -->
  <line x1="660" y1="100" x2="660" y2="200" stroke="#10b981" stroke-width="2" stroke-dasharray="4,3"/>
  <rect x="618" y="78" width="84" height="22" rx="4" fill="#064e3b"/>
  <text x="660" y="93" fill="#6ee7b7" font-size="10" font-weight="bold" text-anchor="middle">auth login</text>
  <!-- Cycle 3 -->
  <rect x="660" y="120" width="180" height="40" rx="4" fill="#0c2a1a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="750" y="143" fill="#86efac" font-size="12" font-weight="bold" text-anchor="middle">정상 구간 재개</text>
  <!-- Cycle arrow -->
  <path d="M 460 230 Q 460 255 530 255 Q 600 255 600 230" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#cyc)"/>
  <text x="530" y="268" fill="#64748b" font-size="11" text-anchor="middle">만료 시 재인증으로 순환 반복</text>
  <defs><marker id="cyc" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L5,3 L0,6" fill="none" stroke="#475569" stroke-width="1.5"/></marker></defs>
</svg>
</body></html>
