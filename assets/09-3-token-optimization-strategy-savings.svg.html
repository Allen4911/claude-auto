<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{margin:0;background:#0f172a;font-family:'Noto Sans CJK KR',DejaVu Sans,system-ui,sans-serif}</style></head><body>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="370" viewBox="0 0 900 370">
  <rect width="900" height="370" fill="#0f172a"/>
  <text x="450" y="35" fill="#e2e8f0" font-size="16" font-weight="bold" text-anchor="middle">전략별 토큰 절약률 비교</text>
  <!-- Y axis -->
  <line x1="260" y1="55" x2="260" y2="325" stroke="#334155" stroke-width="1.5"/>
  <!-- X axis -->
  <line x1="260" y1="325" x2="870" y2="325" stroke="#334155" stroke-width="1.5"/>
  <!-- X axis labels (610px = 100%) -->
  <text x="260" y="340" fill="#64748b" font-size="10" text-anchor="middle">0%</text>
  <text x="382" y="340" fill="#64748b" font-size="10" text-anchor="middle">20%</text>
  <text x="504" y="340" fill="#64748b" font-size="10" text-anchor="middle">40%</text>
  <text x="626" y="340" fill="#64748b" font-size="10" text-anchor="middle">60%</text>
  <text x="748" y="340" fill="#64748b" font-size="10" text-anchor="middle">80%</text>
  <text x="870" y="340" fill="#64748b" font-size="10" text-anchor="middle">100%</text>
  <!-- Grid lines -->
  <line x1="382" y1="55" x2="382" y2="325" stroke="#1e293b" stroke-width="1"/>
  <line x1="504" y1="55" x2="504" y2="325" stroke="#1e293b" stroke-width="1"/>
  <line x1="626" y1="55" x2="626" y2="325" stroke="#1e293b" stroke-width="1"/>
  <line x1="748" y1="55" x2="748" y2="325" stroke="#1e293b" stroke-width="1"/>
  <!-- Bar 1: RTK 적용 ~63% (384px) -->
  <text x="250" y="82" fill="#fde68a" font-size="11" font-weight="bold" text-anchor="end">RTK 적용</text>
  <rect x="261" y="65" width="384" height="28" rx="4" fill="#f59e0b"/>
  <text x="650" y="84" fill="#fde68a" font-size="11" font-weight="bold">~63%</text>
  <!-- Bar 2: 세션 분리+/compact ~40% (244px) -->
  <text x="250" y="127" fill="#94a3b8" font-size="11" text-anchor="end">세션 분리+/compact</text>
  <rect x="261" y="110" width="244" height="28" rx="4" fill="#10b981"/>
  <text x="510" y="129" fill="#6ee7b7" font-size="11" font-weight="bold">~40%</text>
  <!-- Bar 3: .claudeignore 설정 ~30% (183px) -->
  <text x="250" y="172" fill="#94a3b8" font-size="11" text-anchor="end">.claudeignore 설정</text>
  <rect x="261" y="155" width="183" height="28" rx="4" fill="#3b82f6"/>
  <text x="449" y="174" fill="#93c5fd" font-size="11" font-weight="bold">~30%</text>
  <!-- Bar 4: 구체적 지시 습관 ~25% (153px) -->
  <text x="250" y="217" fill="#94a3b8" font-size="11" text-anchor="end">구체적 지시 습관</text>
  <rect x="261" y="200" width="153" height="28" rx="4" fill="#ec4899"/>
  <text x="419" y="219" fill="#fbcfe8" font-size="11" font-weight="bold">~25%</text>
  <!-- Bar 5: CLAUDE.md 간소화 ~12% (73px) -->
  <text x="250" y="262" fill="#94a3b8" font-size="11" text-anchor="end">CLAUDE.md 간소화</text>
  <rect x="261" y="245" width="73" height="28" rx="4" fill="#8b5cf6"/>
  <text x="339" y="264" fill="#c4b5fd" font-size="11" font-weight="bold">~12%</text>
  <!-- Bar 6: 불필요 파인 비활성화 — 해당 파인 100% (610px) -->
  <text x="250" y="307" fill="#94a3b8" font-size="11" text-anchor="end">파인 비활성화 시</text>
  <rect x="261" y="290" width="609" height="28" rx="4" fill="#334155"/>
  <text x="556" y="309" fill="#e2e8f0" font-size="11" font-weight="bold" text-anchor="middle">해당 파인 100%</text>
  <!-- Legend note -->
  <text x="450" y="360" fill="#475569" font-size="10" text-anchor="middle">* 파인 비활성화 시 해당 파인 토큰 100% 절약. 나머지는 추정 범위 중간값. 중첩 적용 가능.</text>
</svg>
</body></html>
