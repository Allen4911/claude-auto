<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{margin:0;background:#0f172a;font-family:system-ui,sans-serif}</style></head><body>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="340" viewBox="0 0 900 340">
  <rect width="900" height="340" fill="#0f172a"/>
  <text x="450" y="35" fill="#e2e8f0" font-size="16" font-weight="bold" text-anchor="middle">전략별 토큰 절약률 비교</text>
  <!-- Y axis -->
  <line x1="260" y1="55" x2="260" y2="310" stroke="#334155" stroke-width="1.5"/>
  <!-- X axis -->
  <line x1="260" y1="310" x2="870" y2="310" stroke="#334155" stroke-width="1.5"/>
  <!-- X axis labels -->
  <text x="260" y="325" fill="#64748b" font-size="10" text-anchor="middle">0%</text>
  <text x="384" y="325" fill="#64748b" font-size="10" text-anchor="middle">20%</text>
  <text x="507" y="325" fill="#64748b" font-size="10" text-anchor="middle">40%</text>
  <text x="630" y="325" fill="#64748b" font-size="10" text-anchor="middle">60%</text>
  <text x="753" y="325" fill="#64748b" font-size="10" text-anchor="middle">80%</text>
  <text x="870" y="325" fill="#64748b" font-size="10" text-anchor="middle">100%</text>
  <!-- Grid lines -->
  <line x1="384" y1="55" x2="384" y2="310" stroke="#1e293b" stroke-width="1"/>
  <line x1="507" y1="55" x2="507" y2="310" stroke="#1e293b" stroke-width="1"/>
  <line x1="630" y1="55" x2="630" y2="310" stroke="#1e293b" stroke-width="1"/>
  <line x1="753" y1="55" x2="753" y2="310" stroke="#1e293b" stroke-width="1"/>
  <!-- Bar 1: .claudeignore -->
  <text x="250" y="90" fill="#94a3b8" font-size="11" text-anchor="end">.claudeignore 설정</text>
  <rect x="261" y="70" width="496" height="28" rx="4" fill="#3b82f6"/>
  <text x="763" y="89" fill="#93c5fd" font-size="11" font-weight="bold">80%</text>
  <!-- Bar 2: Session 분리 -->
  <text x="250" y="135" fill="#94a3b8" font-size="11" text-anchor="end">세션 분리 전략</text>
  <rect x="261" y="115" width="434" height="28" rx="4" fill="#10b981"/>
  <text x="701" y="134" fill="#6ee7b7" font-size="11" font-weight="bold">70%</text>
  <!-- Bar 3: CLAUDE.md 최적화 -->
  <text x="250" y="180" fill="#94a3b8" font-size="11" text-anchor="end">CLAUDE.md 최적화</text>
  <rect x="261" y="160" width="310" height="28" rx="4" fill="#f59e0b"/>
  <text x="577" y="179" fill="#fde68a" font-size="11" font-weight="bold">50%</text>
  <!-- Bar 4: 캐시 활용 -->
  <text x="250" y="225" fill="#94a3b8" font-size="11" text-anchor="end">프롬프트 캐시 활용</text>
  <rect x="261" y="205" width="248" height="28" rx="4" fill="#8b5cf6"/>
  <text x="515" y="224" fill="#c4b5fd" font-size="11" font-weight="bold">40%</text>
  <!-- Bar 5: 필요한 파인만 -->
  <text x="250" y="270" fill="#94a3b8" font-size="11" text-anchor="end">필요한 파인만 활성화</text>
  <rect x="261" y="250" width="186" height="28" rx="4" fill="#ec4899"/>
  <text x="453" y="269" fill="#fbcfe8" font-size="11" font-weight="bold">30%</text>
  <!-- Bar 6: 역할 분리 -->
  <text x="250" y="315" fill="#94a3b8" font-size="11" text-anchor="end">역할별 최소 컨텍스트</text>
  <rect x="261" y="295" width="124" height="8" rx="2" fill="#64748b"/>
  <text x="391" y="307" fill="#94a3b8" font-size="10" font-weight="bold">20%</text>
  <!-- Legend note -->
  <text x="450" y="340" fill="#475569" font-size="10" text-anchor="middle">* 효과는 프로젝트 규모·팀 구성에 따라 달라질 수 있음</text>
</svg>
</body></html>
