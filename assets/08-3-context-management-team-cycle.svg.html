<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>body { margin: 0; background: #f5f5f7; display: flex; justify-content: center; padding: 40px 0; }</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="480" viewBox="0 0 720 480" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0066cc"/>
    </marker>
    <marker id="arrow-loop" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0066cc"/>
    </marker>
  </defs>
  <rect width="720" height="480" fill="#f5f5f7"/>

  <!-- 제목 -->
  <rect x="30" y="18" width="660" height="52" rx="11" ry="11" fill="#0066cc"/>
  <text x="360" y="40" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">멀티에이전트 팀 컨텍스트 관리 사이클</text>
  <text x="360" y="60" text-anchor="middle" font-size="11" fill="#cce0ff">쭌(팀장) 5분 체크 루프 — 팀원 컨텍스트 자동 보호</text>

  <!-- 역할 레이블 배경 -->
  <rect x="30" y="90" width="145" height="22" rx="5" ry="5" fill="#0066cc"/>
  <text x="102" y="105" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">쭌 (팀장)</text>
  <rect x="545" y="90" width="145" height="22" rx="5" ry="5" fill="#e8f4ff" stroke="#0066cc" stroke-width="1.5"/>
  <text x="618" y="105" text-anchor="middle" font-size="11" font-weight="bold" fill="#0066cc">팀원</text>

  <!-- Step 1: 쭌 5분 체크 -->
  <rect x="30" y="125" width="200" height="68" rx="11" ry="11" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
  <text x="130" y="149" text-anchor="middle" font-size="13" font-weight="bold" fill="#0066cc">쭌: 5분 체크</text>
  <text x="130" y="168" text-anchor="middle" font-size="11" fill="#7a7a7a">ScheduleWakeup 270s</text>
  <text x="130" y="183" text-anchor="middle" font-size="11" fill="#7a7a7a">팀원 컨텍스트 사용량 확인</text>

  <!-- 화살표 1→2 -->
  <line x1="230" y1="159" x2="288" y2="159" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="259" y="152" text-anchor="middle" font-size="10" fill="#0066cc">감지</text>

  <!-- Step 2: 70% 초과 감지 (중앙) -->
  <rect x="290" y="125" width="140" height="68" rx="11" ry="11" fill="#fff8e1" stroke="#0066cc" stroke-width="2"/>
  <text x="360" y="149" text-anchor="middle" font-size="13" font-weight="bold" fill="#1d1d1f">70% 초과</text>
  <text x="360" y="168" text-anchor="middle" font-size="11" fill="#7a7a7a">컨텍스트 임계치</text>
  <text x="360" y="183" text-anchor="middle" font-size="11" fill="#7a7a7a">도달 감지</text>

  <!-- 화살표 2→3 -->
  <line x1="430" y1="159" x2="488" y2="159" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="459" y="152" text-anchor="middle" font-size="10" fill="#0066cc">지시</text>

  <!-- Step 3: 팀원 context-save -->
  <rect x="490" y="125" width="200" height="68" rx="11" ry="11" fill="#ffffff" stroke="#0066cc" stroke-width="1.5"/>
  <text x="590" y="149" text-anchor="middle" font-size="13" font-weight="bold" fill="#0066cc">팀원: /context-save</text>
  <text x="590" y="168" text-anchor="middle" font-size="11" fill="#7a7a7a">현재 작업 상태 저장</text>
  <text x="590" y="183" text-anchor="middle" font-size="11" fill="#7a7a7a">쭌에게 완료 보고</text>

  <!-- 화살표 3↓ -->
  <line x1="590" y1="193" x2="590" y2="238" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4: 쭌 /clear 지시 (오른쪽 → 아래로) -->
  <rect x="490" y="240" width="200" height="68" rx="11" ry="11" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
  <text x="590" y="264" text-anchor="middle" font-size="13" font-weight="bold" fill="#0066cc">쭌: /clear 지시</text>
  <text x="590" y="283" text-anchor="middle" font-size="11" fill="#7a7a7a">tmux로 팀원에게 전달</text>
  <text x="590" y="298" text-anchor="middle" font-size="11" fill="#7a7a7a">컨텍스트 초기화 명령</text>

  <!-- 화살표 4← -->
  <line x1="490" y1="274" x2="432" y2="274" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 5: 팀원 /clear 실행 (중앙 하단) -->
  <rect x="290" y="240" width="140" height="68" rx="11" ry="11" fill="#fff8e1" stroke="#0066cc" stroke-width="1.5"/>
  <text x="360" y="264" text-anchor="middle" font-size="13" font-weight="bold" fill="#1d1d1f">팀원: /clear</text>
  <text x="360" y="283" text-anchor="middle" font-size="11" fill="#7a7a7a">컨텍스트 초기화</text>
  <text x="360" y="298" text-anchor="middle" font-size="11" fill="#7a7a7a">메모리 해제</text>

  <!-- 화살표 5← -->
  <line x1="290" y1="274" x2="232" y2="274" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 6: 팀원 /context-restore -->
  <rect x="30" y="240" width="200" height="68" rx="11" ry="11" fill="#ffffff" stroke="#0066cc" stroke-width="1.5"/>
  <text x="130" y="264" text-anchor="middle" font-size="13" font-weight="bold" fill="#0066cc">팀원: /context-restore</text>
  <text x="130" y="283" text-anchor="middle" font-size="11" fill="#7a7a7a">저장 상태 복구</text>
  <text x="130" y="298" text-anchor="middle" font-size="11" fill="#7a7a7a">작업 재개</text>

  <!-- 반복 루프 화살표 (아래→왼쪽→위→Step1) -->
  <line x1="130" y1="308" x2="130" y2="355" stroke="#0066cc" stroke-width="2"/>
  <line x1="130" y1="355" x2="590" y2="355" stroke="#0066cc" stroke-width="2"/>
  <line x1="590" y1="355" x2="590" y2="330" stroke="#0066cc" stroke-width="2"/>
  <!-- 루프 라벨 -->
  <rect x="280" y="358" width="160" height="22" rx="5" ry="5" fill="#0066cc"/>
  <text x="360" y="373" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">270초 후 자동 반복</text>

  <!-- Step1 복귀 화살표 -->
  <line x1="130" y1="355" x2="130" y2="330" stroke="#0066cc" stroke-width="2"/>
  <line x1="130" y1="330" x2="130" y2="308" stroke="#0066cc" stroke-width="2"/>
  <!-- 실제 루프 복귀는 Step1 상단으로 -->
  <line x1="130" y1="308" x2="130" y2="358" stroke="#0066cc" stroke-width="2"/>
  <line x1="130" y1="358" x2="360" y2="358" stroke="#0066cc" stroke-width="2"/>

  <!-- 역할 구분선 (수직 점선) -->
  <line x1="360" y1="88" x2="360" y2="320" stroke="#c7c7cc" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="240" y="88" text-anchor="middle" font-size="10" fill="#7a7a7a">← 팀장 영역</text>
  <text x="480" y="88" text-anchor="middle" font-size="10" fill="#7a7a7a">팀원 영역 →</text>

  <!-- 하단 요약 -->
  <rect x="30" y="392" width="660" height="68" rx="11" ry="11" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="360" y="415" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d1d1f">핵심 원칙</text>
  <text x="80" y="435" font-size="11" fill="#1d1d1f">쭌: 감시 + 지시 역할 (직접 clear/save 금지)</text>
  <text x="80" y="452" font-size="11" fill="#1d1d1f">팀원: save → clear → restore 실행 (맥락 보존 의무)</text>
</svg>
</body>
</html>
