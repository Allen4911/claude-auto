<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{margin:0;background:#0f172a;font-family:'Noto Sans CJK KR',DejaVu Sans,system-ui,sans-serif}</style></head><body>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <rect width="900" height="300" fill="#0f172a"/>
  <text x="450" y="35" fill="#e2e8f0" font-size="16" font-weight="bold" text-anchor="middle">.claudeignore 적용 전후 비교</text>
  <!-- Before -->
  <rect x="40" y="55" width="360" height="210" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="220" y="78" fill="#fca5a5" font-size="13" font-weight="bold" text-anchor="middle">적용 전 — ls 출력</text>
  <text x="220" y="100" fill="#64748b" font-size="9" text-anchor="middle">node_modules/ (4,832개 항목)</text>
  <text x="220" y="114" fill="#64748b" font-size="9" text-anchor="middle">node_modules/react/... (수백 줄)</text>
  <text x="220" y="128" fill="#64748b" font-size="9" text-anchor="middle">node_modules/lodash/... (수백 줄)</text>
  <text x="220" y="142" fill="#64748b" font-size="9" text-anchor="middle">dist/ (빌드 결과물 수십 파일)</text>
  <text x="220" y="156" fill="#64748b" font-size="9" text-anchor="middle">coverage/ (테스트 커버리지)</text>
  <text x="220" y="170" fill="#64748b" font-size="9" text-anchor="middle">... (불필요한 수천 줄)</text>
  <rect x="60" y="200" width="320" height="32" rx="5" fill="#2d0a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="220" y="220" fill="#fca5a5" font-size="12" font-weight="bold" text-anchor="middle">~15,000 토큰 소비</text>
  <text x="220" y="234" fill="#f87171" font-size="10" text-anchor="middle">핵심 정보 묻힘</text>
  <!-- Arrow -->
  <line x1="400" y1="160" x2="460" y2="160" stroke="#3b82f6" stroke-width="2" marker-end="url(#a)"/>
  <text x="430" y="148" fill="#60a5fa" font-size="9" text-anchor="middle">.claudeignore</text>
  <text x="430" y="160" fill="#60a5fa" font-size="9" text-anchor="middle">적용</text>
  <!-- After -->
  <rect x="460" y="55" width="400" height="210" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="660" y="78" fill="#86efac" font-size="13" font-weight="bold" text-anchor="middle">적용 후 — ls 출력</text>
  <text x="660" y="100" fill="#4ade80" font-size="11" text-anchor="middle">src/</text>
  <text x="660" y="118" fill="#4ade80" font-size="11" text-anchor="middle">tests/</text>
  <text x="660" y="136" fill="#4ade80" font-size="11" text-anchor="middle">package.json</text>
  <text x="660" y="154" fill="#4ade80" font-size="11" text-anchor="middle">README.md</text>
  <text x="660" y="172" fill="#4ade80" font-size="11" text-anchor="middle">.claudeignore</text>
  <rect x="480" y="200" width="360" height="32" rx="5" fill="#0c2a1a" stroke="#22c55e" stroke-width="1"/>
  <text x="660" y="220" fill="#86efac" font-size="12" font-weight="bold" text-anchor="middle">~200 토큰 (98% 절약)</text>
  <text x="660" y="234" fill="#4ade80" font-size="10" text-anchor="middle">핵심 파일만 노출</text>
  <text x="450" y="280" fill="#475569" font-size="11" text-anchor="middle">node_modules/ dist/ build/ *.lock 제외 → ls/find 출력 대폭 감소</text>
  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="none" stroke="#3b82f6" stroke-width="1.5"/></marker></defs>
</svg>
</body></html>
