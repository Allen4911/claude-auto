<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{margin:0;background:#f5f5f7;font-family:'Noto Sans CJK KR',DejaVu Sans,system-ui,sans-serif}</style></head><body>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="256" viewBox="0 0 900 320">
  <rect width="900" height="320" fill="#f5f5f7"/>
  <text x="450" y="30" fill="#1d1d1f" font-size="16" font-weight="bold" text-anchor="middle">현재 도구 → 미래 프레임워크 대응 매핑</text>
  <!-- Header -->
  <rect x="40" y="48" width="360" height="32" rx="6" fill="#ffffff" stroke="#0066cc" stroke-width="1"/>
  <text x="220" y="69" fill="#0066cc" font-size="13" font-weight="bold" text-anchor="middle">현재 (2024)</text>
  <rect x="500" y="48" width="360" height="32" rx="6" fill="#ffffff" stroke="#0066cc" stroke-width="1"/>
  <text x="680" y="69" fill="#0066cc" font-size="13" font-weight="bold" text-anchor="middle">미래 (2025+)</text>
  <!-- Row 1 -->
  <rect x="40" y="90" width="360" height="36" rx="4" fill="#ffffff"/>
  <text x="220" y="113" fill="#7a7a7a" font-size="11" text-anchor="middle">TMUX 파인</text>
  <text x="450" y="113" fill="#0066cc" font-size="16" text-anchor="middle">→</text>
  <rect x="500" y="90" width="360" height="36" rx="4" fill="#ffffff"/>
  <text x="680" y="113" fill="#0066cc" font-size="11" text-anchor="middle">Agent SDK 서브에이전트 + 독립 컨테이너</text>
  <!-- Row 2 -->
  <rect x="40" y="132" width="360" height="36" rx="4" fill="#ffffff"/>
  <text x="220" y="155" fill="#7a7a7a" font-size="11" text-anchor="middle">CLAUDE.md 역할 파일</text>
  <text x="450" y="155" fill="#0066cc" font-size="16" text-anchor="middle">→</text>
  <rect x="500" y="132" width="360" height="36" rx="4" fill="#ffffff"/>
  <text x="680" y="155" fill="#0066cc" font-size="11" text-anchor="middle">시스템 프롬프트 + MCP 컨텍스트 주입</text>
  <!-- Row 3 -->
  <rect x="40" y="174" width="360" height="36" rx="4" fill="#ffffff"/>
  <text x="220" y="197" fill="#7a7a7a" font-size="11" text-anchor="middle">tmux send-keys 텍스트 전송</text>
  <text x="450" y="197" fill="#0066cc" font-size="16" text-anchor="middle">→</text>
  <rect x="500" y="174" width="360" height="36" rx="4" fill="#ffffff"/>
  <text x="680" y="197" fill="#0066cc" font-size="11" text-anchor="middle">구조화 메시지 / Tool Call 기반 통신</text>
  <!-- Row 4 -->
  <rect x="40" y="216" width="360" height="36" rx="4" fill="#ffffff"/>
  <text x="220" y="239" fill="#7a7a7a" font-size="11" text-anchor="middle">Bot Mode (반복 실행)</text>
  <text x="450" y="239" fill="#0066cc" font-size="16" text-anchor="middle">→</text>
  <rect x="500" y="216" width="360" height="36" rx="4" fill="#ffffff"/>
  <text x="680" y="239" fill="#0066cc" font-size="11" text-anchor="middle">Headless CI + 이벤트 기반 트리거</text>
  <!-- Row 5 -->
  <rect x="40" y="258" width="360" height="36" rx="4" fill="#ffffff"/>
  <text x="220" y="281" fill="#7a7a7a" font-size="11" text-anchor="middle">수동 파인 확인 (cat pane.txt)</text>
  <text x="450" y="281" fill="#0066cc" font-size="16" text-anchor="middle">→</text>
  <rect x="500" y="258" width="360" height="36" rx="4" fill="#ffffff"/>
  <text x="680" y="281" fill="#0066cc" font-size="11" text-anchor="middle">실시간 스트리밍 결과 수집 + 집계</text>
</svg>
</body></html>
