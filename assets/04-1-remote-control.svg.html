<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>body { margin: 0; background: #f5f5f7; display: flex; justify-content: center; padding: 40px 0; }</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="680" viewBox="0 0 720 680" font-family="Gulim, Noto Sans CJK KR, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0066cc"/>
    </marker>
  </defs>
  <rect width="720" height="680" fill="#f5f5f7"/>

  <!-- 제목 -->
  <rect x="30" y="25" width="660" height="50" rx="11" ry="11" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
  <text x="360" y="45" text-anchor="middle" font-size="15" font-weight="bold" fill="#1d1d1f">원격 제어 아키텍처</text>
  <text x="360" y="63" text-anchor="middle" font-size="12" fill="#7a7a7a">스마트폰 → Anthropic API → 로컬 Claude Code</text>

  <!-- 사용자 (스마트폰) -->
  <rect x="210" y="100" width="300" height="80" rx="11" ry="11" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
  <!-- 폰 아이콘 -->
  <rect x="232" y="118" width="24" height="40" rx="4" ry="4" fill="none" stroke="#0066cc" stroke-width="2"/>
  <rect x="240" y="152" width="8" height="3" rx="1" ry="1" fill="#0066cc"/>
  <text x="275" y="138" font-size="14" font-weight="bold" fill="#1d1d1f">사용자</text>
  <text x="275" y="157" font-size="12" fill="#7a7a7a">(스마트폰)</text>

  <!-- HTTPS 라벨 1 -->
  <line x1="360" y1="180" x2="360" y2="225" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="270" y="188" width="180" height="22" rx="5" ry="5" fill="#f0f4ff" stroke="#0066cc" stroke-width="1"/>
  <text x="360" y="203" text-anchor="middle" font-size="11" fill="#0066cc">🔒 HTTPS (TLS 암호화)</text>

  <!-- Anthropic API 서버 -->
  <rect x="140" y="225" width="440" height="90" rx="11" ry="11" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
  <!-- Anthropic 로고 텍스트 -->
  <circle cx="175" cy="270" r="22" fill="#0066cc"/>
  <text x="175" y="276" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">A</text>
  <text x="220" y="261" font-size="14" font-weight="bold" fill="#1d1d1f">Anthropic API 서버 (라우팅)</text>
  <text x="220" y="280" font-size="12" fill="#7a7a7a">요청 라우팅 및 인증, 명령 처리</text>

  <!-- HTTPS 라벨 2 -->
  <line x1="360" y1="315" x2="360" y2="360" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="270" y="323" width="180" height="22" rx="5" ry="5" fill="#f0f4ff" stroke="#0066cc" stroke-width="1"/>
  <text x="360" y="338" text-anchor="middle" font-size="11" fill="#0066cc">🔒 HTTPS (TLS 암호화)</text>

  <!-- 로컬 Claude Code 세션 -->
  <rect x="140" y="360" width="440" height="90" rx="11" ry="11" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
  <rect x="168" y="382" width="36" height="46" rx="5" ry="5" fill="#0066cc"/>
  <text x="186" y="409" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">&lt;/&gt;</text>
  <text x="220" y="396" font-size="14" font-weight="bold" fill="#1d1d1f">로컬 Claude Code 세션 (개발 PC)</text>
  <text x="220" y="415" font-size="12" fill="#7a7a7a">Claude Code 실행 환경</text>
  <text x="220" y="432" font-size="11" fill="#7a7a7a">프롬프트 처리, 코드 생성, 도구 실행</text>

  <!-- 연결선 아래 -->
  <line x1="360" y1="450" x2="360" y2="490" stroke="#c7c7cc" stroke-width="1.5"/>
  <line x1="185" y1="490" x2="535" y2="490" stroke="#c7c7cc" stroke-width="1.5"/>

  <!-- 하단 3개 박스 -->
  <!-- 로컬 파일시스템 -->
  <line x1="185" y1="490" x2="185" y2="510" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="75" y="510" width="220" height="80" rx="11" ry="11" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="185" y="535" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d1d1f">📁 로컬 파일시스템</text>
  <text x="185" y="553" text-anchor="middle" font-size="11" fill="#7a7a7a">프로젝트 파일, 설정,</text>
  <text x="185" y="569" text-anchor="middle" font-size="11" fill="#7a7a7a">로그 등</text>

  <!-- MCP 서버 -->
  <line x1="360" y1="490" x2="360" y2="510" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="250" y="510" width="220" height="80" rx="11" ry="11" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="360" y="535" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d1d1f">🔌 MCP 서버</text>
  <text x="360" y="553" text-anchor="middle" font-size="11" fill="#7a7a7a">로컬/원격 MCP 서버</text>
  <text x="360" y="569" text-anchor="middle" font-size="11" fill="#7a7a7a">도구 및 플러그인</text>

  <!-- 도구 사용 -->
  <line x1="535" y1="490" x2="535" y2="510" stroke="#c7c7cc" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="425" y="510" width="220" height="80" rx="11" ry="11" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="535" y="535" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d1d1f">🔧 도구 사용</text>
  <text x="535" y="553" text-anchor="middle" font-size="11" fill="#7a7a7a">셸 명령, 코드 브라우저,</text>
  <text x="535" y="569" text-anchor="middle" font-size="11" fill="#7a7a7a">API 호출 등</text>

  <text x="360" y="650" text-anchor="middle" font-size="11" fill="#7a7a7a">스마트폰에서 개발 PC를 완전히 원격 제어</text>
</svg>
</body>
</html>
