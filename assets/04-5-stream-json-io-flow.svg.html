<svg xmlns="http://www.w3.org/2000/svg" width="900" height="340" viewBox="0 0 900 340">
<rect width="900" height="340" fill="#1e1e2e"/>
<text x="450" y="38" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="22" fill="#cdd6f4" text-anchor="middle" font-weight="bold">Stream JSON 양방향 입출력</text>
<text x="450" y="62" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="14" fill="#a6adc8" text-anchor="middle">프로그램 ↔ Claude Code 구조화 통신</text>

<!-- Program box (left) -->
<rect x="40" y="100" width="220" height="140" rx="10" fill="#181825" stroke="#89b4fa" stroke-width="2"/>
<text x="150" y="128" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="14" fill="#89b4fa" text-anchor="middle" font-weight="bold">프로그램 / 스크립트</text>
<line x1="56" y1="138" x2="244" y2="138" stroke="#313244" stroke-width="1"/>
<text x="150" y="158" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="11" fill="#cdd6f4" text-anchor="middle">stdin (JSON 메시지)</text>
<text x="150" y="176" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="11" fill="#a6adc8" text-anchor="middle">{"role":"user",</text>
<text x="150" y="192" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="11" fill="#a6adc8" text-anchor="middle"> "content":"분석해줘"}</text>
<text x="150" y="226" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="11" fill="#a6adc8" text-anchor="middle">Python / Node / Bash 등</text>

<!-- Input arrow (program → claude) -->
<line x1="262" y1="148" x2="388" y2="148" stroke="#a6e3a1" stroke-width="2.5"/>
<polygon points="390,148 380,143 380,153" fill="#a6e3a1"/>
<rect x="285" y="130" width="86" height="24" rx="4" fill="#181825"/>
<text x="328" y="146" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="10" fill="#a6e3a1" text-anchor="middle">--input-format</text>
<text x="328" y="160" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="10" fill="#a6e3a1" text-anchor="middle">stream-json</text>

<!-- Output arrow (claude → program) -->
<line x1="388" y1="192" x2="262" y2="192" stroke="#f9e2af" stroke-width="2.5"/>
<polygon points="262,192 272,187 272,197" fill="#f9e2af"/>
<rect x="280" y="196" width="96" height="24" rx="4" fill="#181825"/>
<text x="328" y="206" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="10" fill="#f9e2af" text-anchor="middle">--output-format</text>
<text x="328" y="220" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="10" fill="#f9e2af" text-anchor="middle">stream-json</text>

<!-- Claude box (right) -->
<rect x="392" y="100" width="220" height="140" rx="10" fill="#181825" stroke="#cba6f7" stroke-width="2"/>
<text x="502" y="128" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="14" fill="#cba6f7" text-anchor="middle" font-weight="bold">Claude Code</text>
<line x1="408" y1="138" x2="596" y2="138" stroke="#313244" stroke-width="1"/>
<text x="502" y="158" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="11" fill="#cdd6f4" text-anchor="middle">stdout (NDJSON 스트림)</text>
<text x="502" y="176" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="11" fill="#a6adc8" text-anchor="middle">{"type":"text",</text>
<text x="502" y="192" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="11" fill="#a6adc8" text-anchor="middle"> "text":"분석 결과..."}</text>
<text x="502" y="226" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="11" fill="#a6adc8" text-anchor="middle">-p 플래그 + stdin 읽기</text>

<!-- NDJSON output box -->
<rect x="650" y="100" width="210" height="140" rx="10" fill="#181825" stroke="#f9e2af" stroke-width="2"/>
<text x="755" y="122" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="13" fill="#f9e2af" text-anchor="middle" font-weight="bold">NDJSON 출력</text>
<line x1="666" y1="130" x2="844" y2="130" stroke="#313244" stroke-width="1"/>
<text x="755" y="150" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="10" fill="#a6adc8" text-anchor="start">{"type":"content_block_</text>
<text x="755" y="166" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="10" fill="#a6adc8" text-anchor="start"> start",...}</text>
<text x="755" y="182" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="10" fill="#a6adc8" text-anchor="start">{"type":"text_delta",</text>
<text x="755" y="198" font-family="Noto Sans Mono CJK KR, DejaVu Sans Mono, monospace" font-size="10" fill="#a6adc8" text-anchor="start"> "delta":"분석..."}</text>
<text x="755" y="226" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="11" fill="#a6adc8" text-anchor="middle">줄당 1 JSON 객체</text>

<line x1="614" y1="170" x2="648" y2="170" stroke="#f9e2af" stroke-width="2"/>
<polygon points="648,170 640,165 640,175" fill="#f9e2af"/>

<!-- Bottom note -->
<text x="450" y="278" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="13" fill="#a6adc8" text-anchor="middle">* 사람이 아닌 프로그램이 Claude를 부품처럼 호출하는 자동화 통로</text>
<text x="450" y="298" font-family="Noto Sans CJK KR, DejaVu Sans, sans-serif" font-size="12" fill="#585b70" text-anchor="middle">Remote Control(사람용) vs Stream JSON(프로그램용)</text>
</svg>
