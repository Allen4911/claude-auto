<svg xmlns="http://www.w3.org/2000/svg" width="720" height="620" viewBox="0 0 720 620">
  <defs>
    <marker id="arD" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,1 L9,5 L0,9 z" fill="#0066cc"/>
    </marker>
    <marker id="arU" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M10,1 L1,5 L10,9 z" fill="#0066cc"/>
    </marker>
  </defs>
  <rect width="720" height="620" fill="#f5f5f7"/>
  <text x="360" y="40" font-family="Malgun Gothic, Noto Sans CJK KR, Arial, sans-serif" font-size="22" fill="#1d1d1f" text-anchor="middle" font-weight="bold">지시·보고 왕복 흐름</text>
  <text x="360" y="62" font-family="Malgun Gothic, Noto Sans CJK KR, Arial, sans-serif" font-size="14" fill="#7a7a7a" text-anchor="middle" font-weight="normal">사용자 → 팀 → 사용자 (1~6단계)</text>
  <!-- Box 1: 사용자 -->
  <rect x="170" y="84" width="380" height="64" rx="11" ry="11" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
  <text x="360" y="121" font-family="Malgun Gothic, Noto Sans CJK KR, Arial, sans-serif" font-size="16" fill="#1d1d1f" text-anchor="middle" font-weight="bold">사용자</text>
  <!-- Box 2: Remote-Control -->
  <rect x="170" y="214" width="380" height="64" rx="11" ry="11" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
  <text x="360" y="251" font-family="Malgun Gothic, Noto Sans CJK KR, Arial, sans-serif" font-size="16" fill="#1d1d1f" text-anchor="middle" font-weight="bold">Remote-Control</text>
  <!-- Box 3: 팀장 -->
  <rect x="170" y="344" width="380" height="64" rx="11" ry="11" fill="#ffffff" stroke="#0066cc" stroke-width="2"/>
  <text x="360" y="381" font-family="Malgun Gothic, Noto Sans CJK KR, Arial, sans-serif" font-size="16" fill="#1d1d1f" text-anchor="middle" font-weight="bold">팀장 Pane 0</text>
  <!-- Box 4: 팀원 -->
  <rect x="170" y="464" width="380" height="64" rx="11" ry="11" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="360" y="501" font-family="Malgun Gothic, Noto Sans CJK KR, Arial, sans-serif" font-size="16" fill="#1d1d1f" text-anchor="middle" font-weight="bold">팀원 Pane 1~5</text>

  <!-- Left arrows (지시 전달, going down) ① ② ③ -->
  <!-- ① 사용자→Remote: left side -->
  <line x1="298" y1="150" x2="298" y2="208" stroke="#0066cc" stroke-width="2.4" marker-end="url(#arD)"/>
  <circle cx="282" cy="163" r="13" fill="#0066cc"/>
  <text x="282" y="167" font-family="Malgun Gothic, Noto Sans CJK KR, Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="bold">1</text>
  <!-- ② Remote→팀장: left side -->
  <line x1="298" y1="280" x2="298" y2="338" stroke="#0066cc" stroke-width="2.4" marker-end="url(#arD)"/>
  <circle cx="282" cy="295" r="13" fill="#0066cc"/>
  <text x="282" y="299" font-family="Malgun Gothic, Noto Sans CJK KR, Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="bold">2</text>
  <!-- ③ 팀장→팀원: left side -->
  <line x1="298" y1="410" x2="298" y2="458" stroke="#0066cc" stroke-width="2.4" marker-end="url(#arD)"/>
  <circle cx="282" cy="425" r="13" fill="#0066cc"/>
  <text x="282" y="429" font-family="Malgun Gothic, Noto Sans CJK KR, Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="bold">3</text>

  <!-- Right arrows (결과 보고, going up) ④ ⑤ ⑥ -->
  <!-- ④ 팀원→팀장: right side -->
  <line x1="422" y1="458" x2="422" y2="414" stroke="#0066cc" stroke-width="2.4" marker-end="url(#arU)"/>
  <circle cx="438" cy="443" r="13" fill="#0066cc"/>
  <text x="438" y="447" font-family="Malgun Gothic, Noto Sans CJK KR, Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="bold">4</text>
  <!-- ⑤ 팀장→Remote: right side -->
  <line x1="422" y1="338" x2="422" y2="284" stroke="#0066cc" stroke-width="2.4" marker-end="url(#arU)"/>
  <circle cx="438" cy="313" r="13" fill="#0066cc"/>
  <text x="438" y="317" font-family="Malgun Gothic, Noto Sans CJK KR, Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="bold">5</text>
  <!-- ⑥ Remote→사용자: right side -->
  <line x1="422" y1="208" x2="422" y2="154" stroke="#0066cc" stroke-width="2.4" marker-end="url(#arU)"/>
  <circle cx="438" cy="183" r="13" fill="#0066cc"/>
  <text x="438" y="187" font-family="Malgun Gothic, Noto Sans CJK KR, Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="bold">6</text>

  <!-- Side labels -->
  <text x="100" y="360" font-family="Malgun Gothic, Noto Sans CJK KR, Arial, sans-serif" font-size="13" fill="#0066cc" text-anchor="middle" font-weight="bold">① ~ ③</text>
  <text x="100" y="376" font-family="Malgun Gothic, Noto Sans CJK KR, Arial, sans-serif" font-size="13" fill="#0066cc" text-anchor="middle" font-weight="bold">지시 전달</text>
  <text x="618" y="360" font-family="Malgun Gothic, Noto Sans CJK KR, Arial, sans-serif" font-size="13" fill="#0066cc" text-anchor="middle" font-weight="bold">④ ~ ⑥</text>
  <text x="618" y="376" font-family="Malgun Gothic, Noto Sans CJK KR, Arial, sans-serif" font-size="13" fill="#0066cc" text-anchor="middle" font-weight="bold">결과 보고</text>

  <!-- 작업 수행 box -->
  <rect x="170" y="550" width="380" height="52" rx="11" ry="11" fill="#e8e8ed" stroke="#0066cc" stroke-width="1.5"/>
  <text x="360" y="572" font-family="Malgun Gothic, Noto Sans CJK KR, Arial, sans-serif" font-size="15" fill="#0066cc" text-anchor="middle" font-weight="bold">작업 수행 (실행)</text>
  <text x="360" y="591" font-family="Malgun Gothic, Noto Sans CJK KR, Arial, sans-serif" font-size="12.5" fill="#7a7a7a" text-anchor="middle" font-weight="normal">코드 구현·테스트·리뷰</text>
  <!-- line from 팀원 to work box -->
  <line x1="360" y1="528" x2="360" y2="548" stroke="#0066cc" stroke-width="1.5" marker-end="url(#arD)"/>
  <text x="360" y="543" font-family="Malgun Gothic, Noto Sans CJK KR, Arial, sans-serif" font-size="11" fill="#7a7a7a" text-anchor="middle">③ 받아 실행 → ④ 보고</text>
</svg>
