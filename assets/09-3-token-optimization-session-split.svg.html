<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{margin:0;background:#0f172a;font-family:system-ui,sans-serif}</style></head><body>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <rect width="900" height="300" fill="#0f172a"/>
  <text x="450" y="35" fill="#e2e8f0" font-size="16" font-weight="bold" text-anchor="middle">세션 분리 전략 — 토큰 소비 곡선 비교</text>
  <!-- Bad example -->
  <text x="210" y="65" fill="#ef4444" font-size="13" font-weight="bold" text-anchor="middle">❌ 나쁜 예: 하나의 긴 세션</text>
  <rect x="40" y="75" width="380" height="180" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <!-- Axes -->
  <line x1="70" y1="225" x2="400" y2="225" stroke="#334155" stroke-width="1.5"/>
  <line x1="70" y1="225" x2="70" y2="90" stroke="#334155" stroke-width="1.5"/>
  <text x="235" y="245" fill="#64748b" font-size="9" text-anchor="middle">시간 →</text>
  <text x="55" y="160" fill="#64748b" font-size="9" text-anchor="middle" transform="rotate(-90,55,160)">토큰</text>
  <!-- Rising curve (bad) -->
  <polyline points="70,220 130,200 180,185 220,165 260,145 300,125 340,100 380,85" stroke="#ef4444" stroke-width="2.5" fill="none"/>
  <text x="200" y="178" fill="#f87171" font-size="10">기능A 후 기능B 이어서...</text>
  <text x="200" y="192" fill="#f87171" font-size="10">히스토리 계속 누적</text>
  <!-- Dotted line: 70% limit -->
  <line x1="70" y1="120" x2="400" y2="120" stroke="#f59e0b" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="395" y="116" fill="#f59e0b" font-size="9" text-anchor="end">70%</text>
  <!-- Good example -->
  <text x="690" y="65" fill="#22c55e" font-size="13" font-weight="bold" text-anchor="middle">✓ 좋은 예: 세션 분리</text>
  <rect x="480" y="75" width="380" height="180" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="510" y1="225" x2="840" y2="225" stroke="#334155" stroke-width="1.5"/>
  <line x1="510" y1="225" x2="510" y2="90" stroke="#334155" stroke-width="1.5"/>
  <!-- Session 1 curve -->
  <polyline points="510,220 555,210 600,198 640,185 660,178" stroke="#3b82f6" stroke-width="2.5" fill="none"/>
  <text x="590" y="168" fill="#60a5fa" font-size="9">기능A 세션</text>
  <!-- vertical divider = /exit -->
  <line x1="670" y1="90" x2="670" y2="225" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="670" y="108" fill="#a78bfa" font-size="9" text-anchor="middle">/exit</text>
  <!-- Session 2 starts at 0 -->
  <polyline points="670,220 710,210 760,198 810,185 840,178" stroke="#22c55e" stroke-width="2.5" fill="none"/>
  <text x="760" y="168" fill="#4ade80" font-size="9">기능B 세션 (0 시작)</text>
  <!-- 70% line -->
  <line x1="510" y1="120" x2="840" y2="120" stroke="#f59e0b" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="835" y="116" fill="#f59e0b" font-size="9" text-anchor="end">70%</text>
  <text x="450" y="280" fill="#475569" font-size="11" text-anchor="middle">작업 완료 후 /exit → 새 세션 시작 → 히스토리 0에서 재출발</text>
</svg>
</body></html>
